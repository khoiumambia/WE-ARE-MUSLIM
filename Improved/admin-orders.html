<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Orders - WE ARE MUSLIM</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .orders-container { max-width: 1400px; margin: 2rem auto; padding: 0 2rem; }
        .header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
        .search-filter { display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; }
        .search-filter input { padding: 0.7rem; border: 1px solid var(--border); border-radius: 50px; min-width: 250px; }
        .search-filter select { padding: 0.7rem; border: 1px solid var(--border); border-radius: 12px; background: white; }
        .orders-grid { display: grid; gap: 1.5rem; }
        .order-card { background: white; border-radius: 20px; padding: 1.5rem; box-shadow: var(--shadow-sm); border: 1px solid var(--border); transition: all 0.3s ease; }
        .order-card:hover { box-shadow: var(--shadow-md); }
        .order-header { display: flex; justify-content: space-between; align-items: start; flex-wrap: wrap; margin-bottom: 1rem; padding-bottom: 0.8rem; border-bottom: 1px solid var(--border); }
        .order-id { font-weight: 700; font-size: 1rem; color: var(--primary); }
        .order-date { font-size: 0.8rem; color: #666; }
        .status-badge { padding: 0.3rem 0.8rem; border-radius: 50px; font-size: 0.75rem; font-weight: 600; }
        .status-processing { background: var(--warning); color: #333; }
        .status-shipped { background: var(--info); color: white; }
        .status-out-for-delivery { background: #ff9800; color: white; }
        .status-delivered { background: var(--success); color: white; }
        .status-cancelled { background: var(--danger); color: white; }
        .status-pending-cod { background: #9c27b0; color: white; }
        .payment-badge { padding: 0.2rem 0.5rem; border-radius: 50px; font-size: 0.65rem; font-weight: 600; margin-left: 0.5rem; }
        .payment-confirmed { background: var(--success); color: white; }
        .payment-pending { background: var(--warning); color: #333; }
        .order-customer { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 0.8rem; flex-wrap: wrap; }
        .customer-avatar { width: 40px; height: 40px; background: var(--primary-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        .order-items { background: var(--background); border-radius: 12px; padding: 0.8rem; margin: 0.8rem 0; }
        .order-item-small { display: flex; justify-content: space-between; padding: 0.4rem 0; font-size: 0.85rem; border-bottom: 1px dashed var(--border); }
        .order-item-small:last-child { border-bottom: none; }
        .order-total { display: flex; justify-content: space-between; margin: 0.8rem 0; padding: 0.5rem 0; font-weight: 700; }
        .tracking-box { background: var(--background); border-radius: 8px; padding: 0.5rem; margin: 0.5rem 0; font-family: monospace; font-size: 0.8rem; }
        .order-actions { display: flex; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap; }
        .btn-sm { padding: 0.4rem 0.8rem; font-size: 0.75rem; }
        .status-select { padding: 0.4rem; border-radius: 8px; border: 1px solid var(--border); background: white; }
        .empty-orders { text-align: center; padding: 3rem; background: white; border-radius: 20px; }
        .stats-summary { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
        .stat-pill { background: white; padding: 0.5rem 1rem; border-radius: 50px; box-shadow: var(--shadow-sm); }
        .revenue-total { background: linear-gradient(135deg, var(--success), #059669); color: white; }
    </style>
</head>
<body>
    <div id="navigation-placeholder"></div>
    <div class="orders-container">
        <div class="header-actions">
            <h1 style="font-family: 'Cormorant Garamond';">📋 Manage Orders</h1>
            <div class="search-filter">
                <input type="text" id="searchOrders" placeholder="🔍 Search by Order ID, Customer..." onkeyup="filterOrders()">
                <select id="statusFilter" onchange="filterOrders()">
                    <option value="all">📊 All Status</option>
                    <option value="Processing">⏳ Processing</option>
                    <option value="Shipped">🚚 Shipped</option>
                    <option value="Out for Delivery">📦 Out for Delivery</option>
                    <option value="Delivered">✅ Delivered</option>
                    <option value="Cancelled">❌ Cancelled</option>
                    <option value="Pending (COD)">💰 Pending (COD)</option>
                </select>
                <button class="btn btn-sm" onclick="resetFilters()">Reset</button>
            </div>
        </div>
        <div id="ordersList" class="orders-grid"><div class="loading">Loading orders...</div></div>
    </div>

    <!-- Order Details Modal -->
    <div id="orderModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center;">
        <div style="background: white; border-radius: 24px; padding: 2rem; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h3>Order Details</h3>
                <button onclick="closeOrderModal()" style="background: none; border: none; font-size: 1.5rem; cursor: pointer;">&times;</button>
            </div>
            <div id="orderModalContent"></div>
        </div>
    </div>

    <script src="js/navigation.js"></script>
    <script src="js/utils.js"></script>
    <script>
        let allOrders = [], allProducts = [];

        function checkAdminAccess() {
            const user = getCurrentUser();
            if (!user) { window.location.href = 'login.html'; return false; }
            if (user.role !== 'admin') { window.location.href = 'index.html'; return false; }
            return true;
        }

        function loadOrders() {
            allOrders = JSON.parse(localStorage.getItem('attar_orders')) || [];
            allProducts = JSON.parse(localStorage.getItem('attar_products')) || [];
            renderOrders();
        }

        function renderOrders() {
            const searchTerm = document.getElementById('searchOrders')?.value.toLowerCase() || '';
            const statusFilter = document.getElementById('statusFilter')?.value || 'all';
            let filtered = allOrders;
            if (statusFilter !== 'all') filtered = filtered.filter(o => o.status === statusFilter);
            if (searchTerm) filtered = filtered.filter(o => o.id.toLowerCase().includes(searchTerm) || (o.customer?.name && o.customer.name.toLowerCase().includes(searchTerm)) || (o.user && o.user.toLowerCase().includes(searchTerm)));
            filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
            
            const container = document.getElementById('ordersList');
            if (filtered.length === 0) { container.innerHTML = '<div class="empty-orders">📭 No orders found</div>'; return; }
            
            // Calculate revenue from CONFIRMED payments ONLY (not COD pending)
            const confirmedRevenue = filtered.filter(o => o.paymentConfirmed === true).reduce((sum, o) => sum + (o.total || 0), 0);
            const pendingRevenue = filtered.filter(o => o.paymentConfirmed === false && o.status !== 'Cancelled' && o.status !== 'Delivered').reduce((sum, o) => sum + (o.total || 0), 0);
            
            let statsHtml = `
                <div class="stats-summary">
                    <span class="stat-pill">📊 Total Orders: ${filtered.length}</span>
                    <span class="stat-pill revenue-total">💰 Confirmed Revenue: ৳${confirmedRevenue.toLocaleString()}</span>
                    <span class="stat-pill">⏳ Pending Payment: ৳${pendingRevenue.toLocaleString()}</span>
                </div>
            `;
            
            const ordersHtml = filtered.map(order => `
                <div class="order-card">
                    <div class="order-header">
                        <div><span class="order-id">#${order.id}</span><div class="order-date">📅 ${formatDate(order.date)}</div></div>
                        <div>
                            <select class="status-select" onchange="updateOrderStatus('${order.id}', this.value)">
                                <option value="Processing" ${order.status === 'Processing' ? 'selected' : ''}>⏳ Processing</option>
                                <option value="Shipped" ${order.status === 'Shipped' ? 'selected' : ''}>🚚 Shipped</option>
                                <option value="Out for Delivery" ${order.status === 'Out for Delivery' ? 'selected' : ''}>📦 Out for Delivery</option>
                                <option value="Delivered" ${order.status === 'Delivered' ? 'selected' : ''}>✅ Delivered</option>
                                <option value="Cancelled" ${order.status === 'Cancelled' ? 'selected' : ''}>❌ Cancelled</option>
                                <option value="Pending (COD)" ${order.status === 'Pending (COD)' ? 'selected' : ''}>💰 Pending (COD)</option>
                            </select>
                            <span class="payment-badge ${order.paymentConfirmed ? 'payment-confirmed' : 'payment-pending'}">
                                ${order.paymentConfirmed ? '✓ Payment Received' : '⏳ Payment Pending'}
                            </span>
                        </div>
                    </div>
                    <div class="order-customer">
                        <div class="customer-avatar">${(order.customer?.name?.charAt(0) || order.user?.charAt(0) || 'U').toUpperCase()}</div>
                        <div><div class="customer-name">${escapeHtml(order.customer?.name || order.user || 'Guest')}</div><div>📞 ${escapeHtml(order.customer?.phone || 'N/A')}</div></div>
                    </div>
                    <div class="order-items"><div style="font-weight:600; margin-bottom:0.5rem;">Items (${order.items?.length || 0})</div>
                        ${order.items?.slice(0,2).map(item => `<div class="order-item-small"><span>${escapeHtml(item.name)} x ${item.quantity}</span><span>৳${(item.price * item.quantity).toLocaleString()}</span></div>`).join('')}
                        ${order.items?.length > 2 ? `<div class="order-item-small" style="color:#999;">+ ${order.items.length-2} more</div>` : ''}
                    </div>
                    <div class="order-total"><span>Total:</span><span style="font-size:1.2rem;color:var(--primary);">৳${(order.total || 0).toLocaleString()}</span></div>
                    <div class="tracking-box"><i class="fas fa-truck"></i> Tracking: ${order.trackingNumber || 'Not generated'}
                        <button class="btn btn-sm btn-success" onclick="generateTrackingNumber('${order.id}')" style="margin-left:0.5rem;"><i class="fas fa-qrcode"></i> Generate</button>
                    </div>
                    <div class="order-actions">
                        <button class="btn btn-sm btn-primary" onclick="viewOrderDetails('${order.id}')"><i class="fas fa-eye"></i> Details</button>
                        <button class="btn btn-sm" onclick="window.location.href='order-tracking.html?order=${order.id}'"><i class="fas fa-map-marker-alt"></i> Track</button>
                        ${order.status !== 'Delivered' && order.status !== 'Cancelled' ? `<button class="btn btn-sm btn-danger" onclick="cancelOrder('${order.id}')"><i class="fas fa-times"></i> Cancel</button>` : ''}
                    </div>
                </div>
            `).join('');
            container.innerHTML = statsHtml + ordersHtml;
        }

        function filterOrders() { renderOrders(); }
        function resetFilters() { document.getElementById('searchOrders').value = ''; document.getElementById('statusFilter').value = 'all'; renderOrders(); }

        function updateOrderStatus(orderId, newStatus) {
            const order = allOrders.find(o => o.id === orderId);
            if (order) {
                const oldStatus = order.status;
                order.status = newStatus;
                
                // When order is delivered and was COD, mark payment as confirmed
                if (newStatus === 'Delivered' && order.paymentMethod === 'cod' && order.paymentConfirmed === false) {
                    order.paymentConfirmed = true;
                    // Award loyalty points now that payment is received
                    let points = parseInt(localStorage.getItem('loyalty_points')) || 0;
                    points += Math.floor(order.total / 100);
                    localStorage.setItem('loyalty_points', points);
                    showToast(`Order delivered! Payment confirmed. Customer earned ${Math.floor(order.total / 100)} points.`);
                }
                
                localStorage.setItem('attar_orders', JSON.stringify(allOrders));
                showToast(`Order ${orderId} status updated to ${newStatus}`);
                renderOrders();
                // Update admin dashboard stats if open
                if (window.opener) window.opener.location.reload();
            }
        }

        function generateTrackingNumber(orderId) {
            const order = allOrders.find(o => o.id === orderId);
            if (order) {
                const newTracking = 'TRK' + Date.now().toString().slice(-8) + Math.floor(Math.random() * 1000);
                order.trackingNumber = newTracking;
                localStorage.setItem('attar_orders', JSON.stringify(allOrders));
                showToast(`Tracking: ${newTracking}`);
                renderOrders();
            }
        }

        function cancelOrder(orderId) {
            if (confirm('Cancel this order?')) {
                const order = allOrders.find(o => o.id === orderId);
                if (order && (order.status === 'Processing' || order.status === 'Pending (COD)')) {
                    order.status = 'Cancelled';
                    // Return stock to inventory
                    order.items.forEach(item => {
                        const product = allProducts.find(p => p.id === item.id);
                        if (product) product.stock += item.quantity;
                    });
                    localStorage.setItem('attar_products', JSON.stringify(allProducts));
                    localStorage.setItem('attar_orders', JSON.stringify(allOrders));
                    showToast('Order cancelled');
                    renderOrders();
                } else { showToast('Cannot cancel this order'); }
            }
        }

        function viewOrderDetails(orderId) {
            const order = allOrders.find(o => o.id === orderId);
            if (!order) return;
            const modal = document.getElementById('orderModal');
            const content = document.getElementById('orderModalContent');
            content.innerHTML = `
                <p><strong>Order ID:</strong> ${order.id}</p>
                <p><strong>Date:</strong> ${formatDate(order.date)}</p>
                <p><strong>Status:</strong> <span class="status-badge status-${order.status.toLowerCase().replace(/ /g,'-')}">${order.status}</span></p>
                <p><strong>Payment:</strong> ${order.paymentMethod} | ${order.paymentConfirmed ? '✅ Received' : '⏳ Pending'}</p>
                <p><strong>Tracking:</strong> ${order.trackingNumber || 'N/A'}</p>
                <hr><h4>Customer</h4>
                <p>${escapeHtml(order.customer?.name || order.user)}<br>📞 ${order.customer?.phone}<br>📍 ${order.customer?.address}, ${order.customer?.city}</p>
                <hr><h4>Items</h4>
                ${order.items?.map(i => `<p>${escapeHtml(i.name)} x ${i.quantity} = ৳${(i.price * i.quantity).toLocaleString()}</p>`).join('')}
                <hr><h4>Total: ৳${order.total.toLocaleString()}</h4>
                ${order.transactionId ? `<p><small>Transaction ID: ${order.transactionId}</small></p>` : ''}
            `;
            modal.style.display = 'flex';
        }

        function closeOrderModal() { document.getElementById('orderModal').style.display = 'none'; }

        window.filterOrders = filterOrders;
        window.resetFilters = resetFilters;
        window.updateOrderStatus = updateOrderStatus;
        window.generateTrackingNumber = generateTrackingNumber;
        window.cancelOrder = cancelOrder;
        window.viewOrderDetails = viewOrderDetails;
        window.closeOrderModal = closeOrderModal;

        if (checkAdminAccess()) loadOrders();
    </script>
</body>
</html>
