<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wishlist - WE ARE MUSLIM</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .wishlist-container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .share-wishlist {
            text-align: right;
            margin-bottom: 1rem;
        }

        .empty-wishlist {
            text-align: center;
            padding: 4rem;
            background: white;
            border-radius: 20px;
        }

        .product-card {
            background: var(--surface);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s ease;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
        }

        .product-actions {
            position: absolute;
            top: 1rem;
            right: 1rem;
            display: flex;
            gap: 0.5rem;
            z-index: 2;
        }

        .product-actions button {
            background: white;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .product-actions button:hover {
            background: var(--danger);
            color: white;
        }

        .product-img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .product-info {
            padding: 1rem;
        }

        .product-title {
            font-weight: 600;
            font-size: 1rem;
        }

        .product-price {
            color: var(--primary);
            font-size: 1.2rem;
            font-weight: 700;
            margin: 0.5rem 0;
        }

        .stock-status {
            font-size: 0.8rem;
            margin: 0.5rem 0;
        }

        .in-stock {
            color: var(--success);
        }

        .out-of-stock {
            color: var(--danger);
        }
    </style>
</head>
<body>

<div id="navigation-placeholder"></div>

<div class="wishlist-container">
    <div class="share-wishlist">
        <button class="btn btn-primary" onclick="shareWishlist()" style="width: auto;">
            <i class="fas fa-share-alt"></i> Share Wishlist
        </button>
    </div>
    <h1 style="font-family: 'Cormorant Garamond'; font-size: 2.5rem;">My Wishlist</h1>
    <div id="wishlistGrid" class="product-grid"></div>
</div>

<script src="js/navigation.js"></script>
<script src="js/utils.js"></script>
<script>
    let wishlist = [];
    let products = [];

    function checkWishlistAccess() {
        const user = getCurrentUser();
        if (!user) {
            showToast('⚠️ Please login to view your wishlist', 'error');
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 1500);
            return false;
        }
        return true;
    }

    function loadWishlistData() {
        if (!checkWishlistAccess()) {
            return;
        }
        
        products = JSON.parse(localStorage.getItem('attar_products')) || [];
        wishlist = JSON.parse(localStorage.getItem('attar_wishlist')) || [];
        displayWishlist();
    }

    function displayWishlist() {
        const wishlistProducts = products.filter(p => wishlist.includes(p.id));
        const grid = document.getElementById('wishlistGrid');

        if (wishlistProducts.length === 0) {
            grid.innerHTML = `
                <div class="empty-wishlist">
                    <i class="far fa-heart" style="font-size: 4rem; color: var(--primary);"></i>
                    <h2 style="margin: 1rem 0;">Your wishlist is empty</h2>
                    <p>Save your favorite items here for later!</p>
                    <button class="btn btn-primary" onclick="window.location.href='shop.html'" style="width: auto; margin-top: 1rem; padding: 0.8rem 2rem;">Start Shopping →</button>
                </div>
            `;
            return;
        }

        grid.innerHTML = wishlistProducts.map(p => `
            <div class="product-card">
                <div class="product-actions">
                    <button onclick="event.stopPropagation(); removeFromWishlist(${p.id})"><i class="fas fa-trash"></i></button>
                </div>
                <img class="product-img" src="${p.image}" onclick="viewProduct(${p.id})" onerror="this.src='https://via.placeholder.com/300x250?text=Attar'">
                <div class="product-info" onclick="viewProduct(${p.id})">
                    <div class="product-title">${escapeHtml(p.name)}</div>
                    <p style="color: #666;">${escapeHtml(p.brand)} | ${escapeHtml(p.fragrance)}</p>
                    <div class="product-price">৳${p.price.toLocaleString()}</div>
                    <div class="stock-status ${p.stock > 0 ? 'in-stock' : 'out-of-stock'}">
                        ${p.stock > 0 ? '✓ In Stock' : '✗ Out of Stock'}
                    </div>
                    ${p.stock > 0 ?
                        `<button class="btn btn-primary" style="width:100%; margin-top: 10px;" onclick="event.stopPropagation(); moveToCart(${p.id})">
                            <i class="fas fa-shopping-cart"></i> Move to Cart
                        </button>` :
                        `<button class="btn" style="width:100%; margin-top: 10px; background: #6b7280; color: white;" onclick="event.stopPropagation(); showStockAlert(${p.id})">
                            <i class="fas fa-bell"></i> Notify Me
                        </button>`
                    }
                </div>
            </div>
        `).join('');
    }

    function moveToCart(productId) {
        const product = products.find(p => p.id === productId);
        if (product.stock === 0) {
            showToast('Sorry, this product is out of stock!');
            return;
        }

        let cart = JSON.parse(localStorage.getItem('attar_cart')) || [];
        let item = cart.find(i => i.id === productId);
        if (item) {
            item.quantity++;
        } else {
            cart.push({ id: productId, quantity: 1 });
        }
        localStorage.setItem('attar_cart', JSON.stringify(cart));
        updateNavCartCount();

        removeFromWishlist(productId);
        showToast(`${product.name} moved to cart!`);
    }

    function removeFromWishlist(productId) {
        const product = products.find(p => p.id === productId);
        wishlist = wishlist.filter(id => id !== productId);
        localStorage.setItem('attar_wishlist', JSON.stringify(wishlist));
        updateNavWishlistCount();
        displayWishlist();
        showToast(`${product?.name} removed from wishlist`);
    }

    function showStockAlert(productId) {
        const product = products.find(p => p.id === productId);
        const email = prompt(`Notify me when ${product.name} is back in stock.\n\nEnter your email:`);
        if (email && email.includes('@')) {
            let waitlist = JSON.parse(localStorage.getItem('stock_waitlist')) || [];
            waitlist.push({ productId: product.id, productName: product.name, email: email, date: new Date().toISOString() });
            localStorage.setItem('stock_waitlist', JSON.stringify(waitlist));
            showToast(`We'll notify you when ${product.name} is back!`);
        }
    }

    function shareWishlist() {
        const wishlistProducts = products.filter(p => wishlist.includes(p.id));
        const productNames = wishlistProducts.map(p => p.name).join(', ');
        const shareText = `Check out my wishlist at WE ARE MUSLIM! I'm interested in: ${productNames}`;

        if (navigator.share) {
            navigator.share({ title: 'My Wishlist - WE ARE MUSLIM', text: shareText, url: window.location.href });
        } else {
            prompt('Share this wishlist link:', window.location.href);
        }
    }

    function viewProduct(id) {
        localStorage.setItem('viewProductId', id);
        window.location.href = 'products.html';
    }

    window.moveToCart = moveToCart;
    window.removeFromWishlist = removeFromWishlist;
    window.shareWishlist = shareWishlist;
    window.showStockAlert = showStockAlert;
    window.viewProduct = viewProduct;

    loadWishlistData();
</script>
</body>
</html>
