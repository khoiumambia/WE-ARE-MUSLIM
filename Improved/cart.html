<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - WE ARE MUSLIM</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .cart-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .cart-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .cart-header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .cart-layout {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 2rem;
        }

        .cart-items-card {
            background: white;
            border-radius: 24px;
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
        }

        .cart-items-header {
            display: grid;
            grid-template-columns: 3fr 1fr 1fr 0.5fr;
            padding: 0.8rem 0;
            border-bottom: 2px solid var(--border);
            font-weight: 600;
            color: var(--text-light);
        }

        .cart-item {
            display: grid;
            grid-template-columns: 3fr 1fr 1fr 0.5fr;
            align-items: center;
            padding: 1.2rem 0;
            border-bottom: 1px solid var(--border);
        }

        .cart-product {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .cart-product-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 12px;
        }

        .cart-product-info h3 {
            font-size: 1rem;
            margin-bottom: 0.3rem;
        }

        .cart-product-info p {
            font-size: 0.8rem;
            color: #666;
        }

        .cart-price {
            font-weight: 600;
            color: var(--primary);
        }

        .quantity-control {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .quantity-control button {
            width: 30px;
            height: 30px;
            border: 1px solid var(--border);
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .quantity-control button:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .quantity-control input {
            width: 50px;
            text-align: center;
            padding: 0.3rem;
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .remove-item {
            background: none;
            border: none;
            color: var(--danger);
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .remove-item:hover {
            transform: scale(1.1);
        }

        .cart-summary {
            background: white;
            border-radius: 24px;
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
            height: fit-content;
            position: sticky;
            top: 100px;
        }

        .cart-summary h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.4rem;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--border);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 0.8rem 0;
        }

        .summary-total {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary);
            border-top: 2px solid var(--border);
            margin-top: 0.5rem;
            padding-top: 1rem;
        }

        .coupon-section {
            margin: 1rem 0;
            padding: 1rem 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        .coupon-input {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .coupon-input input {
            flex: 1;
            padding: 0.7rem;
            border: 1px solid var(--border);
            border-radius: 50px;
        }

        .checkout-btn {
            width: 100%;
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: 600;
            margin-top: 1rem;
        }

        .empty-cart {
            text-align: center;
            padding: 4rem;
            background: white;
            border-radius: 24px;
        }

        .empty-cart i {
            font-size: 4rem;
            color: var(--primary-light);
            margin-bottom: 1rem;
        }

        @media (max-width: 768px) {
            .cart-layout {
                grid-template-columns: 1fr;
            }
            .cart-items-header {
                display: none;
            }
            .cart-item {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            .cart-product {
                flex-direction: column;
                text-align: center;
            }
            .quantity-control {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

<div id="navigation-placeholder"></div>

<div class="cart-container">
    <div class="cart-header">
        <h1><i class="fas fa-shopping-cart"></i> Shopping Cart</h1>
        <p>Review your items before proceeding to checkout</p>
    </div>

    <div id="cartContent"></div>
</div>

<script src="js/navigation.js"></script>
<script src="js/utils.js"></script>
<script>
    let cart = [];
    let products = [];
    let appliedCoupon = null;
    let freeShippingThreshold = 2000;

    const coupons = [
        { code: "WELCOME10", discount: 10, minAmount: 500, type: "percent" },
        { code: "RAMADAN20", discount: 20, minAmount: 1000, type: "percent" },
        { code: "FREESHIP", discount: 60, minAmount: 2000, type: "fixed" },
        { code: "EIDSPECIAL", discount: 25, minAmount: 3000, type: "percent" },
        { code: "SAVE50", discount: 50, minAmount: 1000, type: "fixed" }
    ];

    function checkCartAccess() {
        const user = getCurrentUser();
        if (!user) {
            showToast('⚠️ Please login to view your cart', 'error');
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 1500);
            return false;
        }
        return true;
    }

    function loadCartData() {
        if (!checkCartAccess()) {
            return;
        }
        
        // Load cart and products from localStorage
        cart = JSON.parse(localStorage.getItem('attar_cart')) || [];
        products = JSON.parse(localStorage.getItem('attar_products')) || [];
        
        console.log('Cart loaded:', cart);
        console.log('Products loaded:', products);
        
        renderCart();
    }

    function renderCart() {
        const container = document.getElementById('cartContent');
        
        if (!cart || cart.length === 0) {
            container.innerHTML = `
                <div class="empty-cart">
                    <i class="fas fa-shopping-cart"></i>
                    <h2>Your cart is empty</h2>
                    <p>Looks like you haven't added any items to your cart yet.</p>
                    <button class="btn btn-primary" onclick="window.location.href='shop.html'" style="margin-top: 1rem;">
                        <i class="fas fa-shop"></i> Continue Shopping
                    </button>
                </div>
            `;
            return;
        }

        // Calculate totals first
        const totals = calculateTotals();
        
        container.innerHTML = `
            <div class="cart-layout">
                <div class="cart-items-card">
                    <div class="cart-items-header">
                        <span>Product</span>
                        <span>Price</span>
                        <span>Quantity</span>
                        <span>Total</span>
                    </div>
                    <div id="cartItemsList"></div>
                </div>
                
                <div class="cart-summary">
                    <h3>Order Summary</h3>
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span id="summarySubtotal">৳${totals.subtotal.toLocaleString()}</span>
                    </div>
                    <div class="summary-row" style="color: green;">
                        <span>Discount</span>
                        <span id="summaryDiscount">-৳${totals.discount.toLocaleString()}</span>
                    </div>
                    <div class="summary-row">
                        <span>Delivery Charge</span>
                        <span id="summaryDelivery">${totals.deliveryCharge === 0 ? 'Free' : `৳${totals.deliveryCharge}`}</span>
                    </div>
                    <div class="summary-total">
                        <span>Total Amount</span>
                        <span id="summaryTotal">৳${totals.total.toLocaleString()}</span>
                    </div>
                    
                    <div class="coupon-section">
                        <label style="font-weight: 600;"><i class="fas fa-tag"></i> Apply Coupon</label>
                        <div class="coupon-input">
                            <input type="text" id="cartCouponCode" placeholder="Enter coupon code">
                            <button class="btn btn-primary" onclick="applyCartCoupon()">Apply</button>
                        </div>
                        <div id="cartCouponMessage" style="font-size: 0.8rem; margin-top: 0.5rem;"></div>
                    </div>
                    
                    <button class="btn btn-primary checkout-btn" onclick="proceedToCheckout()">
                        <i class="fas fa-credit-card"></i> Proceed to Checkout
                    </button>
                    
                    <button class="btn" onclick="window.location.href='shop.html'" style="width:100%; margin-top: 0.5rem;">
                        <i class="fas fa-shop"></i> Continue Shopping
                    </button>
                </div>
            </div>
        `;
        
        renderCartItems();
    }

    function renderCartItems() {
        const container = document.getElementById('cartItemsList');
        if (!container) return;
        
        let cartHtml = '';
        
        for (const item of cart) {
            const product = products.find(p => p.id === item.id);
            if (!product) {
                console.warn('Product not found for id:', item.id);
                continue;
            }
            
            const itemTotal = product.price * item.quantity;
            
            cartHtml += `
                <div class="cart-item">
                    <div class="cart-product">
                        <img class="cart-product-img" src="${product.image}" onerror="this.src='https://via.placeholder.com/80'">
                        <div class="cart-product-info">
                            <h3>${escapeHtml(product.name)}</h3>
                            <p>${escapeHtml(product.brand)} | ${escapeHtml(product.fragrance)}</p>
                            ${product.stock <= 5 && product.stock > 0 ? `<p style="color: var(--warning);">⚠️ Only ${product.stock} left</p>` : ''}
                        </div>
                    </div>
                    <div class="cart-price">৳${product.price.toLocaleString()}</div>
                    <div class="quantity-control">
                        <button onclick="updateQuantity(${item.id}, -1)">-</button>
                        <input type="number" id="qty_${item.id}" value="${item.quantity}" min="1" max="${product.stock}" readonly>
                        <button onclick="updateQuantity(${item.id}, 1)">+</button>
                    </div>
                    <div class="cart-price">৳${itemTotal.toLocaleString()}</div>
                    <button class="remove-item" onclick="removeFromCart(${item.id})"><i class="fas fa-trash-alt"></i></button>
                </div>
            `;
        }
        
        if (cartHtml === '') {
            container.innerHTML = '<div style="text-align: center; padding: 2rem;">No valid items in cart</div>';
        } else {
            container.innerHTML = cartHtml;
        }
    }

    function calculateTotals() {
        let subtotal = 0;
        
        // Calculate subtotal from cart items
        for (const item of cart) {
            const product = products.find(p => p.id === item.id);
            if (product) {
                subtotal += product.price * item.quantity;
            }
        }

        // Calculate discount
        let discountAmount = 0;
        if (appliedCoupon) {
            if (appliedCoupon.type === 'percent') {
                discountAmount = (subtotal * appliedCoupon.discount) / 100;
            } else if (appliedCoupon.type === 'fixed') {
                discountAmount = appliedCoupon.discount;
            }
            discountAmount = Math.min(discountAmount, subtotal);
        }

        // Calculate delivery charge (free over threshold)
        const afterDiscount = subtotal - discountAmount;
        const deliveryCharge = afterDiscount >= freeShippingThreshold ? 0 : 60;
        
        // Calculate final total
        const total = afterDiscount + deliveryCharge;
        
        console.log('Totals calculated:', { subtotal, discountAmount, deliveryCharge, total });
        
        return {
            subtotal: subtotal,
            discount: discountAmount,
            deliveryCharge: deliveryCharge,
            total: total
        };
    }

    function updateSummaryDisplay() {
        const totals = calculateTotals();
        
        const subtotalEl = document.getElementById('summarySubtotal');
        const discountEl = document.getElementById('summaryDiscount');
        const deliveryEl = document.getElementById('summaryDelivery');
        const totalEl = document.getElementById('summaryTotal');
        
        if (subtotalEl) subtotalEl.innerHTML = `৳${totals.subtotal.toLocaleString()}`;
        if (discountEl) discountEl.innerHTML = `-৳${totals.discount.toLocaleString()}`;
        if (deliveryEl) deliveryEl.innerHTML = totals.deliveryCharge === 0 ? 'Free' : `৳${totals.deliveryCharge}`;
        if (totalEl) totalEl.innerHTML = `৳${totals.total.toLocaleString()}`;
    }

    function updateQuantity(productId, change) {
        const product = products.find(p => p.id === productId);
        const itemIndex = cart.findIndex(i => i.id === productId);
        
        if (itemIndex === -1 || !product) return;
        
        let newQuantity = cart[itemIndex].quantity + change;
        
        if (newQuantity < 1) {
            removeFromCart(productId);
            return;
        }
        
        if (newQuantity > product.stock) {
            showToast(`Only ${product.stock} units available in stock`);
            return;
        }
        
        cart[itemIndex].quantity = newQuantity;
        localStorage.setItem('attar_cart', JSON.stringify(cart));
        updateNavCartCount();
        
        // Re-render both cart items and update summary
        renderCartItems();
        updateSummaryDisplay();
    }

    function removeFromCart(productId) {
        const product = products.find(p => p.id === productId);
        cart = cart.filter(i => i.id !== productId);
        localStorage.setItem('attar_cart', JSON.stringify(cart));
        updateNavCartCount();
        
        if (cart.length === 0) {
            renderCart(); // This will show empty cart message
        } else {
            renderCartItems();
            updateSummaryDisplay();
        }
        
        showToast(`${product?.name || 'Item'} removed from cart`);
    }

    function applyCartCoupon() {
        const code = document.getElementById('cartCouponCode').value.trim().toUpperCase();
        const coupon = coupons.find(c => c.code === code);
        const messageDiv = document.getElementById('cartCouponMessage');
        
        const totals = calculateTotals();
        const subtotal = totals.subtotal;

        if (!coupon) {
            messageDiv.innerHTML = '<span style="color: red;">❌ Invalid coupon code</span>';
            return;
        }

        if (subtotal < coupon.minAmount) {
            messageDiv.innerHTML = `<span style="color: red;">❌ Minimum order amount ৳${coupon.minAmount} required</span>`;
            return;
        }

        appliedCoupon = coupon;
        messageDiv.innerHTML = `<span style="color: green;">✅ Coupon applied! ${coupon.discount}${coupon.type === 'percent' ? '%' : '৳'} off</span>`;
        updateSummaryDisplay();
    }

    function proceedToCheckout() {
        if (!requireLogin('proceed to checkout')) {
            return;
        }
        
        if (!cart || cart.length === 0) {
            showToast('Your cart is empty!');
            return;
        }
        
        // Save applied coupon to localStorage for payment page
        if (appliedCoupon) {
            localStorage.setItem('applied_coupon', JSON.stringify(appliedCoupon));
        } else {
            localStorage.removeItem('applied_coupon');
        }
        
        window.location.href = 'payment.html';
    }

    // Make functions global
    window.updateQuantity = updateQuantity;
    window.removeFromCart = removeFromCart;
    window.applyCartCoupon = applyCartCoupon;
    window.proceedToCheckout = proceedToCheckout;

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', function() {
        loadCartData();
    });
</script>
</body>
</html>
