<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - WE ARE MUSLIM</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .product-detail-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .product-detail {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            background: white;
            padding: 2rem;
            border-radius: 30px;
            margin-bottom: 2rem;
        }

        .main-image {
            width: 100%;
            border-radius: 20px;
            cursor: pointer;
        }

        .thumbnail-grid {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .thumbnail {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 10px;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .thumbnail.active {
            border-color: var(--primary);
        }

        .price {
            font-size: 2rem;
            color: var(--primary);
            font-weight: 700;
        }

        .quantity-selector {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1rem 0;
        }

        .quantity-selector button {
            width: 40px;
            height: 40px;
            border: 1px solid var(--border);
            background: white;
            border-radius: 10px;
            cursor: pointer;
        }

        .quantity-selector input {
            width: 60px;
            text-align: center;
            padding: 0.5rem;
            border: 1px solid var(--border);
            border-radius: 10px;
        }

        .review-card {
            border-bottom: 1px solid var(--border);
            padding: 1.5rem;
            margin-bottom: 1rem;
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
            flex-wrap: wrap;
        }

        .reviewer-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .reviewer-avatar {
            width: 40px;
            height: 40px;
            background: var(--primary-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .reviewer-name {
            font-weight: 600;
        }

        .review-rating {
            color: var(--accent);
            font-size: 0.9rem;
        }

        .review-date {
            font-size: 0.75rem;
            color: #999;
        }

        .review-text {
            margin: 0.8rem 0;
            line-height: 1.6;
        }

        .review-images {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin-top: 0.8rem;
        }

        .review-image {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s ease;
            border: 1px solid var(--border);
        }

        .review-image:hover {
            transform: scale(1.05);
            box-shadow: var(--shadow-sm);
        }

        .review-helpful {
            margin-top: 0.8rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .helpful-btn {
            background: none;
            border: 1px solid var(--border);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s ease;
        }

        .helpful-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .review-form {
            margin-top: 2rem;
            padding: 1.5rem;
            background: var(--background);
            border-radius: 20px;
        }

        .review-form h3 {
            margin-bottom: 1rem;
            font-family: 'Cormorant Garamond', serif;
        }

        .rating-select {
            display: flex;
            gap: 0.5rem;
            margin: 1rem 0;
        }

        .rating-star {
            font-size: 1.8rem;
            cursor: pointer;
            color: #ddd;
            transition: all 0.2s ease;
        }

        .rating-star.selected,
        .rating-star:hover {
            color: var(--accent);
        }

        .review-form input,
        .review-form textarea {
            width: 100%;
            padding: 0.8rem;
            margin: 0.5rem 0;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-family: inherit;
        }

        .review-form textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* Photo Upload Styles */
        .photo-upload-section {
            margin: 1rem 0;
        }

        .photo-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-light);
        }

        .photo-input-wrapper {
            position: relative;
            display: inline-block;
        }

        .photo-input {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .photo-preview-grid {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        .photo-preview-item {
            position: relative;
            width: 100px;
            height: 100px;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid var(--border);
        }

        .photo-preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .remove-photo-btn {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 24px;
            height: 24px;
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: all 0.2s ease;
        }

        .remove-photo-btn:hover {
            transform: scale(1.1);
        }

        .add-photo-btn {
            width: 100px;
            height: 100px;
            border: 2px dashed var(--border);
            border-radius: 12px;
            background: var(--background);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .add-photo-btn:hover {
            border-color: var(--primary);
            background: rgba(139, 94, 60, 0.05);
        }

        .add-photo-btn i {
            font-size: 2rem;
            color: var(--primary-light);
            margin-bottom: 0.3rem;
        }

        .add-photo-btn span {
            font-size: 0.7rem;
            color: #666;
        }

        .photo-limit-warning {
            font-size: 0.7rem;
            color: #999;
            margin-top: 0.3rem;
        }

        /* Image Lightbox Modal */
        .lightbox-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 3000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .lightbox-modal.open {
            display: flex;
        }

        .lightbox-image {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 2rem;
            cursor: pointer;
        }

        .related-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .related-card {
            background: var(--surface);
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .related-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
        }

        .related-img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .related-info {
            padding: 0.8rem;
            text-align: center;
        }

        @media (max-width: 768px) {
            .product-detail {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div id="navigation-placeholder"></div>

    <div class="product-detail-container" id="productContainer">
        <div class="loading">Loading product details...</div>
    </div>

    <!-- Image Lightbox Modal -->
    <div id="lightboxModal" class="lightbox-modal" onclick="closeLightbox()">
        <span class="lightbox-close">&times;</span>
        <img class="lightbox-image" id="lightboxImage" src="">
    </div>

    <script src="js/navigation.js"></script>
    <script src="js/utils.js"></script>
    <script>
        let products = [];
        let reviews = [];
        let currentProduct = null;
        let quantity = 1;
        let selectedRating = 0;
        let selectedImages = [];
        let currentUser = null;
        const MAX_REVIEW_IMAGES = 5;
        const MAX_IMAGE_SIZE_MB = 5;

        function loadProductData() {
            products = JSON.parse(localStorage.getItem('attar_products')) || [];
            reviews = JSON.parse(localStorage.getItem('attar_reviews')) || [];
            currentUser = getCurrentUser();

            const productId = parseInt(localStorage.getItem('viewProductId'));
            currentProduct = products.find(p => p.id === productId);

            if (currentProduct) {
                displayProduct();
                displayReviews();
                displayRelatedProducts();
            } else {
                document.getElementById('productContainer').innerHTML = '<div style="text-align: center; padding: 3rem;">Product not found</div>';
            }
        }

        function displayProduct() {
            const container = document.getElementById('productContainer');
            const stockStatus = currentProduct.stock > 10 ? 'in-stock' : (currentProduct.stock > 0 ? 'low-stock' : 'out-of-stock');
            const stockText = currentProduct.stock > 10 ? `✓ In Stock (${currentProduct.stock} units)` : (currentProduct.stock > 0 ? `⚠ Low Stock - Only ${currentProduct.stock} left` : '✗ Out of Stock');
            
            const avgRating = getAverageRating();
            
            container.innerHTML = `
                <div class="product-detail">
                    <div class="product-gallery">
                        <img class="main-image" id="mainImage" src="${currentProduct.image}" onclick="openLightbox('${currentProduct.image}')">
                        <div class="thumbnail-grid" id="thumbnailGrid">
                            <img class="thumbnail active" src="${currentProduct.image}" onclick="changeImage('${currentProduct.image}')">
                        </div>
                    </div>
                    <div class="product-info">
                        <h1 style="font-family: 'Cormorant Garamond';">${escapeHtml(currentProduct.name)}</h1>
                        <p style="color: #666;">${escapeHtml(currentProduct.brand)} | ${escapeHtml(currentProduct.fragrance)}</p>
                        
                        <div class="rating">
                            <div class="stars" style="color: var(--accent); font-size: 1.2rem;">${'★'.repeat(Math.floor(avgRating))}${'☆'.repeat(5-Math.floor(avgRating))}</div>
                            <span>${avgRating.toFixed(1)} (${reviews.filter(r => r.productId === currentProduct.id).length} reviews)</span>
                        </div>
                        
                        <div class="price">৳${currentProduct.price.toLocaleString()}</div>
                        
                        <p style="margin: 1rem 0; line-height: 1.8;">${currentProduct.desc || 'Experience the exquisite blend of traditional craftsmanship and pure ingredients. This premium attar is carefully crafted to provide a lasting fragrance experience.'}</p>
                        
                        <div class="stock-status ${stockStatus}">${stockText}</div>
                        
                        <div class="quantity-selector">
                            <button onclick="changeQuantity(-1)">-</button>
                            <input type="number" id="quantity" value="1" min="1" max="${currentProduct.stock || 0}" readonly>
                            <button onclick="changeQuantity(1)">+</button>
                        </div>
                        
                        <div>
                            ${currentProduct.stock > 0 ? 
                                `<button class="btn btn-primary" onclick="addToCart()">
                                    <i class="fas fa-shopping-cart"></i> Add to Cart
                                </button>` :
                                `<button class="btn btn-primary" onclick="showStockAlert()">
                                    <i class="fas fa-bell"></i> Notify Me When in Stock
                                </button>`
                            }
                            <button class="btn btn-outline" onclick="addToWishlist()">
                                <i class="far fa-heart"></i> Wishlist
                            </button>
                            <button class="btn btn-outline" onclick="shareProduct()">
                                <i class="fas fa-share-alt"></i> Share
                            </button>
                        </div>
                        
                        <div style="margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border);">
                            <p><i class="fas fa-truck"></i> Free shipping on orders over ৳2000</p>
                            <p><i class="fas fa-undo"></i> 7-day easy returns</p>
                            <p><i class="fas fa-shield-alt"></i> 100% authentic products</p>
                        </div>
                    </div>
                </div>
                
                <div class="reviews-section">
                    <h2 style="font-family: 'Cormorant Garamond';">Customer Reviews (${reviews.filter(r => r.productId === currentProduct.id).length})</h2>
                    <div id="reviewsList"></div>
                    
                    <div class="review-form">
                        <h3>Write a Review</h3>
                        <div class="rating-select" id="ratingSelect">
                            ${[1, 2, 3, 4, 5].map(i => `<span class="rating-star" data-rating="${i}" onclick="setRating(${i})">☆</span>`).join('')}
                        </div>
                        <input type="text" id="reviewerName" placeholder="Your name" value="${currentUser?.name || ''}">
                        <textarea id="reviewText" rows="3" placeholder="Share your experience with this attar..."></textarea>
                        
                        <!-- Photo Upload Section -->
                        <div class="photo-upload-section">
                            <label class="photo-label"><i class="fas fa-camera"></i> Add Photos (Optional, up to 5)</label>
                            <div class="photo-preview-grid" id="photoPreviewGrid">
                                <div class="add-photo-btn" onclick="document.getElementById('reviewImageInput').click()">
                                    <i class="fas fa-plus-circle"></i>
                                    <span>Add Photo</span>
                                </div>
                            </div>
                            <div class="photo-limit-warning" id="photoLimitWarning"></div>
                            <input type="file" id="reviewImageInput" accept="image/jpeg,image/png,image/jpg,image/webp" multiple style="display: none;" onchange="handleImageSelect(event)">
                        </div>
                        
                        <button class="btn btn-primary" onclick="submitReview()" style="margin-top: 1rem;">
                            <i class="fas fa-paper-plane"></i> Submit Review
                        </button>
                    </div>
                </div>
                
                <div class="related-products">
                    <h2 style="font-family: 'Cormorant Garamond';">You May Also Like</h2>
                    <div class="related-grid" id="relatedGrid"></div>
                </div>
            `;
        }

        function getAverageRating() {
            const productReviews = reviews.filter(r => r.productId === currentProduct.id);
            if (productReviews.length === 0) return 0;
            const sum = productReviews.reduce((a, b) => a + b.rating, 0);
            return sum / productReviews.length;
        }

        function displayReviews() {
            const productReviews = reviews.filter(r => r.productId === currentProduct.id);
            const container = document.getElementById('reviewsList');
            
            if (!container) return;
            
            if (productReviews.length === 0) {
                container.innerHTML = '<p style="text-align: center; padding: 2rem;">No reviews yet. Be the first to review!</p>';
                return;
            }
            
            container.innerHTML = productReviews.map(r => `
                <div class="review-card">
                    <div class="review-header">
                        <div class="reviewer-info">
                            <div class="reviewer-avatar">${(r.name?.charAt(0) || 'U').toUpperCase()}</div>
                            <div>
                                <div class="reviewer-name">${escapeHtml(r.name)}</div>
                                <div class="review-rating">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</div>
                            </div>
                        </div>
                        <div class="review-date">${formatDate(r.date)}</div>
                    </div>
                    <p class="review-text">${escapeHtml(r.text)}</p>
                    ${r.images && r.images.length > 0 ? `
                        <div class="review-images">
                            ${r.images.map(img => `<img class="review-image" src="${img}" onclick="event.stopPropagation(); openLightbox('${img}')" onerror="this.style.display='none'">`).join('')}
                        </div>
                    ` : ''}
                    <div class="review-helpful">
                        <button class="helpful-btn" onclick="helpfulReview(${r.id})">
                            <i class="far fa-thumbs-up"></i> Helpful (${r.helpful || 0})
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function displayRelatedProducts() {
            const related = products.filter(p => p.id !== currentProduct.id && p.brand === currentProduct.brand).slice(0, 4);
            const container = document.getElementById('relatedGrid');
            
            if (!container) return;
            
            if (related.length === 0) {
                container.innerHTML = '<p>No related products found.</p>';
                return;
            }
            
            container.innerHTML = related.map(p => `
                <div class="related-card" onclick="viewProduct(${p.id})">
                    <img class="related-img" src="${p.image}" onerror="this.src='https://via.placeholder.com/200x150?text=Attar'">
                    <div class="related-info">
                        <strong>${escapeHtml(p.name)}</strong><br>
                        ৳${p.price.toLocaleString()}
                    </div>
                </div>
            `).join('');
        }

        function changeQuantity(delta) {
            const input = document.getElementById('quantity');
            let newVal = parseInt(input.value) + delta;
            if (newVal >= 1 && newVal <= (currentProduct.stock || 0)) {
                input.value = newVal;
                quantity = newVal;
            } else if (newVal > (currentProduct.stock || 0)) {
                showToast('Not enough stock available');
            }
        }

        function changeImage(imageUrl) {
            document.getElementById('mainImage').src = imageUrl;
            document.querySelectorAll('.thumbnail').forEach(thumb => thumb.classList.remove('active'));
            event.target.classList.add('active');
        }

        function addToCart() {
            if (!requireLogin('add items to cart')) {
                return;
            }
            
            if (currentProduct.stock === 0) {
                showStockAlert();
                return;
            }
            
            let cart = JSON.parse(localStorage.getItem('attar_cart')) || [];
            let item = cart.find(i => i.id === currentProduct.id);
            
            if (item) {
                if (item.quantity + quantity <= currentProduct.stock) {
                    item.quantity += quantity;
                } else {
                    showToast('Not enough stock available!');
                    return;
                }
            } else {
                cart.push({ id: currentProduct.id, quantity: quantity });
            }
            
            localStorage.setItem('attar_cart', JSON.stringify(cart));
            updateNavCartCount();
            showToast(`${quantity} × ${currentProduct.name} added to cart!`);
            
            let points = parseInt(localStorage.getItem('loyalty_points')) || 0;
            points += Math.floor((currentProduct.price * quantity) / 100);
            localStorage.setItem('loyalty_points', points);
            updateNavPointsCount();
        }

        function addToWishlist() {
            if (!requireLogin('add items to wishlist')) {
                return;
            }
            
            let wishlist = JSON.parse(localStorage.getItem('attar_wishlist')) || [];
            if (!wishlist.includes(currentProduct.id)) {
                wishlist.push(currentProduct.id);
                localStorage.setItem('attar_wishlist', JSON.stringify(wishlist));
                updateNavWishlistCount();
                showToast('Added to wishlist!');
            } else {
                showToast('Already in wishlist');
            }
        }

        function showStockAlert() {
            const email = prompt('Enter your email to get notified when this product is back in stock:');
            if (email && email.includes('@')) {
                let waitlist = JSON.parse(localStorage.getItem('stock_waitlist')) || [];
                waitlist.push({
                    productId: currentProduct.id,
                    productName: currentProduct.name,
                    email: email,
                    date: new Date().toISOString(),
                    notified: false
                });
                localStorage.setItem('stock_waitlist', JSON.stringify(waitlist));
                showToast(`We'll email you when ${currentProduct.name} is back in stock!`);
            }
        }

        function setRating(rating) {
            selectedRating = rating;
            const stars = document.querySelectorAll('.rating-star');
            stars.forEach((star, index) => {
                star.innerHTML = index < rating ? '★' : '☆';
                star.classList.toggle('selected', index < rating);
            });
        }

        // Image upload handling functions
        function handleImageSelect(event) {
            const files = Array.from(event.target.files);
            const remainingSlots = MAX_REVIEW_IMAGES - selectedImages.length;
            
            if (files.length > remainingSlots) {
                showToast(`You can only upload up to ${MAX_REVIEW_IMAGES} images total. You have ${selectedImages.length} already.`);
                return;
            }
            
            for (const file of files) {
                if (file.size > MAX_IMAGE_SIZE_MB * 1024 * 1024) {
                    showToast(`Image ${file.name} exceeds ${MAX_IMAGE_SIZE_MB}MB limit`);
                    continue;
                }
                
                if (!file.type.startsWith('image/')) {
                    showToast(`File ${file.name} is not an image`);
                    continue;
                }
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    selectedImages.push(e.target.result);
                    updatePhotoPreview();
                };
                reader.readAsDataURL(file);
            }
            
            // Clear the input so same file can be selected again if removed
            event.target.value = '';
        }

        function updatePhotoPreview() {
            const grid = document.getElementById('photoPreviewGrid');
            const warning = document.getElementById('photoLimitWarning');
            
            if (!grid) return;
            
            // Clear all except the add button
            const addButton = grid.querySelector('.add-photo-btn');
            grid.innerHTML = '';
            
            // Add existing images
            selectedImages.forEach((img, index) => {
                const div = document.createElement('div');
                div.className = 'photo-preview-item';
                div.innerHTML = `
                    <img src="${img}">
                    <button class="remove-photo-btn" onclick="removePhoto(${index})">&times;</button>
                `;
                grid.appendChild(div);
            });
            
            // Add the add button if not at max
            if (selectedImages.length < MAX_REVIEW_IMAGES) {
                grid.appendChild(addButton);
            }
            
            // Show warning if at max
            if (warning) {
                if (selectedImages.length >= MAX_REVIEW_IMAGES) {
                    warning.innerHTML = `<span style="color: var(--warning);">⚠️ Maximum ${MAX_REVIEW_IMAGES} photos reached</span>`;
                } else {
                    warning.innerHTML = `${selectedImages.length}/${MAX_REVIEW_IMAGES} photos added (Max ${MAX_IMAGE_SIZE_MB}MB each)`;
                }
            }
        }

        function removePhoto(index) {
            selectedImages.splice(index, 1);
            updatePhotoPreview();
        }

        function submitReview() {
            const currentUser = getCurrentUser();
            if (!currentUser) {
                showToast('Please login to submit a review');
                window.location.href = 'login.html';
                return;
            }
            
            if (selectedRating === 0) {
                showToast('Please select a rating');
                return;
            }
            
            const name = document.getElementById('reviewerName').value || currentUser.name;
            const text = document.getElementById('reviewText').value;
            
            if (!text) {
                showToast('Please write your review');
                return;
            }
            
            const newReview = {
                id: Date.now(),
                productId: currentProduct.id,
                name: name,
                rating: selectedRating,
                text: text,
                images: [...selectedImages], // Save the images
                date: new Date().toISOString(),
                helpful: 0
            };
            
            reviews.push(newReview);
            localStorage.setItem('attar_reviews', JSON.stringify(reviews));
            
            showToast('Thank you for your review!');
            
            // Reset form
            selectedRating = 0;
            selectedImages = [];
            document.getElementById('reviewText').value = '';
            document.querySelectorAll('.rating-star').forEach(star => star.innerHTML = '☆');
            updatePhotoPreview();
            
            // Update product rating
            const avgRating = getAverageRating();
            currentProduct.ratings = avgRating;
            currentProduct.reviews = reviews.filter(r => r.productId === currentProduct.id).length;
            localStorage.setItem('attar_products', JSON.stringify(products));
            
            displayReviews();
        }

        function helpfulReview(reviewId) {
            const review = reviews.find(r => r.id === reviewId);
            if (review) {
                review.helpful = (review.helpful || 0) + 1;
                localStorage.setItem('attar_reviews', JSON.stringify(reviews));
                displayReviews();
                showToast('Thanks for your feedback!');
            }
        }

        function shareProduct() {
            if (navigator.share) {
                navigator.share({
                    title: currentProduct.name,
                    text: `Check out ${currentProduct.name} at WE ARE MUSLIM!`,
                    url: window.location.href
                });
            } else {
                prompt('Share this link:', window.location.href);
            }
        }

        function viewProduct(productId) {
            localStorage.setItem('viewProductId', productId);
            location.reload();
        }

        function openLightbox(imageUrl) {
            const modal = document.getElementById('lightboxModal');
            const lightboxImage = document.getElementById('lightboxImage');
            lightboxImage.src = imageUrl;
            modal.classList.add('open');
        }

        function closeLightbox() {
            const modal = document.getElementById('lightboxModal');
            modal.classList.remove('open');
        }

        // Make functions global
        window.changeQuantity = changeQuantity;
        window.changeImage = changeImage;
        window.addToCart = addToCart;
        window.addToWishlist = addToWishlist;
        window.showStockAlert = showStockAlert;
        window.setRating = setRating;
        window.submitReview = submitReview;
        window.shareProduct = shareProduct;
        window.viewProduct = viewProduct;
        window.helpfulReview = helpfulReview;
        window.removePhoto = removePhoto;
        window.openLightbox = openLightbox;
        window.closeLightbox = closeLightbox;

        loadProductData();
    </script>
</body>

</html>
