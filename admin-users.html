<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users - WE ARE MUSLIM</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #8B5E3C;
            --primary-dark: #6B4423;
            --primary-light: #C4A27A;
            --accent: #D4AF37;
            --background: #FDF8F5;
            --surface: #FFFFFF;
            --border: #E8DDD3;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --text: #2C1810;
            --text-light: #6B4423;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.05);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.08);
            --shadow-lg: 0 16px 48px rgba(0,0,0,0.12);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--background);
        }

        .users-container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .page-header {
            margin-bottom: 2rem;
        }

        .page-header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.5rem;
            font-weight: 600;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .page-header h1 i {
            color: var(--primary);
            font-size: 2rem;
        }

        .page-header p {
            color: var(--text-light);
            margin-top: 0.5rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--surface);
            border-radius: 20px;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease;
            border: 1px solid var(--border);
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
        }

        .stat-icon {
            width: 55px;
            height: 55px;
            background: rgba(139, 94, 60, 0.1);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat-icon i {
            font-size: 1.8rem;
            color: var(--primary);
        }

        .stat-info h3 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
            line-height: 1.2;
        }

        .stat-info p {
            font-size: 0.85rem;
            color: var(--text-light);
        }

        .action-bar {
            background: var(--surface);
            border-radius: 16px;
            padding: 1rem 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
        }

        .search-section {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            flex: 1;
        }

        .search-box {
            position: relative;
            flex: 1;
            min-width: 250px;
        }

        .search-box i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
        }

        .search-box input {
            width: 100%;
            padding: 0.8rem 1rem 0.8rem 2.5rem;
            border: 1px solid var(--border);
            border-radius: 50px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(139, 94, 60, 0.1);
        }

        .filter-select {
            padding: 0.8rem 1rem;
            border: 1px solid var(--border);
            border-radius: 50px;
            background: white;
            cursor: pointer;
        }

        .action-buttons {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .btn-outline:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-sm {
            padding: 0.4rem 1rem;
            font-size: 0.8rem;
        }

        .users-table-wrapper {
            background: var(--surface);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
        }

        .users-table {
            width: 100%;
            overflow-x: auto;
        }

        .users-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .users-table th {
            padding: 1.2rem 1rem;
            text-align: left;
            font-weight: 600;
            color: var(--text-light);
            background: var(--background);
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .users-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        .users-table tr:hover {
            background: rgba(139, 94, 60, 0.02);
        }

        .user-avatar {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .role-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .role-admin {
            background: #9c27b0;
            color: white;
        }

        .role-user {
            background: var(--success);
            color: white;
        }

        .action-icons {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .action-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            background: var(--background);
            color: var(--text);
        }

        .action-icon:hover {
            transform: translateY(-2px);
        }

        .action-icon.view:hover { background: var(--info); color: white; }
        .action-icon.edit:hover { background: var(--warning); color: white; }
        .action-icon.reset:hover { background: #ff9800; color: white; }
        .action-icon.delete:hover { background: var(--danger); color: white; }

        .empty-state {
            text-align: center;
            padding: 4rem;
        }

        .empty-state i {
            font-size: 4rem;
            color: var(--primary-light);
            margin-bottom: 1rem;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--surface);
            border-radius: 24px;
            padding: 2rem;
            max-width: 550px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            animation: modalFadeIn 0.3s ease;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--border);
        }

        .modal-header h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-light);
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            color: var(--danger);
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text);
            font-size: 0.85rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(139, 94, 60, 0.1);
        }

        .form-hint {
            font-size: 0.7rem;
            color: #999;
            margin-top: 0.3rem;
        }

        .loading-users {
            text-align: center;
            padding: 3rem;
        }

        @media (max-width: 768px) {
            .users-container {
                padding: 0 1rem;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .action-bar {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
    <div id="navigation-placeholder"></div>
    <div class="users-container">
        <div class="page-header">
            <h1><i class="fas fa-users"></i> User Management</h1>
            <p>Manage customer accounts, view details, and control access permissions</p>
        </div>

        <div id="statsContainer"></div>

        <div class="action-bar">
            <div class="search-section">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchUsers" placeholder="Search by name, email, or phone..." onkeyup="filterUsers()">
                </div>
                <select id="roleFilter" class="filter-select" onchange="filterUsers()">
                    <option value="all">All Roles</option>
                    <option value="admin">👑 Administrators</option>
                    <option value="user">👤 Customers</option>
                </select>
            </div>
            <div class="action-buttons">
                <button class="btn btn-primary" onclick="showAddUserModal()">
                    <i class="fas fa-plus"></i> Add New User
                </button>
                <button class="btn btn-outline" onclick="loadUsers()">
                    <i class="fas fa-sync-alt"></i> Refresh
                </button>
            </div>
        </div>

        <div class="users-table-wrapper">
            <div class="users-table">
                <table>
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Contact</th>
                            <th>Role</th>
                            <th>Orders</th>
                            <th>Joined</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <tr><td colspan="6" style="text-align: center; padding: 3rem;"><i class="fas fa-spinner fa-spin"></i> Loading users...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- User Details Modal -->
    <div id="userModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-user-circle"></i> User Profile</h3>
                <button class="modal-close" onclick="closeUserModal()">&times;</button>
            </div>
            <div id="userModalContent"></div>
        </div>
    </div>

    <!-- Add/Edit User Modal -->
    <div id="addUserModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="addUserTitle"><i class="fas fa-user-plus"></i> Add New User</h3>
                <button class="modal-close" onclick="closeAddUserModal()">&times;</button>
            </div>
            <form id="addUserForm" onsubmit="event.preventDefault(); saveUser();">
                <input type="hidden" id="editUserId">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" id="userName" required placeholder="Enter full name">
                </div>
                <div class="form-group">
                    <label>Email Address *</label>
                    <input type="email" id="userEmail" required placeholder="user@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="userPassword" placeholder="Enter password (min 6 chars)">
                    <div class="form-hint">* Required for new users. Leave blank to keep current password when editing.</div>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="userPhone" placeholder="+880XXXXXXXXX">
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="userRole">
                        <option value="user">👤 Customer</option>
                        <option value="admin">👑 Administrator</option>
                    </select>
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">
                        <i class="fas fa-save"></i> Save User
                    </button>
                    <button type="button" class="btn btn-outline" onclick="closeAddUserModal()" style="flex: 1;">
                        <i class="fas fa-times"></i> Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Reset Password Modal -->
    <div id="resetPasswordModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-key"></i> Reset Password</h3>
                <button class="modal-close" onclick="closeResetPasswordModal()">&times;</button>
            </div>
            <div id="resetPasswordContent"></div>
        </div>
    </div>

    <script src="js/navigation.js"></script>
    <script src="js/utils.js"></script>
    <script>
        let allUsers = [];
        let allOrders = [];
        let currentAdmin = null;
        let searchTerm = '';
        let roleFilter = 'all';
        let currentResetUser = null;

        function checkAdminAccess() {
            const user = getCurrentUser();
            if (!user) { window.location.href = 'login.html'; return false; }
            if (user.role !== 'admin') { window.location.href = 'index.html'; return false; }
            currentAdmin = user;
            return true;
        }

        async function loadUsers() {
            if (!checkAdminAccess()) return;
            
            const tbody = document.getElementById('usersTableBody');
            if (tbody) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 3rem;"><i class="fas fa-spinner fa-spin"></i> Loading users from database...</td></tr>';
            }
            
            try {
                // Fetch users from API
                const response = await fetch('api/get-users.php');
                const result = await response.json();
                
                if (result.success) {
                    allUsers = result.users || [];
                    console.log('Loaded users:', allUsers.length);
                } else {
                    console.error('API error:', result.error);
                    allUsers = [];
                }
                
                // Fetch orders for order counts
                const ordersResponse = await fetch('api/get-orders.php');
                const ordersResult = await ordersResponse.json();
                if (ordersResult.success) {
                    allOrders = ordersResult.orders || [];
                } else {
                    allOrders = [];
                }
                
                renderStats();
                renderUsers();
            } catch (error) {
                console.error('Error loading users:', error);
                if (tbody) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 3rem; color: red;"><i class="fas fa-exclamation-triangle"></i> Error loading users. Please refresh.</td></tr>';
                }
                allUsers = [];
                renderStats();
                renderUsers();
            }
        }

        function renderStats() {
            const totalUsers = allUsers.length;
            const adminCount = allUsers.filter(u => u.role === 'admin').length;
            const customerCount = allUsers.filter(u => u.role === 'user').length;
            
            const statsHtml = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-users"></i></div>
                        <div class="stat-info"><h3>${totalUsers}</h3><p>Total Users</p></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-user-shield"></i></div>
                        <div class="stat-info"><h3>${adminCount}</h3><p>Administrators</p></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-user"></i></div>
                        <div class="stat-info"><h3>${customerCount}</h3><p>Customers</p></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-shopping-cart"></i></div>
                        <div class="stat-info"><h3>${allOrders.length}</h3><p>Total Orders</p></div>
                    </div>
                </div>
            `;
            document.getElementById('statsContainer').innerHTML = statsHtml;
        }

        function renderUsers() {
            let filtered = [...allUsers];
            if (searchTerm) {
                filtered = filtered.filter(u => 
                    (u.name && u.name.toLowerCase().includes(searchTerm)) || 
                    (u.email && u.email.toLowerCase().includes(searchTerm)) ||
                    (u.phone && u.phone.includes(searchTerm))
                );
            }
            if (roleFilter !== 'all') {
                filtered = filtered.filter(u => u.role === roleFilter);
            }
            
            const tbody = document.getElementById('usersTableBody');
            if (filtered.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6">
                            <div class="empty-state">
                                <i class="fas fa-user-slash"></i>
                                <h3>No users found</h3>
                                <p>Try adjusting your search or filter criteria</p>
                                <button class="btn btn-primary btn-sm" onclick="showAddUserModal()" style="margin-top: 1rem;">
                                    <i class="fas fa-plus"></i> Add New User
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }
            
            tbody.innerHTML = filtered.map(user => {
                const userOrders = allOrders.filter(o => o.customer_email === user.email);
                const orderCount = userOrders.length;
                const totalSpent = userOrders.reduce((sum, o) => sum + (parseFloat(o.total) || 0), 0);
                const initial = (user.name?.charAt(0) || user.email?.charAt(0) || 'U').toUpperCase();
                const canDelete = user.email !== currentAdmin?.email;
                
                return `
                    <tr>
                        <td>
                            <div style="display: flex; align-items: center; gap: 0.8rem;">
                                <div class="user-avatar">${initial}</div>
                                <div>
                                    <div style="font-weight: 600;">${escapeHtml(user.name || user.email)}</div>
                                    <div style="font-size: 0.75rem; color: var(--text-light);">${escapeHtml(user.email)}</div>
                                </div>
                            </div>
                        </td>
                        <td>${user.phone || '<span style="color: #ccc;">—</span>'}</td>
                        <td><span class="role-badge ${user.role === 'admin' ? 'role-admin' : 'role-user'}">${user.role === 'admin' ? '👑 Admin' : '👤 Customer'}</span></td>
                        <td>
                            <div style="font-weight: 600;">${orderCount} orders</div>
                            <div style="font-size: 0.7rem; color: var(--text-light);">৳${totalSpent.toLocaleString()}</div>
                        </td>
                        <td><small>${user.created_at ? formatDate(user.created_at) : '—'}</small></td>
                        <td>
                            <div class="action-icons">
                                <button class="action-icon view" onclick="viewUserDetails('${user.email}')" title="View Details"><i class="fas fa-eye"></i></button>
                                <button class="action-icon edit" onclick="editUser('${user.email}')" title="Edit User"><i class="fas fa-edit"></i></button>
                                <button class="action-icon reset" onclick="showResetPasswordModal('${user.email}')" title="Reset Password"><i class="fas fa-key"></i></button>
                                ${canDelete ? `<button class="action-icon delete" onclick="deleteUser('${user.email}')" title="Delete User"><i class="fas fa-trash"></i></button>` : ''}
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function filterUsers() {
            searchTerm = document.getElementById('searchUsers')?.value.toLowerCase() || '';
            roleFilter = document.getElementById('roleFilter')?.value || 'all';
            renderUsers();
        }

        function showAddUserModal() {
            document.getElementById('addUserTitle').innerHTML = '<i class="fas fa-user-plus"></i> Add New User';
            document.getElementById('editUserId').value = '';
            document.getElementById('userName').value = '';
            document.getElementById('userEmail').value = '';
            document.getElementById('userPassword').value = '';
            document.getElementById('userPassword').required = true;
            document.getElementById('userPhone').value = '';
            document.getElementById('userRole').value = 'user';
            document.getElementById('addUserModal').style.display = 'flex';
        }

        function editUser(email) {
            const user = allUsers.find(u => u.email === email);
            if (!user) return;
            document.getElementById('addUserTitle').innerHTML = '<i class="fas fa-user-edit"></i> Edit User';
            document.getElementById('editUserId').value = user.id;
            document.getElementById('userName').value = user.name || '';
            document.getElementById('userEmail').value = user.email;
            document.getElementById('userPassword').value = '';
            document.getElementById('userPassword').required = false;
            document.getElementById('userPhone').value = user.phone || '';
            document.getElementById('userRole').value = user.role;
            document.getElementById('addUserModal').style.display = 'flex';
        }

        async function saveUser() {
            const id = document.getElementById('editUserId').value;
            const name = document.getElementById('userName').value.trim();
            const email = document.getElementById('userEmail').value.trim();
            const password = document.getElementById('userPassword').value;
            const phone = document.getElementById('userPhone').value.trim();
            const role = document.getElementById('userRole').value;
            
            if (!name || !email) {
                showToast('Please fill all required fields');
                return;
            }
            
            if (!email.includes('@')) {
                showToast('Please enter a valid email address');
                return;
            }
            
            if (id) {
                // Update existing user via API
                try {
                    const response = await fetch('api/update-user.php', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id, name, email, phone, role, password: password || undefined })
                    });
                    const result = await response.json();
                    if (result.success) {
                        showToast('User updated successfully');
                        closeAddUserModal();
                        await loadUsers();
                    } else {
                        showToast('Error: ' + result.error);
                    }
                } catch (error) {
                    console.error('Error updating user:', error);
                    showToast('Failed to update user');
                }
            } else {
                // Create new user
                if (!password || password.length < 6) {
                    showToast('Password must be at least 6 characters for new users');
                    return;
                }
                
                if (allUsers.find(u => u.email === email)) {
                    showToast('Email already exists');
                    return;
                }
                
                try {
                    const response = await fetch('api/register.php', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name, email, password, phone, role })
                    });
                    const result = await response.json();
                    if (result.success) {
                        showToast('User added successfully');
                        closeAddUserModal();
                        await loadUsers();
                    } else {
                        showToast('Error: ' + (result.error || 'Failed to add user'));
                    }
                } catch (error) {
                    console.error('Error adding user:', error);
                    showToast('Failed to add user');
                }
            }
        }

        async function deleteUser(email) {
            if (email === currentAdmin?.email) {
                showToast('You cannot delete your own account');
                return;
            }
            
            if (confirm(`Delete user: ${email}? This cannot be undone.`)) {
                try {
                    const response = await fetch('api/delete-user.php', {
                        method: 'DELETE',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: email })
                    });
                    const result = await response.json();
                    if (result.success) {
                        showToast('User deleted successfully');
                        await loadUsers();
                    } else {
                        showToast('Error: ' + result.error);
                    }
                } catch (error) {
                    console.error('Error deleting user:', error);
                    showToast('Failed to delete user');
                }
            }
        }

        function viewUserDetails(email) {
            const user = allUsers.find(u => u.email === email);
            if (!user) return;
            
            const userOrders = allOrders.filter(o => o.customer_email === email);
            const totalSpent = userOrders.reduce((sum, o) => sum + (parseFloat(o.total) || 0), 0);
            const initial = (user.name?.charAt(0) || user.email?.charAt(0) || 'U').toUpperCase();
            
            const modal = document.getElementById('userModal');
            const content = document.getElementById('userModalContent');
            
            let ordersHtml = '';
            if (userOrders.length > 0) {
                ordersHtml = '<h4 style="margin: 1rem 0 0.5rem;">Recent Orders</h4><div style="max-height: 200px; overflow-y: auto;">';
                for (let i = 0; i < Math.min(userOrders.length, 5); i++) {
                    const order = userOrders[i];
                    ordersHtml += '<div style="border-bottom: 1px solid var(--border); padding: 0.5rem 0;">' +
                        '<div><strong>' + (order.order_number || order.id) + '</strong> - ' + formatDate(order.created_at) + '</div>' +
                        '<div>Total: ৳' + parseFloat(order.total).toLocaleString() + ' | Status: ' + (order.status || 'Processing') + '</div>' +
                    '</div>';
                }
                ordersHtml += '</div>';
            }
            
            content.innerHTML = `
                <div style="text-align: center; margin-bottom: 1rem;">
                    <div class="user-avatar" style="width: 60px; height: 60px; font-size: 1.5rem; margin: 0 auto;">${initial}</div>
                    <h3 style="margin-top: 0.8rem;">${escapeHtml(user.name || user.email)}</h3>
                    <p style="color: var(--text-light);">${escapeHtml(user.email)}</p>
                </div>
                <div class="detail-row" style="display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid var(--border);">
                    <strong>Phone:</strong> <span>${user.phone || 'Not provided'}</span>
                </div>
                <div class="detail-row" style="display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid var(--border);">
                    <strong>Role:</strong> <span>${user.role === 'admin' ? 'Administrator' : 'Customer'}</span>
                </div>
                <div class="detail-row" style="display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid var(--border);">
                    <strong>Joined:</strong> <span>${user.created_at ? formatDate(user.created_at) : 'Unknown'}</span>
                </div>
                <hr style="margin: 1rem 0;">
                <h4>Order Summary</h4>
                <div class="detail-row" style="display: flex; justify-content: space-between; padding: 0.5rem 0;">
                    <strong>Total Orders:</strong> <span>${userOrders.length}</span>
                </div>
                <div class="detail-row" style="display: flex; justify-content: space-between; padding: 0.5rem 0;">
                    <strong>Total Spent:</strong> <span>৳${totalSpent.toLocaleString()}</span>
                </div>
                <div class="detail-row" style="display: flex; justify-content: space-between; padding: 0.5rem 0;">
                    <strong>Average Order Value:</strong> <span>৳${userOrders.length > 0 ? Math.round(totalSpent / userOrders.length).toLocaleString() : 0}</span>
                </div>
                ${ordersHtml}
                <div style="margin-top: 1rem;">
                    <button class="btn btn-primary" onclick="closeUserModal()" style="width: 100%;">Close</button>
                </div>
            `;
            modal.style.display = 'flex';
        }

        function showResetPasswordModal(email) {
            const user = allUsers.find(u => u.email === email);
            if (!user) return;
            currentResetUser = user;
            
            const modal = document.getElementById('resetPasswordModal');
            const content = document.getElementById('resetPasswordContent');
            content.innerHTML = `
                <form onsubmit="event.preventDefault(); resetUserPassword();">
                    <div class="form-group">
                        <label>User</label>
                        <input type="text" value="${escapeHtml(user.name || user.email)} (${escapeHtml(user.email)})" readonly style="background:#f5f5f5;">
                    </div>
                    <div class="form-group">
                        <label>New Password *</label>
                        <input type="password" id="newPassword" required minlength="6" placeholder="Enter new password">
                    </div>
                    <div class="form-group">
                        <label>Confirm Password *</label>
                        <input type="password" id="confirmPassword" required placeholder="Confirm new password">
                    </div>
                    <div style="display: flex; gap: 1rem;">
                        <button type="submit" class="btn btn-primary" style="flex: 1;"><i class="fas fa-save"></i> Reset Password</button>
                        <button type="button" class="btn btn-outline" onclick="closeResetPasswordModal()" style="flex: 1;">Cancel</button>
                    </div>
                </form>
            `;
            modal.style.display = 'flex';
        }

        async function resetUserPassword() {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (!newPassword || newPassword.length < 6) {
                showToast('Password must be at least 6 characters');
                return;
            }
            if (newPassword !== confirmPassword) {
                showToast('Passwords do not match');
                return;
            }
            
            try {
                const response = await fetch('api/update-user.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        email: currentResetUser.email, 
                        password: newPassword,
                        action: 'reset_password'
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showToast(`Password reset successfully for ${currentResetUser.email}`);
                    closeResetPasswordModal();
                    await loadUsers();
                } else {
                    showToast('Error: ' + (result.error || 'Failed to reset password'));
                }
            } catch (error) {
                console.error('Error resetting password:', error);
                showToast('Failed to reset password');
            }
        }

        function closeUserModal() { document.getElementById('userModal').style.display = 'none'; }
        function closeAddUserModal() { document.getElementById('addUserModal').style.display = 'none'; }
        function closeResetPasswordModal() { document.getElementById('resetPasswordModal').style.display = 'none'; currentResetUser = null; }

        window.filterUsers = filterUsers;
        window.viewUserDetails = viewUserDetails;
        window.deleteUser = deleteUser;
        window.closeUserModal = closeUserModal;
        window.showAddUserModal = showAddUserModal;
        window.editUser = editUser;
        window.saveUser = saveUser;
        window.closeAddUserModal = closeAddUserModal;
        window.showResetPasswordModal = showResetPasswordModal;
        window.resetUserPassword = resetUserPassword;
        window.closeResetPasswordModal = closeResetPasswordModal;
        window.loadUsers = loadUsers;

        if (checkAdminAccess()) {
            loadUsers();
        }
    </script>
</body>
</html>
