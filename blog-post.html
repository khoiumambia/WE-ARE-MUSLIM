<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post - WE ARE MUSLIM</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .blog-post-container { max-width: 900px; margin: 2rem auto; padding: 0 2rem; }
        .blog-post-card { background: white; border-radius: 30px; padding: 2rem; box-shadow: var(--shadow-md); }
        .blog-post-image { width: 100%; height: 400px; object-fit: cover; border-radius: 20px; margin-bottom: 1.5rem; }
        .blog-post-meta { display: flex; gap: 1.5rem; margin-bottom: 1rem; color: #666; font-size: 0.9rem; flex-wrap: wrap; }
        .blog-post-title { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; margin-bottom: 1rem; }
        .blog-post-content { line-height: 1.8; margin: 1.5rem 0; }
        .blog-post-content p { margin-bottom: 1rem; }
        .blog-post-content h2, .blog-post-content h3 { margin: 1.5rem 0 0.5rem; font-family: 'Cormorant Garamond', serif; }
        .blog-post-content ul, .blog-post-content ol { margin: 1rem 0 1rem 2rem; }
        .blog-post-content img { max-width: 100%; border-radius: 12px; margin: 1rem 0; }
        .blog-post-tags { display: flex; gap: 0.5rem; flex-wrap: wrap; margin: 1rem 0; }
        .tag { background: var(--background); padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.75rem; color: var(--primary); }
        .share-buttons { display: flex; gap: 1rem; margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border); flex-wrap: wrap; }
        .share-btn { padding: 0.5rem 1rem; border-radius: 50px; background: var(--background); cursor: pointer; transition: all 0.3s ease; border: none; }
        .share-btn:hover { background: var(--primary); color: white; }
        .back-btn { margin-top: 2rem; text-align: center; }
        .related-posts { margin-top: 3rem; }
        .related-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1.5rem; margin-top: 1rem; }
        .related-card { background: var(--surface); border-radius: 16px; overflow: hidden; cursor: pointer; transition: all 0.3s ease; box-shadow: var(--shadow-sm); }
        .related-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
        .related-img { width: 100%; height: 150px; object-fit: cover; }
        .related-info { padding: 1rem; }
        .related-title { font-weight: 600; margin-bottom: 0.3rem; }
        .comment-section { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border); }
        .comment { padding: 1rem; border-bottom: 1px solid var(--border); }
        .comment-author { font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }
        .comment-avatar { width: 35px; height: 35px; background: var(--primary-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; }
        .comment-form textarea { width: 100%; padding: 0.8rem; border: 1px solid var(--border); border-radius: 12px; margin: 0.5rem 0; resize: vertical; }
        .comment-form input { width: 100%; padding: 0.8rem; border: 1px solid var(--border); border-radius: 12px; margin: 0.5rem 0; }
        @media (max-width: 768px) { .blog-post-image { height: 250px; } .blog-post-title { font-size: 1.8rem; } }
    </style>
</head>
<body>
    <div id="navigation-placeholder"></div>
    <div class="blog-post-container" id="blogPostContainer"><div class="loading">Loading post...</div></div>
    <script src="js/navigation.js"></script>
    <script src="js/utils.js"></script>
    <script>
        let allPosts = [], allComments = [], currentPost = null, currentUser = null;

        function loadBlogPost() {
            const postId = parseInt(localStorage.getItem('viewPostId'));
            if (!postId) {
                document.getElementById('blogPostContainer').innerHTML = '<div class="loading">Invalid post ID</div>';
                return;
            }
            fetch(`api/get-blog.php?id=${postId}`)
                .then(response => response.json())
                .then(data => {
                    if (data.success && data.blog.status === 'published') {
                        currentPost = data.blog;
                        displayPost();
                        loadRelatedPosts();
                        loadComments();
                    } else {
                        document.getElementById('blogPostContainer').innerHTML = `
                            <div class="blog-post-card" style="text-align: center; padding: 3rem;">
                                <i class="fas fa-newspaper" style="font-size: 3rem; color: var(--primary);"></i>
                                <h2 style="margin: 1rem 0;">Post not found</h2>
                                <p>The article you're looking for doesn't exist or is not published.</p>
                                <button class="btn btn-primary" onclick="window.location.href='blog.html'" style="margin-top: 1rem;">Back to Blog</button>
                            </div>
                        `;
                    }
                })
                .catch(error => {
                    console.error('Error loading post:', error);
                    document.getElementById('blogPostContainer').innerHTML = '<div class="loading">Error loading post</div>';
                });
            currentUser = getCurrentUser();
            loadComments();
        }

        function displayPost() {
            const container = document.getElementById('blogPostContainer');
            const categoryIcons = { guide: '📖', history: '🏛️', education: '🎓', seasonal: '🌙', care: '💝', news: '📰' };
            const tags = currentPost.tags ? currentPost.tags.split(',').filter(t => t) : [];
            container.innerHTML = `
                <div class="blog-post-card">
                    <img class="blog-post-image" src="${currentPost.image}" onerror="this.src='https://placehold.co/800x400/e8ddd3/8B5E3C?text=Blog'">
                    <div class="blog-post-meta">
                        <span><i class="far fa-calendar"></i> ${formatDate(currentPost.created_at)}</span>
                        <span><i class="far fa-clock"></i> ${currentPost.read_time || 5} min read</span>
                        <span><i class="far fa-eye"></i> ${currentPost.views || 0} views</span>
                        <span><i class="far fa-user"></i> ${escapeHtml(currentPost.author || 'Admin')}</span>
                        <span>${categoryIcons[currentPost.category] || '📝'} ${currentPost.category}</span>
                    </div>
                    <h1 class="blog-post-title">${escapeHtml(currentPost.title)}</h1>
                    <div class="blog-post-tags">${tags.map(t => `<span class="tag">#${escapeHtml(t)}</span>`).join('')}</div>
                    <div class="blog-post-content">${currentPost.content || '<p>' + (currentPost.excerpt || '') + '</p>'}</div>
                    <div class="share-buttons">
                        <span style="font-weight: 600;">Share this article:</span>
                        <button class="share-btn" onclick="sharePost('facebook')"><i class="fab fa-facebook"></i> Facebook</button>
                        <button class="share-btn" onclick="sharePost('twitter')"><i class="fab fa-twitter"></i> Twitter</button>
                        <button class="share-btn" onclick="sharePost('whatsapp')"><i class="fab fa-whatsapp"></i> WhatsApp</button>
                        <button class="share-btn" onclick="copyLink()"><i class="fas fa-link"></i> Copy Link</button>
                    </div>
                    <div class="back-btn"><button class="btn btn-primary" onclick="window.location.href='blog.html'"><i class="fas fa-arrow-left"></i> Back to Blog</button></div>
                </div>
                <div class="related-posts"><h3>📚 You May Also Like</h3><div class="related-grid" id="relatedGrid"></div></div>
                <div class="comment-section"><h3>💬 Comments (<span id="commentCount">0</span>)</h3><div id="commentsList"></div>
                ${currentUser ? `<div class="comment-form"><textarea id="commentText" rows="3" placeholder="Write your comment..."></textarea>
                <button class="btn btn-primary" onclick="submitComment()">Post Comment</button></div>` : `<p><a href="login.html">Login</a> to leave a comment.</p>`}</div>
            `;
        }

        function loadRelatedPosts() {
            fetch('api/get-blogs.php')
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        const related = data.blogs.filter(p => p.id !== currentPost.id && p.status === 'published' && p.category === currentPost.category).slice(0, 3);
                        const container = document.getElementById('relatedGrid');
                        if (!container) return;
                        if (related.length === 0) { container.innerHTML = '<p>No related posts found.</p>'; return; }
                        container.innerHTML = related.map(p => `
                            <div class="related-card" onclick="viewPost(${p.id})">
                                <img class="related-img" src="${p.image}" onerror="this.src='https://placehold.co/300x150'">
                                <div class="related-info"><div class="related-title">${escapeHtml(p.title)}</div><small>${formatDate(p.created_at)}</small></div>
                            </div>
                        `).join('');
                    }
                }).catch(error => console.error('Error loading related posts:', error));
        }

        function loadComments() {
            allComments = JSON.parse(localStorage.getItem('blog_comments')) || [];
            const postComments = allComments.filter(c => c.postId === currentPost?.id).sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
            const container = document.getElementById('commentsList');
            const countSpan = document.getElementById('commentCount');
            if (countSpan) countSpan.innerText = postComments.length;
            if (!container) return;
            if (postComments.length === 0) { container.innerHTML = '<p>No comments yet. Be the first!</p>'; return; }
            container.innerHTML = postComments.map(c => `
                <div class="comment"><div class="comment-author"><div class="comment-avatar">${(c.name?.charAt(0) || 'U').toUpperCase()}</div>
                <span>${escapeHtml(c.name)}</span><small>${formatDate(c.created_at)}</small></div><p>${escapeHtml(c.text)}</p></div>
            `).join('');
        }

        function submitComment() {
            if (!currentUser) { showToast('Please login to comment'); window.location.href = 'login.html'; return; }
            const text = document.getElementById('commentText').value.trim();
            if (!text) { showToast('Please enter a comment'); return; }
            const newComment = { id: Date.now(), postId: currentPost.id, name: currentUser.name, email: currentUser.email, text: text, created_at: new Date().toISOString() };
            allComments.push(newComment);
            localStorage.setItem('blog_comments', JSON.stringify(allComments));
            document.getElementById('commentText').value = '';
            loadComments();
            showToast('Comment posted!');
        }

        function sharePost(platform) {
            const url = window.location.href, title = encodeURIComponent(currentPost.title);
            let shareUrl = '';
            if (platform === 'facebook') shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`;
            else if (platform === 'twitter') shareUrl = `https://twitter.com/intent/tweet?text=${title}&url=${encodeURIComponent(url)}`;
            else if (platform === 'whatsapp') shareUrl = `https://wa.me/?text=${title}%20-%20${encodeURIComponent(url)}`;
            if (shareUrl) window.open(shareUrl, '_blank', 'width=600,height=400');
        }

        function copyLink() { navigator.clipboard.writeText(window.location.href); showToast('Link copied!'); }
        function viewPost(id) { localStorage.setItem('viewPostId', id); location.reload(); }

        window.sharePost = sharePost; window.copyLink = copyLink; window.submitComment = submitComment; window.viewPost = viewPost;
        loadBlogPost();
    </script>
</body>
</html>
