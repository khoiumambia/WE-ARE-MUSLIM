<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post - WE ARE MUSLIM</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .blog-post-container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        .blog-post-card {
            background: white;
            border-radius: 30px;
            padding: 2rem;
            box-shadow: var(--shadow-md);
        }
        .blog-post-image {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 1.5rem;
        }
        .blog-post-meta {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1rem;
            color: #666;
            font-size: 0.9rem;
        }
        .blog-post-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        .blog-post-content {
            line-height: 1.8;
            margin: 1.5rem 0;
        }
        .blog-post-content p {
            margin-bottom: 1rem;
        }
        .back-btn {
            margin-top: 2rem;
            text-align: center;
        }
        .share-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }
        .share-btn {
            padding: 0.5rem 1rem;
            border-radius: 50px;
            background: var(--background);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .share-btn:hover {
            background: var(--primary);
            color: white;
        }
        @media (max-width: 768px) {
            .blog-post-image { height: 250px; }
            .blog-post-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<div id="navigation-placeholder"></div>

<div class="blog-post-container" id="blogPostContainer">
    <div class="loading">Loading post...</div>
</div>

<script src="js/navigation.js"></script>
<script src="js/utils.js"></script>
<script>
    let allPosts = [];
    let currentPost = null;

    function loadBlogPost() {
        const stored = localStorage.getItem('blog_posts');
        if (stored) {
            allPosts = JSON.parse(stored);
        } else {
            // Default posts
            allPosts = [
                { id: 1, title: "The Ultimate Guide to Choosing Your First Attar", excerpt: "New to attars? Learn how to select the perfect fragrance based on your personality and occasion...", content: "<p>Choosing your first attar can be an exciting journey. Attars are alcohol-free perfume oils that offer a pure and long-lasting fragrance experience.</p><h3>Consider Your Personality</h3><p>If you're bold and confident, woody oudh fragrances might suit you best. If you prefer something subtle, floral or musk attars are great choices.</p><h3>Occasion Matters</h3><p>For daily wear, light and fresh fragrances work well. For special occasions or evenings, richer and deeper scents like amber or sandalwood are perfect.</p><p>Remember, attars develop on your skin over time, so give each fragrance at least 30 minutes before deciding!</p>", image: "https://images.unsplash.com/photo-1594035910387-fea47794261f?w=800", category: "guide", author: "Muhammad Rahman", date: "2024-12-15", readTime: 5, views: 1234 },
                { id: 2, title: "The Rich History of Oudh in Islamic Culture", excerpt: "Explore the sacred significance of Oudh in Islamic traditions...", content: "<p>Oudh, also known as agarwood, has been cherished in Islamic culture for centuries. The Prophet Muhammad (peace be upon him) is reported to have loved fragrance, particularly oudh and musk.</p><p>Throughout Islamic history, oudh has been used in mosques, during special occasions, and as a personal fragrance. Its deep, complex aroma is said to uplift the spirit and create a sense of tranquility.</p><p>Today, oudh remains one of the most prized ingredients in perfumery, especially in the Middle East and South Asia.</p>", image: "https://images.unsplash.com/photo-1585386959984-a4155224a1ad?w=800", category: "history", author: "Aisha Khan", date: "2024-12-10", readTime: 7, views: 2345 },
                { id: 3, title: "How to Layer Fragrances Like a Pro", excerpt: "Master the art of combining different attars...", content: "<p>Layering fragrances is an art that allows you to create a unique signature scent. Start with a base note like oudh or sandalwood, then add a middle note like rose or jasmine, and finish with a top note like citrus or mint.</p><p>The key is to apply the heavier oils first and lighter ones on top. Allow each layer to dry before applying the next.</p><p>Experiment with different combinations to find what works best for you!</p>", image: "https://images.unsplash.com/photo-1592945403244-b3fbafd7f539?w=800", category: "guide", author: "Omar Faruq", date: "2024-12-05", readTime: 6, views: 987 },
                { id: 4, title: "The Difference Between Attar and Perfume", excerpt: "Understanding the unique characteristics of alcohol-free attars...", content: "<p>Attar (also known as ittar) is a traditional perfume oil derived from botanical sources, while conventional perfumes use alcohol as a base.</p><p>Key differences: Attars are alcohol-free, longer-lasting, more concentrated, and often more affordable. They're also gentler on the skin and suitable for those with sensitivities.</p><p>Perfumes offer more immediate projection but typically don't last as long as attars.</p>", image: "https://images.unsplash.com/photo-1595428774223-ef52624120d2?w=800", category: "education", author: "Muhammad Rahman", date: "2024-11-28", readTime: 4, views: 3456 },
                { id: 5, title: "Top 5 Attars for Ramadan and Eid", excerpt: "Discover the most popular fragrances for the blessed month...", content: "<p>During Ramadan and Eid, certain fragrances are particularly popular. Here are our top 5 picks:</p><ol><li>Oudh Royal - Deep and spiritual</li><li>Rose De Makkah - Floral and uplifting</li><li>Musk Al Mahabba - Clean and pure</li><li>Amber Night - Warm and comforting</li><li>Sandalwood Classic - Traditional and soothing</li></ol><p>These fragrances enhance the spiritual atmosphere of Ramadan and make perfect gifts for Eid.</p>", image: "https://images.unsplash.com/photo-1594035910387-fea47794261f?w=800", category: "seasonal", author: "Aisha Khan", date: "2024-11-20", readTime: 5, views: 5678 },
                { id: 6, title: "How to Store Your Attars Properly", excerpt: "Tips to preserve the longevity and quality of your collection...", content: "<p>Proper storage is essential to maintain the quality of your attars. Keep them in a cool, dark place away from direct sunlight and heat.</p><p>Always keep the bottle tightly closed when not in use, as exposure to air can cause the fragrance to evaporate and change over time.</p><p>With proper care, your attars can last for many years while maintaining their beautiful aroma.</p>", image: "https://images.unsplash.com/photo-1585386959984-a4155224a1ad?w=800", category: "care", author: "Omar Faruq", date: "2024-11-15", readTime: 3, views: 876 }
            ];
            localStorage.setItem('blog_posts', JSON.stringify(allPosts));
        }

        const postId = parseInt(localStorage.getItem('viewPostId'));
        currentPost = allPosts.find(p => p.id === postId);

        if (currentPost) {
            displayPost();
            // Increment view count
            currentPost.views++;
            localStorage.setItem('blog_posts', JSON.stringify(allPosts));
        } else {
            document.getElementById('blogPostContainer').innerHTML = `
                <div class="blog-post-card" style="text-align: center; padding: 3rem;">
                    <i class="fas fa-newspaper" style="font-size: 3rem; color: var(--primary);"></i>
                    <h2 style="margin: 1rem 0;">Post not found</h2>
                    <p>The article you're looking for doesn't exist.</p>
                    <button class="btn btn-primary" onclick="window.location.href='blog.html'" style="margin-top: 1rem;">Back to Blog</button>
                </div>
            `;
        }
    }

    function displayPost() {
        const container = document.getElementById('blogPostContainer');
        container.innerHTML = `
            <div class="blog-post-card">
                <img class="blog-post-image" src="${currentPost.image}" onerror="this.src='https://via.placeholder.com/800x400?text=Blog'">
                <div class="blog-post-meta">
                    <span><i class="far fa-calendar"></i> ${new Date(currentPost.date).toLocaleDateString()}</span>
                    <span><i class="far fa-clock"></i> ${currentPost.readTime} min read</span>
                    <span><i class="far fa-eye"></i> ${currentPost.views} views</span>
                    <span><i class="far fa-user"></i> ${escapeHtml(currentPost.author)}</span>
                </div>
                <h1 class="blog-post-title">${escapeHtml(currentPost.title)}</h1>
                <div class="blog-post-content">
                    ${currentPost.content || '<p>' + currentPost.excerpt + '</p><p>Full content would appear here in a complete implementation.</p>'}
                </div>
                <div class="share-buttons">
                    <span style="font-weight: 600;">Share this article:</span>
                    <button class="share-btn" onclick="sharePost('facebook')"><i class="fab fa-facebook"></i> Facebook</button>
                    <button class="share-btn" onclick="sharePost('twitter')"><i class="fab fa-twitter"></i> Twitter</button>
                    <button class="share-btn" onclick="sharePost('whatsapp')"><i class="fab fa-whatsapp"></i> WhatsApp</button>
                    <button class="share-btn" onclick="copyLink()"><i class="fas fa-link"></i> Copy Link</button>
                </div>
                <div class="back-btn">
                    <button class="btn btn-primary" onclick="window.location.href='blog.html'">
                        <i class="fas fa-arrow-left"></i> Back to Blog
                    </button>
                </div>
            </div>
        `;
    }

    function sharePost(platform) {
        const url = window.location.href;
        const title = encodeURIComponent(currentPost.title);
        const text = encodeURIComponent(currentPost.excerpt);
        
        let shareUrl = '';
        if (platform === 'facebook') {
            shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`;
        } else if (platform === 'twitter') {
            shareUrl = `https://twitter.com/intent/tweet?text=${title}&url=${encodeURIComponent(url)}`;
        } else if (platform === 'whatsapp') {
            shareUrl = `https://wa.me/?text=${title}%20-%20${encodeURIComponent(url)}`;
        }
        
        if (shareUrl) {
            window.open(shareUrl, '_blank', 'width=600,height=400');
        }
    }

    function copyLink() {
        navigator.clipboard.writeText(window.location.href);
        showToast('Link copied to clipboard!');
    }

    window.sharePost = sharePost;
    window.copyLink = copyLink;

    loadBlogPost();
</script>
</body>
</html>
