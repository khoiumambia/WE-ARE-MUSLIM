<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare Products - WE ARE MUSLIM</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .compare-container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .compare-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .compare-header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .compare-table {
            background: var(--surface);
            border-radius: 20px;
            overflow-x: auto;
        }

        .compare-table table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        .compare-table th,
        .compare-table td {
            padding: 1rem;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .compare-table th {
            background: var(--primary);
            color: white;
            font-weight: 600;
        }

        .compare-product-img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 12px;
        }

        .remove-btn {
            background: var(--danger);
            color: white;
            border: none;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 0.5rem;
        }

        .add-more {
            text-align: center;
            padding: 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--primary);
        }

        .add-more:hover {
            background: var(--primary-light);
            color: white;
        }

        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
    </style>
</head>
<body>

<div id="navigation-placeholder"></div>

<div class="compare-container">
    <div class="compare-header">
        <h1>Compare Products</h1>
        <p>Compare up to 4 products side by side to find your perfect fragrance</p>
    </div>
    <div id="compareContent"></div>
</div>

<script src="js/navigation.js"></script>
<script src="js/utils.js"></script>
<script>
    let compareList = [];
    let products = [];

    function checkCompareAccess() {
        const user = getCurrentUser();
        if (!user) {
            showToast('⚠️ Please login to compare products', 'error');
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 1500);
            return false;
        }
        return true;
    }

    function loadCompareData() {
        if (!checkCompareAccess()) {
            return;
        }
        
        products = JSON.parse(localStorage.getItem('attar_products')) || [];
        compareList = JSON.parse(localStorage.getItem('attar_compare')) || [];
        renderCompare();
    }

    function renderCompare() {
        const container = document.getElementById('compareContent');
        const compareProducts = products.filter(p => compareList.includes(p.id));

        if (compareList.length === 0) {
            container.innerHTML = `
                <div style="text-align: center; padding: 4rem; background: white; border-radius: 20px;">
                    <i class="fas fa-chart-line" style="font-size: 3rem; color: var(--primary);"></i>
                    <h3 style="margin: 1rem 0;">No products to compare</h3>
                    <p>Add products from the shop page to compare them here</p>
                    <button class="btn btn-primary" style="margin-top: 1rem;" onclick="window.location.href='shop.html'">Browse Products →</button>
                </div>
            `;
            return;
        }

        let html = `
            <div class="compare-table">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 150px;">Feature</th>
                            ${compareProducts.map(p => `
                                <th>
                                    <img class="compare-product-img" src="${p.image}" onerror="this.src='https://via.placeholder.com/150'">
                                    <h3>${escapeHtml(p.name)}</h3>
                                    <button class="remove-btn" onclick="removeFromCompare(${p.id})">Remove</button>
                                </th>
                            `).join('')}
                            ${compareList.length < 4 ? '<th><div class="add-more" onclick="addMore()">+ Add Product</div></th>' : ''}
                        </tr>
                    </thead>
                    <tbody>
                        ${renderComparisonRow('Brand', compareProducts, p => p.brand)}
                        ${renderComparisonRow('Fragrance', compareProducts, p => p.fragrance)}
                        ${renderComparisonRow('Price', compareProducts, p => `৳${p.price.toLocaleString()}`)}
                        ${renderComparisonRow('Stock', compareProducts, p => p.stock > 0 ? `${p.stock} in stock` : 'Out of stock', p => p.stock > 0 ? 'success' : 'danger')}
                        ${renderComparisonRow('Rating', compareProducts, p => `⭐ ${p.ratings || 4.5}/5 (${p.reviews || 0} reviews)`)}
                        ${renderComparisonRow('Description', compareProducts, p => p.desc || 'Premium quality attar')}
                        ${renderComparisonRow('Action', compareProducts, p => `<button class="btn btn-primary" onclick="addToCart(${p.id})">Add to Cart</button>`)}
                    </tbody>
                </table>
            </div>
        `;

        container.innerHTML = html;
    }

    function renderComparisonRow(label, products, valueGetter, colorGetter = null) {
        let row = `<tr><th>${label}</th>`;
        products.forEach(p => {
            const value = valueGetter(p);
            const color = colorGetter ? colorGetter(p) : '';
            row += `<td style="${color ? `color: ${color === 'success' ? '#10b981' : '#ef4444'}` : ''}">${value}</td>`;
        });
        row += `</tr>`;
        return row;
    }

    function removeFromCompare(productId) {
        compareList = compareList.filter(id => id !== productId);
        localStorage.setItem('attar_compare', JSON.stringify(compareList));
        renderCompare();
        showToast('Product removed from comparison');
    }

    function addMore() {
        const availableProducts = products.filter(p => !compareList.includes(p.id));
        if (availableProducts.length === 0) {
            showToast('No more products to add!');
            return;
        }

        let productList = availableProducts.map((p, i) => `${i + 1}. ${p.name} - ৳${p.price}`).join('\n');
        let selection = prompt(`Select a product to add:\n\n${productList}\n\nEnter product number (1-${availableProducts.length}):`);

        if (selection && !isNaN(selection) && selection >= 1 && selection <= availableProducts.length) {
            const selectedProduct = availableProducts[selection - 1];
            if (!compareList.includes(selectedProduct.id)) {
                compareList.push(selectedProduct.id);
                localStorage.setItem('attar_compare', JSON.stringify(compareList));
                renderCompare();
                showToast(`${selectedProduct.name} added to comparison`);
            } else {
                showToast('Product already in comparison');
            }
        } else if (selection) {
            showToast('Invalid selection');
        }
    }

    function addToCart(productId) {
        if (!requireLogin('add items to cart')) {
            return;
        }

        const product = products.find(p => p.id === productId);
        if (product.stock === 0) {
            showToast('Sorry, out of stock!');
            return;
        }

        let cart = JSON.parse(localStorage.getItem('attar_cart')) || [];
        let item = cart.find(i => i.id === productId);
        if (item) {
            item.quantity++;
        } else {
            cart.push({ id: productId, quantity: 1 });
        }
        localStorage.setItem('attar_cart', JSON.stringify(cart));
        updateNavCartCount();

        let points = parseInt(localStorage.getItem('loyalty_points')) || 0;
        points += Math.floor(product.price / 100);
        localStorage.setItem('loyalty_points', points);
        updateNavPointsCount();

        showToast(`${product.name} added to cart!`);
    }

    window.removeFromCompare = removeFromCompare;
    window.addMore = addMore;
    window.addToCart = addToCart;

    loadCompareData();
</script>
</body>
</html>
