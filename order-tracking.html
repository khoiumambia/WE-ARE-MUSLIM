<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Your Order - WE ARE MUSLIM</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .track-container { max-width: 900px; margin: 2rem auto; padding: 0 2rem; }
        .track-card { background: white; border-radius: 30px; padding: 2rem; box-shadow: var(--shadow-md); }
        .track-header { text-align: center; margin-bottom: 2rem; }
        .track-header h1 { font-family: 'Cormorant Garamond', serif; font-size: 2rem; }
        .track-input { display: flex; gap: 1rem; margin: 2rem 0; flex-wrap: wrap; }
        .track-input input { flex: 1; padding: 1rem; border: 1px solid var(--border); border-radius: 50px; font-size: 1rem; }
        .track-steps { display: flex; justify-content: space-between; margin: 2rem 0; position: relative; flex-wrap: wrap; }
        .step { text-align: center; position: relative; flex: 1; min-width: 80px; }
        .step-icon { width: 50px; height: 50px; background: var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 0.5rem; font-size: 1.2rem; }
        .step.active .step-icon { background: var(--primary); color: white; }
        .step.completed .step-icon { background: var(--success); color: white; }
        .step-label { font-size: 0.8rem; font-weight: 500; }
        .order-details { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border); }
        .detail-row { display: flex; justify-content: space-between; padding: 0.8rem 0; border-bottom: 1px dashed var(--border); flex-wrap: wrap; gap: 0.5rem; }
        .detail-label { font-weight: 600; }
        .items-list { background: var(--background); border-radius: 16px; padding: 0.8rem; margin: 1rem 0; }
        .item-row { display: flex; justify-content: space-between; padding: 0.6rem 0; border-bottom: 1px solid var(--border); }
        .payment-badge { padding: 0.2rem 0.5rem; border-radius: 50px; font-size: 0.7rem; font-weight: 600; display: inline-block; }
        .payment-confirmed { background: var(--success); color: white; }
        .payment-pending { background: var(--warning); color: #333; }
        .order-not-found { text-align: center; padding: 3rem; }
        .error-message { background: #fee2e2; color: #dc2626; padding: 1rem; border-radius: 12px; margin: 1rem 0; }
        @media (max-width: 768px) { .track-steps { flex-direction: column; gap: 1rem; } .track-input { flex-direction: column; } }
    </style>
</head>
<body>
    <div id="navigation-placeholder"></div>
    <div class="track-container">
        <div class="track-card">
            <div class="track-header">
                <h1><i class="fas fa-map-marker-alt"></i> Track Your Order</h1>
                <p>Enter your order ID to get real-time status</p>
            </div>
            <div class="track-input">
                <input type="text" id="orderIdInput" placeholder="Enter Order ID (e.g., ORD1234567890)">
                <button class="btn btn-primary" onclick="trackOrder()">Track Order</button>
            </div>
            <div id="trackResult"></div>
        </div>
    </div>

    <script src="js/navigation.js"></script>
    <script src="js/utils.js"></script>
    <script>
        let currentOrder = null;

        async function trackOrder() {
            const orderId = document.getElementById('orderIdInput').value.trim().toUpperCase();
            const resultDiv = document.getElementById('trackResult');
            
            if (!orderId) {
                showToast('Please enter an order ID');
                return;
            }

            resultDiv.innerHTML = '<div class="loading">Searching for your order...</div>';
            
            try {
                console.log('Fetching order:', orderId);
                const response = await fetch(`api/get-order.php?order_id=${orderId}`);
                
                // Check if response is OK
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const text = await response.text();
                console.log('Raw response:', text);
                
                // Try to parse JSON
                let result;
                try {
                    result = JSON.parse(text);
                } catch(e) {
                    console.error('JSON parse error:', e);
                    resultDiv.innerHTML = `<div class="error-message">❌ Server error. Please check if API is working.</div>`;
                    return;
                }
                
                if (result.success && result.order) {
                    currentOrder = result.order;
                    displayTracking(currentOrder);
                } else {
                    resultDiv.innerHTML = `
                        <div class="order-not-found">
                            <i class="fas fa-search" style="font-size: 3rem; color: var(--danger);"></i>
                            <h3>Order Not Found</h3>
                            <p>We couldn't find an order with ID: <strong>${escapeHtml(orderId)}</strong></p>
                            <p>Please check your order ID and try again.</p>
                            <button class="btn btn-primary" onclick="window.location.href='dashboard.html'" style="margin-top: 1rem;">
                                Go to My Orders
                            </button>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error fetching order:', error);
                resultDiv.innerHTML = `<div class="error-message">❌ Failed to fetch order details: ${error.message}</div>`;
                showToast('Failed to fetch order details');
            }
        }

        function displayTracking(order) {
            const resultDiv = document.getElementById('trackResult');
            const status = order.status || 'Processing';
            
            let steps = [
                { name: 'Order Placed', key: 'placed', icon: 'fa-check-circle' },
                { name: 'Processing', key: 'processing', icon: 'fa-cog' },
                { name: 'Shipped', key: 'shipped', icon: 'fa-truck' },
                { name: 'Delivered', key: 'delivered', icon: 'fa-home' }
            ];
            
            let currentStepIndex = 0;
            if (status === 'Processing') currentStepIndex = 1;
            else if (status === 'Shipped') currentStepIndex = 2;
            else if (status === 'Delivered') currentStepIndex = 3;
            
            const isPaymentConfirmed = order.payment_confirmed == 1 || order.payment_method !== 'cod';
            
            let items = order.items;
            if (typeof items === 'string') {
                try { items = JSON.parse(items); } catch(e) { items = []; }
            }
            
            resultDiv.innerHTML = `
                <div class="track-steps">
                    ${steps.map((step, index) => `
                        <div class="step ${index < currentStepIndex ? 'completed' : ''} ${index === currentStepIndex ? 'active' : ''}">
                            <div class="step-icon"><i class="fas ${step.icon}"></i></div>
                            <div class="step-label">${step.name}</div>
                        </div>
                    `).join('')}
                </div>
                
                <div class="order-details">
                    <h3 style="margin-bottom: 1rem;">📋 Order Details</h3>
                    
                    <div class="detail-row">
                        <span class="detail-label">Order ID:</span>
                        <span><strong>${escapeHtml(order.order_number || order.id)}</strong></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Order Date:</span>
                        <span>${new Date(order.created_at).toLocaleString()}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Order Status:</span>
                        <span>${status}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Payment Status:</span>
                        <span class="payment-badge ${isPaymentConfirmed ? 'payment-confirmed' : 'payment-pending'}">
                            ${isPaymentConfirmed ? '✓ Payment Received' : '⏳ Pending (COD)'}
                        </span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Payment Method:</span>
                        <span>${order.payment_method === 'cod' ? 'Cash on Delivery' : (order.payment_method || 'N/A').toUpperCase()}</span>
                    </div>
                    ${order.transaction_id ? `
                    <div class="detail-row">
                        <span class="detail-label">Transaction ID:</span>
                        <span><code>${escapeHtml(order.transaction_id)}</code></span>
                    </div>
                    ` : ''}
                    <div class="detail-row">
                        <span class="detail-label">Tracking Number:</span>
                        <span><code>${order.tracking_number || 'Not assigned yet'}</code></span>
                    </div>
                </div>
                
                <div class="items-list">
                    <h4 style="margin-bottom: 0.5rem;"><i class="fas fa-box"></i> Items (${items?.length || 0})</h4>
                    ${items?.map(item => `
                        <div class="item-row">
                            <div>
                                <strong>${escapeHtml(item.product_name || item.name)}</strong><br>
                                <small>Qty: ${item.quantity}</small>
                            </div>
                            <div style="text-align: right;">
                                ৳${parseFloat(item.product_price || item.price).toLocaleString()} x ${item.quantity}<br>
                                <strong>৳${(parseFloat(item.product_price || item.price) * item.quantity).toLocaleString()}</strong>
                            </div>
                        </div>
                    `).join('')}
                </div>
                
                <div class="detail-row">
                    <span class="detail-label">Subtotal:</span>
                    <span>৳${parseFloat(order.subtotal || 0).toLocaleString()}</span>
                </div>
                <div class="detail-row" style="color: green;">
                    <span class="detail-label">Discount:</span>
                    <span>-৳${parseFloat(order.discount || 0).toLocaleString()}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Delivery Charge:</span>
                    <span>${parseFloat(order.delivery_charge || 0) === 0 ? 'Free' : '৳' + parseFloat(order.delivery_charge || 0)}</span>
                </div>
                <div class="detail-row" style="font-size: 1.1rem; font-weight: bold;">
                    <span class="detail-label">Total Amount:</span>
                    <span style="color: var(--primary);">৳${parseFloat(order.total || 0).toLocaleString()}</span>
                </div>
                
                <div class="detail-row">
                    <span class="detail-label">Shipping Address:</span>
                    <span>${escapeHtml(order.customer_address || 'N/A')}</span>
                </div>
                
                <div style="display: flex; gap: 1rem; margin-top: 1.5rem; flex-wrap: wrap;">
                    <button class="btn btn-primary" onclick="window.location.href='dashboard.html'" style="flex: 1;">
                        <i class="fas fa-arrow-left"></i> Back to Dashboard
                    </button>
                </div>
            `;
        }

        // Auto-track if order ID in URL
        const urlParams = new URLSearchParams(window.location.search);
        const orderIdParam = urlParams.get('order');
        if (orderIdParam) {
            document.getElementById('orderIdInput').value = orderIdParam;
            trackOrder();
        }

        window.trackOrder = trackOrder;
    </script>
</body>
</html>
