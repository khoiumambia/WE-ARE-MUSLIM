<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - WE ARE MUSLIM</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        .dashboard-container { max-width: 1400px; margin: 2rem auto; padding: 0 2rem; }
        .welcome-card { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: white; padding: 2rem; border-radius: 30px; margin-bottom: 2rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { background: white; padding: 1.5rem; border-radius: 20px; text-align: center; box-shadow: var(--shadow-sm); transition: transform 0.3s ease; }
        .stat-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-md); }
        .stat-card i { font-size: 2.5rem; color: var(--primary); margin-bottom: 0.5rem; }
        .stat-number { font-size: 2rem; font-weight: bold; color: var(--primary); }
        .card { background: white; border-radius: 20px; padding: 1.5rem; margin-bottom: 2rem; box-shadow: var(--shadow-sm); }
        .card h2 { font-family: 'Cormorant Garamond', serif; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 2px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .recent-orders-table, .users-table { width: 100%; overflow-x: auto; }
        .recent-orders-table table, .users-table table { width: 100%; border-collapse: collapse; }
        .recent-orders-table th, .recent-orders-table td, .users-table th, .users-table td { padding: 0.8rem; text-align: left; border-bottom: 1px solid var(--border); }
        .recent-orders-table th, .users-table th { background: var(--background); font-weight: 600; }
        .btn-sm { padding: 0.3rem 0.8rem; font-size: 0.75rem; }
        .status-badge { padding: 0.2rem 0.6rem; border-radius: 50px; font-size: 0.7rem; font-weight: 600; }
        .status-processing { background: var(--warning); color: #333; }
        .status-shipped { background: var(--info); color: white; }
        .status-delivered { background: var(--success); color: white; }
        .status-cancelled { background: var(--danger); color: white; }
        .quick-actions { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 1rem; }
        .quick-actions .btn { flex: 1; text-align: center; min-width: 120px; }
        .revenue-note { font-size: 0.7rem; color: #666; margin-top: 0.3rem; }
        .user-avatar { width: 35px; height: 35px; border-radius: 50%; background: var(--primary-light); display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        .search-bar { display: flex; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
        .search-bar input { flex: 1; padding: 0.7rem; border: 1px solid var(--border); border-radius: 50px; min-width: 200px; }
        .search-bar select { padding: 0.7rem; border: 1px solid var(--border); border-radius: 12px; background: white; }
        .tabs { display: flex; gap: 1rem; margin-bottom: 1.5rem; border-bottom: 2px solid var(--border); flex-wrap: wrap; }
        .tab-btn { padding: 0.5rem 1rem; background: none; border: none; cursor: pointer; font-weight: 600; color: var(--text-light); transition: all 0.3s ease; }
        .tab-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .role-badge { padding: 0.2rem 0.5rem; border-radius: 50px; font-size: 0.65rem; font-weight: 600; }
        .role-admin { background: #9c27b0; color: white; }
        .role-user { background: var(--success); color: white; }
    </style>
</head>
<body>
    <div id="navigation-placeholder"></div>
    <div class="dashboard-container" id="dashboardContainer"><div class="loading">Loading dashboard...</div></div>

    <!-- User Details Modal -->
    <div id="userModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center;">
        <div style="background: white; border-radius: 24px; padding: 2rem; max-width: 500px; width: 90%;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h3>User Details</h3>
                <button onclick="closeUserModal()" style="background: none; border: none; font-size: 1.5rem; cursor: pointer;">&times;</button>
            </div>
            <div id="userModalContent"></div>
        </div>
    </div>

    <script src="js/navigation.js"></script>
    <script src="js/utils.js"></script>
    <script>
        let currentUser = null, salesChart = null, allProducts = [], allOrders = [], allUsers = [];
        let userSearchTerm = '', userRoleFilter = 'all';

        function initDashboard() {
            currentUser = getCurrentUser();
            if (!currentUser) { window.location.href = 'login.html'; return; }
            if (currentUser.role !== 'admin') { window.location.href = 'dashboard.html'; return; }
            loadData();
            renderAdminDashboard();
        }

        function loadData() {
            allProducts = JSON.parse(localStorage.getItem('attar_products')) || [];
            allOrders = JSON.parse(localStorage.getItem('attar_orders')) || [];
            allUsers = JSON.parse(localStorage.getItem('attar_users')) || [];
            
            if (allProducts.length === 0) {
                allProducts = [
                    { id: 1, name: "Oudh Royal", brand: "Arabian Oud", fragrance: "Woody Oud", price: 1200, stock: 15, image: "https://images.unsplash.com/photo-1594035910387-fea47794261f?w=300", ratings: 4.8, reviews: 124, desc: "Premium pure Oudh attar" },
                    { id: 2, name: "Musk Al Mahabba", brand: "Swiss Arabian", fragrance: "Musk", price: 850, stock: 0, image: "https://images.unsplash.com/photo-1585386959984-a4155224a1ad?w=300", ratings: 4.6, reviews: 89, desc: "Intense musk fragrance" },
                    { id: 3, name: "Rose De Makkah", brand: "Al Haramain", fragrance: "Rose", price: 1500, stock: 3, image: "https://images.unsplash.com/photo-1592945403244-b3fbafd7f539?w=300", ratings: 4.9, reviews: 56, desc: "Exquisite floral rose attar" },
                    { id: 4, name: "Amber Night", brand: "Rasasi", fragrance: "Amber", price: 2200, stock: 20, image: "https://images.unsplash.com/photo-1595428774223-ef52624120d2?w=300", ratings: 4.7, reviews: 203, desc: "Warm amber blend" }
                ];
                localStorage.setItem('attar_products', JSON.stringify(allProducts));
            }
        }

        function renderAdminDashboard() {
            const container = document.getElementById('dashboardContainer');
            
            // Calculate stats
            const totalProducts = allProducts.length;
            const totalOrders = allOrders.length;
            const totalUsers = allUsers.length;
            const paidOrders = allOrders.filter(o => o.paymentConfirmed === true);
            const totalRevenue = paidOrders.reduce((sum, o) => sum + (o.total || 0), 0);
            const pendingOrders = allOrders.filter(o => o.status === 'Processing' || o.status === 'Pending (COD)').length;
            const pendingPaymentAmount = allOrders.filter(o => o.paymentConfirmed === false && o.status !== 'Cancelled').reduce((sum, o) => sum + (o.total || 0), 0);
            const lowStockProducts = allProducts.filter(p => p.stock > 0 && p.stock <= 10).length;
            const outOfStockProducts = allProducts.filter(p => p.stock === 0).length;
            
            // Sales chart data
            const monthlySales = {};
            paidOrders.forEach(order => {
                const month = new Date(order.date).toLocaleString('default', { month: 'short', year: 'numeric' });
                monthlySales[month] = (monthlySales[month] || 0) + (order.total || 0);
            });
            const chartLabels = Object.keys(monthlySales).slice(-6);
            const chartData = chartLabels.map(l => monthlySales[l] || 0);
            
            const recentOrders = [...allOrders].sort((a,b) => new Date(b.date) - new Date(a.date)).slice(0, 5);
            
            // Filter users for display
            let filteredUsers = [...allUsers];
            if (userSearchTerm) {
                filteredUsers = filteredUsers.filter(u => 
                    u.name.toLowerCase().includes(userSearchTerm) || 
                    u.email.toLowerCase().includes(userSearchTerm) ||
                    (u.phone && u.phone.includes(userSearchTerm))
                );
            }
            if (userRoleFilter !== 'all') {
                filteredUsers = filteredUsers.filter(u => u.role === userRoleFilter);
            }

            container.innerHTML = `
                <div class="welcome-card">
                    <h1 style="font-family: 'Cormorant Garamond'; font-size: 2rem;">Admin Dashboard</h1>
                    <p>Welcome back, ${escapeHtml(currentUser.name)}! Here's your store overview.</p>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card"><i class="fas fa-box"></i><div class="stat-number">${totalProducts}</div><div>Total Products</div></div>
                    <div class="stat-card"><i class="fas fa-shopping-cart"></i><div class="stat-number">${totalOrders}</div><div>Total Orders</div></div>
                    <div class="stat-card"><i class="fas fa-users"></i><div class="stat-number">${totalUsers}</div><div>Total Users</div></div>
                    <div class="stat-card"><i class="fas fa-taka-sign"></i><div class="stat-number">৳${totalRevenue.toLocaleString()}</div><div>💰 Total Revenue</div>
                        <div class="revenue-note"><i class="fas fa-info-circle"></i> Only includes paid orders</div>
                    </div>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card"><i class="fas fa-exclamation-triangle" style="color: var(--warning);"></i><div class="stat-number" style="color: var(--warning);">${lowStockProducts}</div><div>Low Stock Items</div></div>
                    <div class="stat-card"><i class="fas fa-times-circle" style="color: var(--danger);"></i><div class="stat-number" style="color: var(--danger);">${outOfStockProducts}</div><div>Out of Stock</div></div>
                    <div class="stat-card"><i class="fas fa-clock"></i><div class="stat-number">${pendingOrders}</div><div>Pending Orders</div></div>
                    <div class="stat-card"><i class="fas fa-hourglass-half"></i><div class="stat-number">৳${pendingPaymentAmount.toLocaleString()}</div><div>Pending Payment (COD)</div></div>
                </div>
                
                <div class="card">
                    <h2>📊 Sales Analytics (Paid Orders Only)</h2>
                    <canvas id="salesChart" style="max-height: 300px; width: 100%;"></canvas>
                </div>
                
                <div class="tabs">
                    <button class="tab-btn active" onclick="switchTab('orders')">📋 Orders</button>
                    <button class="tab-btn" onclick="switchTab('products')">📦 Products</button>
                    <button class="tab-btn" onclick="switchTab('users')">👥 Users</button>
                </div>
                
                <!-- Orders Tab -->
                <div id="ordersTab" class="tab-content active">
                    <div class="card">
                        <h2>Recent Orders <a href="admin-orders.html" style="font-size: 0.8rem; font-weight: normal;">View All Orders →</a></h2>
                        <div class="recent-orders-table">
                            <table>
                                <thead><tr><th>Order ID</th><th>Customer</th><th>Date</th><th>Total</th><th>Payment</th><th>Status</th><th>Action</th></tr></thead>
                                <tbody>
                                    ${recentOrders.map(order => `
                                        <tr>
                                            <td>${order.id}</td>
                                            <td>${escapeHtml(order.customer?.name || order.user || 'Guest')}</td>
                                            <td>${formatDate(order.date)}</td>
                                            <td>৳${(order.total || 0).toLocaleString()}</td>
                                            <td>${order.paymentConfirmed ? '<span style="color: green;">✅ Paid</span>' : '<span style="color: orange;">⏳ Pending</span>'}</td>
                                            <td><span class="status-badge status-${(order.status || 'processing').toLowerCase().replace(/ /g, '-')}">${order.status || 'Processing'}</span></td>
                                            <td><button class="btn btn-sm btn-primary" onclick="window.location.href='admin-orders.html'">Manage</button></td>
                                        </tr>
                                    `).join('')}
                                    ${recentOrders.length === 0 ? '<tr><td colspan="7" style="text-align: center;">No orders yet</td>' : ''}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
                
                <!-- Products Tab -->
                <div id="productsTab" class="tab-content">
                    <div class="card">
                        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 1rem;">
                            <h2>Product Inventory</h2>
                            <button class="btn btn-primary" onclick="window.location.href='admin-products.html'"><i class="fas fa-plus"></i> Manage Products</button>
                        </div>
                        <div class="recent-orders-table">
                            <table>
                                <thead><tr><th>Image</th><th>Name</th><th>Price</th><th>Stock</th><th>Status</th><th>Action</th></tr></thead>
                                <tbody>
                                    ${allProducts.slice(0, 5).map(p => `
                                        <tr>
                                            <td><img src="${p.image}" style="width: 40px; height: 40px; object-fit: cover; border-radius: 8px;"></td>
                                            <td>${escapeHtml(p.name)}</td>
                                            <td>৳${p.price.toLocaleString()}</td>
                                            <td>${p.stock}</td>
                                            <td>${p.stock > 0 ? '<span style="color: green;">In Stock</span>' : '<span style="color: red;">Out of Stock</span>'}</td>
                                            <td><button class="btn btn-sm btn-primary" onclick="window.location.href='admin-products.html'">Edit</button></td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                        ${allProducts.length > 5 ? '<div style="text-align: center; margin-top: 1rem;"><a href="admin-products.html">View all ${allProducts.length} products →</a></div>' : ''}
                    </div>
                </div>
                
                <!-- Users Tab -->
                <div id="usersTab" class="tab-content">
                    <div class="card">
                        <h2>👥 Registered Users (${allUsers.length})</h2>
                        <div class="search-bar">
                            <input type="text" id="userSearch" placeholder="🔍 Search by name, email, or phone..." onkeyup="filterUsers()">
                            <select id="userRoleFilter" onchange="filterUsers()">
                                <option value="all">All Roles</option>
                                <option value="admin">👑 Admin</option>
                                <option value="user">👤 Customer</option>
                            </select>
                            <button class="btn btn-sm" onclick="resetUserFilters()">Reset</button>
                        </div>
                        <div class="users-table">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Avatar</th>
                                        <th>Name</th>
                                        <th>Email</th>
                                        <th>Phone</th>
                                        <th>Role</th>
                                        <th>Orders</th>
                                        <th>Joined</th>
                                        <th>Auth Provider</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="usersTableBody">
                                    ${renderUsersTable(filteredUsers)}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
                
                <div class="card">
                    <h2>⚡ Quick Actions</h2>
                    <div class="quick-actions">
                        <button class="btn btn-primary" onclick="window.location.href='admin-products.html'"><i class="fas fa-boxes"></i> Products</button>
                        <button class="btn btn-primary" onclick="window.location.href='admin-orders.html'"><i class="fas fa-shopping-cart"></i> Orders</button>
                        <button class="btn btn-primary" onclick="window.location.href='admin-returns.html'"><i class="fas fa-undo-alt"></i> Returns</button>
                        <button class="btn btn-primary" onclick="window.location.href='admin-settings.html'"><i class="fas fa-cogs"></i> Settings</button>
                    </div>
                </div>
            `;
            
            const ctx = document.getElementById('salesChart');
            if (ctx && chartLabels.length > 0) {
                if (salesChart) salesChart.destroy();
                salesChart = new Chart(ctx, {
                    type: 'line',
                    data: { labels: chartLabels, datasets: [{ label: 'Monthly Revenue (Paid Orders)', data: chartData, borderColor: '#8B5E3C', backgroundColor: 'rgba(139,94,60,0.1)', tension: 0.4, fill: true }] },
                    options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'top' } } }
                });
            }
        }

        function renderUsersTable(users) {
            if (users.length === 0) {
                return '<tr><td colspan="9" style="text-align: center;">No users found</td></tr>';
            }
            
            return users.map(user => {
                const userOrders = allOrders.filter(o => o.user === user.email);
                const totalSpent = userOrders.reduce((sum, o) => sum + (o.total || 0), 0);
                const orderCount = userOrders.length;
                const initial = (user.name?.charAt(0) || user.email?.charAt(0) || 'U').toUpperCase();
                
                return `
                    <tr>
                        <td><div class="user-avatar">${initial}</div></td>
                        <td><strong>${escapeHtml(user.name)}</strong></td>
                        <td>${escapeHtml(user.email)}</td>
                        <td>${user.phone || '—'}</td>
                        <td><span class="role-badge ${user.role === 'admin' ? 'role-admin' : 'role-user'}">${user.role === 'admin' ? '👑 Admin' : '👤 Customer'}</span></td>
                        <td>${orderCount} orders<br><small>৳${totalSpent.toLocaleString()}</small></td>
                        <td><small>${user.createdAt ? formatDate(user.createdAt) : '—'}</small></td>
                        <td>${user.authProvider === 'google' ? '<i class="fab fa-google"></i> Google' : (user.authProvider === 'google_demo' ? '📧 Google (Demo)' : '📧 Email')}</td>
                        <td>
                            <button class="btn btn-sm" onclick="viewUserDetails('${user.email}')"><i class="fas fa-eye"></i> View</button>
                            ${user.role !== 'admin' ? `<button class="btn btn-sm btn-danger" onclick="deleteUser('${user.email}')"><i class="fas fa-trash"></i> Delete</button>` : ''}
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function filterUsers() {
            userSearchTerm = document.getElementById('userSearch')?.value.toLowerCase() || '';
            userRoleFilter = document.getElementById('userRoleFilter')?.value || 'all';
            
            let filtered = [...allUsers];
            if (userSearchTerm) {
                filtered = filtered.filter(u => 
                    u.name.toLowerCase().includes(userSearchTerm) || 
                    u.email.toLowerCase().includes(userSearchTerm) ||
                    (u.phone && u.phone.includes(userSearchTerm))
                );
            }
            if (userRoleFilter !== 'all') {
                filtered = filtered.filter(u => u.role === userRoleFilter);
            }
            
            const tbody = document.getElementById('usersTableBody');
            if (tbody) tbody.innerHTML = renderUsersTable(filtered);
        }

        function resetUserFilters() {
            const searchInput = document.getElementById('userSearch');
            const roleSelect = document.getElementById('userRoleFilter');
            if (searchInput) searchInput.value = '';
            if (roleSelect) roleSelect.value = 'all';
            userSearchTerm = '';
            userRoleFilter = 'all';
            filterUsers();
        }

        function viewUserDetails(email) {
            const user = allUsers.find(u => u.email === email);
            if (!user) return;
            
            const userOrders = allOrders.filter(o => o.user === email);
            const totalSpent = userOrders.reduce((sum, o) => sum + (o.total || 0), 0);
            
            const modal = document.getElementById('userModal');
            const content = document.getElementById('userModalContent');
            content.innerHTML = `
                <div style="margin-bottom: 1rem;">
                    <div style="text-align: center; margin-bottom: 1rem;">
                        <div class="user-avatar" style="width: 60px; height: 60px; font-size: 1.5rem; margin: 0 auto;">${(user.name?.charAt(0) || 'U').toUpperCase()}</div>
                    </div>
                    <p><strong>Name:</strong> ${escapeHtml(user.name)}</p>
                    <p><strong>Email:</strong> ${escapeHtml(user.email)}</p>
                    <p><strong>Phone:</strong> ${user.phone || 'Not provided'}</p>
                    <p><strong>Role:</strong> ${user.role === 'admin' ? 'Administrator' : 'Customer'}</p>
                    <p><strong>Joined:</strong> ${user.createdAt ? formatDate(user.createdAt) : '—'}</p>
                    <p><strong>Auth Provider:</strong> ${user.authProvider === 'google' ? 'Google Sign-In' : (user.authProvider === 'google_demo' ? 'Google (Demo)' : 'Email/Password')}</p>
                </div>
                <hr>
                <h4>Order Summary</h4>
                <p><strong>Total Orders:</strong> ${userOrders.length}</p>
                <p><strong>Total Spent:</strong> ৳${totalSpent.toLocaleString()}</p>
                <p><strong>Average Order Value:</strong> ৳${userOrders.length > 0 ? Math.round(totalSpent / userOrders.length).toLocaleString() : 0}</p>
                ${userOrders.length > 0 ? `
                    <h4>Recent Orders</h4>
                    <div style="max-height: 200px; overflow-y: auto;">
                        ${userOrders.slice(0, 5).map(order => `
                            <div style="border-bottom: 1px solid var(--border); padding: 0.5rem 0;">
                                <div><strong>${order.id}</strong> - ${formatDate(order.date)}</div>
                                <div>Total: ৳${order.total} | Status: ${order.status}</div>
                            </div>
                        `).join('')}
                    </div>
                ` : ''}
                <div style="margin-top: 1rem;">
                    <button class="btn btn-primary" onclick="closeUserModal()">Close</button>
                </div>
            `;
            modal.style.display = 'flex';
        }

        function deleteUser(email) {
            if (email === currentUser.email) {
                showToast('You cannot delete your own account');
                return;
            }
            
            if (confirm(`Are you sure you want to delete user: ${email}? This action cannot be undone.`)) {
                allUsers = allUsers.filter(u => u.email !== email);
                localStorage.setItem('attar_users', JSON.stringify(allUsers));
                showToast('User deleted successfully');
                filterUsers();
                
                // Update the total users count in stats
                const totalUsersSpan = document.querySelector('.stat-card .stat-number');
                if (totalUsersSpan) {
                    // The dashboard will re-render on next action
                }
            }
        }

        function closeUserModal() {
            document.getElementById('userModal').style.display = 'none';
        }

        function switchTab(tabName) {
            const tabs = ['orders', 'products', 'users'];
            tabs.forEach(tab => {
                const el = document.getElementById(`${tab}Tab`);
                if (el) el.classList.remove('active');
            });
            document.getElementById(`${tabName}Tab`).classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if (event && event.target) event.target.classList.add('active');
        }

        window.switchTab = switchTab;
        window.filterUsers = filterUsers;
        window.resetUserFilters = resetUserFilters;
        window.viewUserDetails = viewUserDetails;
        window.deleteUser = deleteUser;
        window.closeUserModal = closeUserModal;

        initDashboard();
    </script>
</body>
</html>
