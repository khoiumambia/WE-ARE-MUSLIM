<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard - WE ARE MUSLIM</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .dashboard-container { max-width: 1200px; margin: 2rem auto; padding: 0 2rem; }
        .welcome-card { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: white; padding: 2rem; border-radius: 30px; margin-bottom: 2rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { background: white; padding: 1.5rem; border-radius: 20px; text-align: center; box-shadow: var(--shadow-sm); }
        .stat-card i { font-size: 2rem; color: var(--primary); margin-bottom: 0.5rem; }
        .stat-number { font-size: 1.8rem; font-weight: bold; color: var(--primary); }
        .card { background: white; border-radius: 20px; padding: 1.5rem; margin-bottom: 2rem; box-shadow: var(--shadow-sm); }
        .card h2 { font-family: 'Cormorant Garamond', serif; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 2px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .order-item { border-bottom: 1px solid var(--border); padding: 1rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .order-status { padding: 0.3rem 0.8rem; border-radius: 50px; font-size: 0.75rem; font-weight: 600; }
        .status-processing { background: var(--warning); color: #333; }
        .status-shipped { background: var(--info); color: white; }
        .status-delivered { background: var(--success); color: white; }
        .status-cancelled { background: var(--danger); color: white; }
        .status-return-requested { background: #9c27b0; color: white; }
        .status-return-approved { background: #ff9800; color: white; }
        .status-exchange-requested { background: #2196f3; color: white; }
        .btn-sm { padding: 0.3rem 0.8rem; font-size: 0.75rem; }
        .tabs { display: flex; gap: 1rem; margin-bottom: 1.5rem; border-bottom: 2px solid var(--border); flex-wrap: wrap; }
        .tab-btn { padding: 0.5rem 1rem; background: none; border: none; cursor: pointer; font-weight: 600; color: var(--text-light); }
        .tab-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 0.8rem; border: 1px solid var(--border); border-radius: 12px; }
        .return-badge { background: #fef3c7; color: #92400e; padding: 0.2rem 0.5rem; border-radius: 5px; font-size: 0.7rem; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; border-radius: 24px; padding: 2rem; max-width: 500px; width: 90%; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .return-status { font-size: 0.7rem; margin-top: 0.3rem; }
    </style>
</head>
<body>
    <div id="navigation-placeholder"></div>
    <div class="dashboard-container" id="dashboardContainer"><div class="loading">Loading dashboard...</div></div>

    <!-- Return Request Modal -->
    <div id="returnModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Request Return / Exchange</h3>
                <button onclick="closeReturnModal()" style="background:none; border:none; font-size:1.5rem; cursor:pointer;">&times;</button>
            </div>
            <form id="returnForm" onsubmit="event.preventDefault(); submitReturnRequest();">
                <input type="hidden" id="returnOrderId">
                <div class="form-group">
                    <label>Request Type *</label>
                    <select id="returnType" required>
                        <option value="">Select...</option>
                        <option value="return">Return (Refund)</option>
                        <option value="exchange">Exchange (Different Product)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Product to Return/Exchange</label>
                    <select id="returnProductId" required></select>
                </div>
                <div class="form-group">
                    <label>Reason *</label>
                    <select id="returnReason" required>
                        <option value="">Select reason...</option>
                        <option value="defective">Defective / Damaged product</option>
                        <option value="wrong_item">Wrong item received</option>
                        <option value="not_as_described">Not as described</option>
                        <option value="changed_mind">Changed my mind</option>
                        <option value="size_issue">Size/ fragrance issue</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Additional Comments</label>
                    <textarea id="returnComments" rows="3" placeholder="Please provide more details..."></textarea>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <button type="submit" class="btn btn-primary" style="flex:1;">Submit Request</button>
                    <button type="button" class="btn" onclick="closeReturnModal()" style="flex:1;">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/navigation.js"></script>
    <script src="js/utils.js"></script>
    <script>
        let currentUser = null, allOrders = [], allUsers = [], returnRequests = [];

        function initDashboard() {
            currentUser = getCurrentUser();
            if (!currentUser) { window.location.href = 'login.html'; return; }
            if (currentUser.role === 'admin') { window.location.href = 'admin-dashboard.html'; return; }
            loadData();
            renderCustomerDashboard();
        }

        function loadData() {
            allOrders = JSON.parse(localStorage.getItem('attar_orders')) || [];
            allUsers = JSON.parse(localStorage.getItem('attar_users')) || [];
            returnRequests = JSON.parse(localStorage.getItem('return_requests')) || [];
        }

        function renderCustomerDashboard() {
            const container = document.getElementById('dashboardContainer');
            const userOrders = allOrders.filter(o => o.user === currentUser.email);
            const wishlist = JSON.parse(localStorage.getItem('attar_wishlist')) || [];
            const points = parseInt(localStorage.getItem('loyalty_points')) || 0;
            const totalSpent = userOrders.reduce((sum, o) => sum + (o.total || 0), 0);
            const userReturns = returnRequests.filter(r => r.userEmail === currentUser.email);

            container.innerHTML = `
                <div class="welcome-card">
                    <h1>Welcome back, ${escapeHtml(currentUser.name)}!</h1>
                    <p>Your fragrance journey continues with #WE ARE MUSLIM</p>
                    <div><i class="fas fa-star"></i> ${points} Loyalty Points</div>
                </div>
                <div class="stats-grid">
                    <div class="stat-card"><i class="fas fa-shopping-bag"></i><div class="stat-number">${userOrders.length}</div><div>Total Orders</div></div>
                    <div class="stat-card"><i class="fas fa-taka-sign"></i><div class="stat-number">৳${totalSpent.toLocaleString()}</div><div>Total Spent</div></div>
                    <div class="stat-card"><i class="fas fa-heart"></i><div class="stat-number">${wishlist.length}</div><div>Wishlist</div></div>
                    <div class="stat-card"><i class="fas fa-undo-alt"></i><div class="stat-number">${userReturns.length}</div><div>Returns</div></div>
                </div>
                <div class="tabs">
                    <button class="tab-btn active" onclick="switchTab('orders')">📦 My Orders</button>
                    <button class="tab-btn" onclick="switchTab('returns')">🔄 Returns & Exchanges</button>
                    <button class="tab-btn" onclick="switchTab('profile')">👤 Profile</button>
                </div>
                <div id="ordersTab" class="tab-content active"><div class="card"><h2>Order History</h2><div id="ordersList">${renderOrdersList(userOrders)}</div></div></div>
                <div id="returnsTab" class="tab-content"><div class="card"><h2>Return / Exchange Requests</h2><div id="returnsList">${renderReturnsList(userReturns)}</div></div></div>
                <div id="profileTab" class="tab-content">
                    <div class="card"><h2>Profile Information</h2>
                        <form onsubmit="event.preventDefault(); updateProfile();">
                            <div class="form-group"><label>Full Name</label><input type="text" id="profileName" value="${escapeHtml(currentUser.name)}"></div>
                            <div class="form-group"><label>Email</label><input type="email" id="profileEmail" value="${escapeHtml(currentUser.email)}" readonly></div>
                            <div class="form-group"><label>Phone</label><input type="tel" id="profilePhone" value="${escapeHtml(currentUser.phone || '')}"></div>
                            <button type="submit" class="btn btn-primary">Update Profile</button>
                        </form>
                    </div>
                    <div class="card"><h2>Change Password</h2>
                        <form onsubmit="event.preventDefault(); changePassword();">
                            <div class="form-group"><label>Current Password</label><input type="password" id="currentPassword"></div>
                            <div class="form-group"><label>New Password</label><input type="password" id="newPassword"></div>
                            <div class="form-group"><label>Confirm Password</label><input type="password" id="confirmPassword"></div>
                            <button type="submit" class="btn btn-primary">Change Password</button>
                        </form>
                    </div>
                </div>
            `;
        }

        function renderOrdersList(orders) {
            if (orders.length === 0) return '<div style="text-align:center; padding:2rem;">No orders yet. <a href="shop.html">Start shopping →</a></div>';
            return orders.map(order => {
                const hasReturnRequest = returnRequests.some(r => r.orderId === order.id && r.status !== 'cancelled');
                const returnStatus = returnRequests.find(r => r.orderId === order.id);
                const canRequestReturn = (order.status === 'Delivered') && !hasReturnRequest && (new Date(order.date) > new Date(Date.now() - 30*24*60*60*1000));
                return `
                    <div class="order-item">
                        <div><strong>#${order.id}</strong><br><small>${formatDate(order.date)}</small><br><small>${order.items?.length || 0} item(s)</small>
                        ${order.trackingNumber ? `<div><i class="fas fa-truck"></i> ${order.trackingNumber}</div>` : ''}</div>
                        <div><strong>৳${(order.total || 0).toLocaleString()}</strong><br>
                        <span class="order-status status-${(order.status || 'processing').toLowerCase().replace(/ /g, '-')}">${order.status || 'Processing'}</span>
                        ${returnStatus ? `<div class="return-status"><span class="return-badge">Return: ${returnStatus.status}</span></div>` : ''}</div>
                        <div>
                            <button class="btn btn-sm btn-primary" onclick="trackOrder('${order.id}')"><i class="fas fa-map-marker-alt"></i> Track</button>
                            <button class="btn btn-sm" onclick="viewOrderDetails('${order.id}')"><i class="fas fa-eye"></i> View</button>
                            ${canRequestReturn ? `<button class="btn btn-sm btn-warning" onclick="showReturnModal('${order.id}')"><i class="fas fa-undo-alt"></i> Return/Exchange</button>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderReturnsList(returns) {
            if (returns.length === 0) return '<div style="text-align:center; padding:2rem;">No return requests yet.</div>';
            return returns.map(r => {
                const order = allOrders.find(o => o.id === r.orderId);
                const product = order?.items?.find(i => i.id == r.productId);
                const statusColors = {
                    pending: '🟡 Pending',
                    approved: '🟢 Approved - Please ship product back',
                    rejected: '🔴 Rejected',
                    completed: '✅ Completed',
                    cancelled: '⚪ Cancelled'
                };
                return `
                    <div class="order-item">
                        <div><strong>Request #${r.id}</strong><br><small>Order: ${r.orderId}</small><br><small>${formatDate(r.date)}</small></div>
                        <div><strong>${r.type === 'return' ? 'Return' : 'Exchange'}</strong><br>${product?.name || 'Product'}</div>
                        <div><strong>${statusColors[r.status] || r.status}</strong><br>${r.reason}</div>
                        <div>${r.adminResponse ? `<small>${r.adminResponse}</small>` : ''}</div>
                    </div>
                `;
            }).join('');
        }

        function showReturnModal(orderId) {
            const order = allOrders.find(o => o.id === orderId);
            if (!order) return;
            document.getElementById('returnOrderId').value = orderId;
            const productSelect = document.getElementById('returnProductId');
            productSelect.innerHTML = '<option value="">Select product...</option>' + 
                order.items.map(item => `<option value="${item.id}">${escapeHtml(item.name)} (৳${item.price})</option>`).join('');
            document.getElementById('returnModal').style.display = 'flex';
        }

        function closeReturnModal() { document.getElementById('returnModal').style.display = 'none'; }

        function submitReturnRequest() {
            const orderId = document.getElementById('returnOrderId').value;
            const type = document.getElementById('returnType').value;
            const productId = document.getElementById('returnProductId').value;
            const reason = document.getElementById('returnReason').value;
            const comments = document.getElementById('returnComments').value;
            
            if (!type || !productId || !reason) { showToast('Please fill all required fields'); return; }
            
            const newRequest = {
                id: 'RET' + Date.now(),
                orderId: orderId,
                userEmail: currentUser.email,
                type: type,
                productId: parseInt(productId),
                reason: reason,
                comments: comments,
                status: 'pending',
                date: new Date().toISOString(),
                adminResponse: null
            };
            
            returnRequests.push(newRequest);
            localStorage.setItem('return_requests', JSON.stringify(returnRequests));
            
            // Update order status to show return requested
            const order = allOrders.find(o => o.id === orderId);
            if (order) order.status = type === 'return' ? 'Return Requested' : 'Exchange Requested';
            localStorage.setItem('attar_orders', JSON.stringify(allOrders));
            
            showToast('Return request submitted successfully! Admin will review within 24-48 hours.');
            closeReturnModal();
            renderCustomerDashboard();
        }

        function switchTab(tabName) {
            ['orders', 'returns', 'profile'].forEach(t => {
                const el = document.getElementById(`${t}Tab`);
                if (el) el.classList.remove('active');
            });
            document.getElementById(`${tabName}Tab`).classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if (event && event.target) event.target.classList.add('active');
        }

        function updateProfile() {
            const name = document.getElementById('profileName').value;
            const phone = document.getElementById('profilePhone').value;
            if (!name) { showToast('Please enter your name'); return; }
            currentUser.name = name; currentUser.phone = phone;
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            const userIndex = allUsers.findIndex(u => u.email === currentUser.email);
            if (userIndex !== -1) { allUsers[userIndex].name = name; allUsers[userIndex].phone = phone; localStorage.setItem('attar_users', JSON.stringify(allUsers)); }
            showToast('Profile updated!');
        }

        function changePassword() {
            const current = document.getElementById('currentPassword').value;
            const newPass = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;
            const user = allUsers.find(u => u.email === currentUser.email);
            if (!user) { showToast('User not found'); return; }
            if (user.password !== current) { showToast('Current password incorrect'); return; }
            if (newPass.length < 6) { showToast('Password must be 6+ characters'); return; }
            if (newPass !== confirm) { showToast('Passwords do not match'); return; }
            user.password = newPass;
            localStorage.setItem('attar_users', JSON.stringify(allUsers));
            showToast('Password changed! Please login again.');
            setTimeout(() => logout(), 2000);
        }

        function trackOrder(orderId) { window.location.href = `order-tracking.html?order=${orderId}`; }
        
        function viewOrderDetails(orderId) {
            const order = allOrders.find(o => o.id === orderId);
            if (!order) return;
            alert(`Order #${order.id}\nDate: ${formatDate(order.date)}\nStatus: ${order.status}\nTotal: ৳${order.total}\nTracking: ${order.trackingNumber || 'N/A'}\nItems: ${order.items?.length || 0}`);
        }

        window.switchTab = switchTab;
        window.updateProfile = updateProfile;
        window.changePassword = changePassword;
        window.trackOrder = trackOrder;
        window.viewOrderDetails = viewOrderDetails;
        window.showReturnModal = showReturnModal;
        window.closeReturnModal = closeReturnModal;
        window.submitReturnRequest = submitReturnRequest;

        initDashboard();
    </script>
</body>
</html>
