<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - WE ARE MUSLIM | Premium Attars</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .shop-container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 2rem;
        }

        .sidebar {
            background: white;
            padding: 1.5rem;
            border-radius: 20px;
            height: fit-content;
            position: sticky;
            top: 100px;
            box-shadow: var(--shadow-sm);
        }

        .filter-group {
            margin-bottom: 1.5rem;
        }

        .filter-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .filter-group select,
        .filter-group input {
            width: 100%;
            padding: 0.7rem;
            border: 1px solid var(--border);
            border-radius: 12px;
        }

        .price-slider {
            margin: 1rem 0;
        }

        .price-slider input {
            width: 100%;
        }

        .price-values {
            display: flex;
            justify-content: space-between;
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        .product-card {
            background: var(--surface);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s ease;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
        }

        .product-badge {
            position: absolute;
            top: 1rem;
            left: 1rem;
            background: var(--accent);
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: bold;
            z-index: 2;
        }

        .product-badge.sold-out {
            background: var(--danger);
            color: white;
        }

        .product-actions {
            position: absolute;
            top: 1rem;
            right: 1rem;
            display: flex;
            gap: 0.5rem;
            z-index: 2;
        }

        .product-actions button {
            background: white;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .product-actions button:hover {
            background: var(--primary);
            color: white;
        }

        .product-img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .product-info {
            padding: 1rem;
        }

        .product-title {
            font-weight: 600;
            font-size: 1rem;
        }

        .product-price {
            color: var(--primary);
            font-size: 1.2rem;
            font-weight: 700;
            margin: 0.5rem 0;
        }

        .stock-status {
            font-size: 0.8rem;
            margin: 0.5rem 0;
        }

        .in-stock {
            color: var(--success);
        }

        .low-stock {
            color: var(--warning);
        }

        .out-of-stock {
            color: var(--danger);
        }

        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .stock-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 2rem;
            border-radius: 20px;
            z-index: 2100;
            display: none;
            width: 90%;
            max-width: 400px;
        }

        .stock-modal.open {
            display: block;
        }

        @media (max-width: 768px) {
            .shop-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div id="navigation-placeholder"></div>

    <div class="shop-container">
        <!-- Sidebar Filters -->
        <aside class="sidebar">
            <h3 style="margin-bottom: 1.5rem;">Filter Attars</h3>

            <div class="filter-group">
                <label>🔍 Search</label>
                <input type="text" id="searchInput" placeholder="Search products...">
            </div>

            <div class="filter-group">
                <label>🏷️ Brand</label>
                <select id="brandFilter">
                    <option value="">All Brands</option>
                </select>
            </div>

            <div class="filter-group">
                <label>💰 Max Price (৳)</label>
                <div class="price-slider">
                    <input type="range" id="priceSlider" min="0" max="5000" value="5000">
                    <div class="price-values">
                        <span>৳0</span>
                        <span id="priceValue">৳5000</span>
                        <span>৳5000+</span>
                    </div>
                </div>
            </div>

            <div class="filter-group">
                <label>🌸 Fragrance</label>
                <select id="fragranceFilter">
                    <option value="">All Fragrances</option>
                </select>
            </div>

            <div class="filter-group">
                <label>📊 Stock Status</label>
                <select id="stockFilter">
                    <option value="all">All</option>
                    <option value="in">In Stock</option>
                    <option value="low">Low Stock (≤10)</option>
                    <option value="out">Out of Stock</option>
                </select>
            </div>

            <div class="filter-group">
                <label>⭐ Rating</label>
                <select id="ratingFilter">
                    <option value="all">All Ratings</option>
                    <option value="4">4★ & above</option>
                    <option value="3">3★ & above</option>
                </select>
            </div>

            <div class="filter-group">
                <label>🎁 Sort By</label>
                <select id="sortFilter">
                    <option value="default">Default</option>
                    <option value="price_asc">Price: Low to High</option>
                    <option value="price_desc">Price: High to Low</option>
                    <option value="rating">Highest Rated</option>
                </select>
            </div>

            <button class="btn btn-primary" id="applyFilters" style="width:100%">Apply Filters</button>
            <button class="btn" id="resetFilters" style="width:100%; margin-top:10px;">Reset All</button>
        </aside>

        <!-- Products Grid -->
        <main>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;">
                <div id="productCount"></div>
                <div>
                    <button class="btn" onclick="goToCompare()"><i class="fas fa-chart-line"></i> Compare</button>
                </div>
            </div>
            <div class="product-grid" id="productGrid">
                <div class="loading">Loading products...</div>
            </div>
        </main>
    </div>

    <!-- Back in Stock Modal -->
    <div class="stock-modal" id="stockModal">
        <h3>Notify Me When Back in Stock</h3>
        <p id="stockProductName"></p>
        <input type="email" id="stockEmail" placeholder="Your email" style="width:100%; padding:0.8rem; margin:1rem 0; border-radius:12px; border:1px solid var(--border);">
        <button class="btn btn-primary" onclick="saveStockAlert()" style="width:100%;">Notify Me</button>
        <button class="btn" onclick="closeStockModal()" style="width:100%; margin-top:0.5rem;">Cancel</button>
    </div>

    <script src="js/navigation.js"></script>
    <script src="js/utils.js"></script>
<script>
    let products = [];
    let cart = [];
    let wishlist = [];
    let currentStockProduct = null;

    // Helper function to escape HTML
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Load products from MySQL database via PHP API
    async function loadShopData() {
        try {
            const grid = document.getElementById('productGrid');
            if (grid) {
                grid.innerHTML = '<div class="loading">Loading products from database...</div>';
            }
            
            console.log('Fetching products from API...');
            const response = await fetch('api/get-products.php');
            const data = await response.json();
            
            console.log('API Response:', data);
            
            if (data.success) {
                products = data.products;
                console.log(`Loaded ${products.length} products from database`);
            } else {
                console.error('API error:', data.error);
                products = [];
                showToast('Error loading products: ' + (data.error || 'Unknown error'));
            }
            
            const currentUser = getCurrentUser();
            if (currentUser) {
                cart = JSON.parse(localStorage.getItem('attar_cart')) || [];
                wishlist = JSON.parse(localStorage.getItem('attar_wishlist')) || [];
            } else {
                cart = [];
                wishlist = [];
            }
            
            updateFilters();
            renderProducts();
            
        } catch (error) {
            console.error('Error loading products:', error);
            showToast('Failed to load products. Check console for details.');
            products = [];
            updateFilters();
            renderProducts();
        }
    }

    function updateFilters() {
        const brands = [...new Set(products.map(p => p.brand).filter(b => b))];
        const fragrances = [...new Set(products.map(p => p.fragrance).filter(f => f))];

        const brandSelect = document.getElementById('brandFilter');
        if (brandSelect) {
            brandSelect.innerHTML = '<option value="">All Brands</option>' +
                brands.map(b => `<option value="${escapeHtml(b)}">${escapeHtml(b)}</option>`).join('');
        }

        const fragranceSelect = document.getElementById('fragranceFilter');
        if (fragranceSelect) {
            fragranceSelect.innerHTML = '<option value="">All Fragrances</option>' +
                fragrances.map(f => `<option value="${escapeHtml(f)}">${escapeHtml(f)}</option>`).join('');
        }
    }

    function renderProducts() {
        const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
        const brand = document.getElementById('brandFilter')?.value || '';
        const fragrance = document.getElementById('fragranceFilter')?.value || '';
        const stockStatus = document.getElementById('stockFilter')?.value || 'all';
        const ratingFilter = document.getElementById('ratingFilter')?.value || 'all';
        const sortBy = document.getElementById('sortFilter')?.value || 'default';
        const maxPrice = parseInt(document.getElementById('priceSlider')?.value || 5000);

        let filtered = products.filter(p => {
            if (searchTerm && !p.name.toLowerCase().includes(searchTerm) && !(p.brand && p.brand.toLowerCase().includes(searchTerm))) return false;
            if (brand && p.brand !== brand) return false;
            if (fragrance && p.fragrance !== fragrance) return false;
            if (p.price > maxPrice) return false;
            if (stockStatus === 'in' && p.stock === 0) return false;
            if (stockStatus === 'low' && (p.stock === 0 || p.stock > 10)) return false;
            if (stockStatus === 'out' && p.stock > 0) return false;
            if (ratingFilter !== 'all' && p.ratings < parseInt(ratingFilter)) return false;
            return true;
        });

        if (sortBy === 'price_asc') filtered.sort((a, b) => a.price - b.price);
        else if (sortBy === 'price_desc') filtered.sort((a, b) => b.price - a.price);
        else if (sortBy === 'rating') filtered.sort((a, b) => b.ratings - a.ratings);

        const productCountSpan = document.getElementById('productCount');
        if (productCountSpan) {
            productCountSpan.innerHTML = `Showing ${filtered.length} of ${products.length} products`;
        }

        const grid = document.getElementById('productGrid');
        if (!grid) return;

        if (filtered.length === 0) {
            grid.innerHTML = '<div style="text-align: center; padding: 3rem;">No products found 😢</div>';
            return;
        }

        const isLoggedIn = getCurrentUser() !== null;

        grid.innerHTML = filtered.map(p => {
            let imageUrl = p.image;
            if (!imageUrl || imageUrl === '') {
                imageUrl = 'https://via.placeholder.com/300x250?text=' + encodeURIComponent(p.name);
            }
            
            return `
                <div class="product-card">
                    ${p.stock === 0 ? '<div class="product-badge sold-out">Sold Out</div>' : ''}
                    <div class="product-actions">
                        <button onclick="event.stopPropagation(); addToWishlist(${p.id})"><i class="far fa-heart"></i></button>
                        <button onclick="event.stopPropagation(); addToCompare(${p.id})"><i class="fas fa-chart-line"></i></button>
                    </div>
                    <img class="product-img" src="${imageUrl}" onclick="viewProduct(${p.id})" onerror="this.src='https://via.placeholder.com/300x250?text=Attar'">
                    <div class="product-info" onclick="viewProduct(${p.id})">
                        <div class="product-title">${escapeHtml(p.name)}</div>
                        <div style="font-size: 0.8rem; color: #666;">${escapeHtml(p.brand || '')} | ${escapeHtml(p.fragrance || '')}</div>
                        <div class="product-price">৳${parseFloat(p.price).toLocaleString()}</div>
                        <div class="stock-status ${p.stock > 10 ? 'in-stock' : (p.stock > 0 ? 'low-stock' : 'out-of-stock')}">
                            ${p.stock > 10 ? '✓ In Stock' : (p.stock > 0 ? `⚠ Only ${p.stock} left` : '✗ Out of Stock')}
                        </div>
                        <div style="font-size: 0.8rem;">⭐ ${p.ratings || 0} (${p.reviews || 0} reviews)</div>
                        ${p.stock > 0 ?
                            `<button class="btn btn-primary" style="width:100%; margin-top: 10px;" onclick="event.stopPropagation(); addToCart(${p.id})">
                                <i class="fas fa-shopping-cart"></i> ${isLoggedIn ? 'Add to Cart' : 'Login to Add to Cart'}
                            </button>` :
                            `<button class="btn" style="width:100%; margin-top: 10px; background: #6b7280; color: white;" onclick="event.stopPropagation(); showStockAlert(${p.id})">
                                <i class="fas fa-bell"></i> Notify Me
                            </button>`
                        }
                    </div>
                </div>
            `;
        }).join('');
    }

// Replace the addToCart function
function addToCart(productId) {
    if (!requireLogin('add items to cart')) return;
    
    // Convert productId to number to match database ID
    const numericId = parseInt(productId);
    const product = products.find(p => parseInt(p.id) === numericId);
    
    console.log('Adding to cart - Product ID:', numericId);
    console.log('Available products:', products);
    console.log('Found product:', product);
    
    if (!product) {
        showToast('Product not found. Please refresh the page.');
        return;
    }
    
    if (product.stock === 0) { 
        showStockAlert(numericId); 
        return; 
    }
    
    let currentCart = JSON.parse(localStorage.getItem('attar_cart')) || [];
    let item = currentCart.find(i => parseInt(i.id) === numericId);
    
    if (item) {
        if (item.quantity < product.stock) {
            item.quantity++;
        } else {
            showToast('Not enough stock available!');
            return;
        }
    } else {
        currentCart.push({ 
            id: numericId, 
            quantity: 1 
        });
    }
    
    localStorage.setItem('attar_cart', JSON.stringify(currentCart));
    
    if (typeof updateNavCartCount === 'function') {
        updateNavCartCount();
    }
    
    showToast(`${product.name} added to cart!`);
}

// Replace addToWishlist function
function addToWishlist(productId) {
    if (!requireLogin('add items to wishlist')) return;
    
    const numericId = parseInt(productId);
    const product = products.find(p => parseInt(p.id) === numericId);
    
    if (!product) {
        showToast('Product not found');
        return;
    }
    
    let currentWishlist = JSON.parse(localStorage.getItem('attar_wishlist')) || [];
    if (!currentWishlist.includes(numericId)) {
        currentWishlist.push(numericId);
        localStorage.setItem('attar_wishlist', JSON.stringify(currentWishlist));
        if (typeof updateNavWishlistCount === 'function') {
            updateNavWishlistCount();
        }
        showToast(`${product.name} added to wishlist! ❤️`);
    } else {
        showToast('Already in wishlist');
    }
}

// Replace addToCompare function
function addToCompare(productId) {
    if (!requireLogin('compare products')) return;
    
    const numericId = parseInt(productId);
    let compareList = JSON.parse(localStorage.getItem('attar_compare')) || [];
    
    if (compareList.includes(numericId)) {
        showToast('Already in compare list');
        return;
    }
    
    if (compareList.length >= 4) {
        showToast('Can compare up to 4 products only');
        return;
    }
    
    compareList.push(numericId);
    localStorage.setItem('attar_compare', JSON.stringify(compareList));
    showToast('Added to compare!');
}

// Replace showStockAlert function
function showStockAlert(productId) {
    const numericId = parseInt(productId);
    currentStockProduct = products.find(p => parseInt(p.id) === numericId);
    if (!currentStockProduct) {
        showToast('Product not found');
        return;
    }
    const modal = document.getElementById('stockModal');
    const productNameSpan = document.getElementById('stockProductName');
    if (productNameSpan) productNameSpan.innerText = currentStockProduct.name;
    if (modal) modal.classList.add('open');
}
    function addToWishlist(productId) {
        if (!requireLogin('add items to wishlist')) return;
        const product = products.find(p => p.id === productId);
        let currentWishlist = JSON.parse(localStorage.getItem('attar_wishlist')) || [];
        if (!currentWishlist.includes(productId)) {
            currentWishlist.push(productId);
            localStorage.setItem('attar_wishlist', JSON.stringify(currentWishlist));
            if (typeof updateNavWishlistCount === 'function') {
                updateNavWishlistCount();
            }
            showToast(`${product.name} added to wishlist! ❤️`);
        } else {
            showToast('Already in wishlist');
        }
    }

    function addToCompare(productId) {
        if (!requireLogin('compare products')) return;
        
        let compareList = JSON.parse(localStorage.getItem('attar_compare')) || [];
        
        if (compareList.includes(productId)) {
            showToast('Already in compare list');
            return;
        }
        
        if (compareList.length >= 4) {
            showToast('Can compare up to 4 products only');
            return;
        }
        
        compareList.push(productId);
        localStorage.setItem('attar_compare', JSON.stringify(compareList));
        showToast('Added to compare!');
    }

    function goToCompare() {
        const compareList = JSON.parse(localStorage.getItem('attar_compare')) || [];
        if (compareList.length === 0) {
            showToast('No products in compare list. Add some products first!');
            return;
        }
        window.location.href = 'compare.html';
    }

    function viewProduct(productId) {
        localStorage.setItem('viewProductId', productId);
        window.location.href = 'products.html';
    }

    function showStockAlert(productId) {
        currentStockProduct = products.find(p => p.id === productId);
        const modal = document.getElementById('stockModal');
        const productNameSpan = document.getElementById('stockProductName');
        if (productNameSpan) productNameSpan.innerText = currentStockProduct.name;
        if (modal) modal.classList.add('open');
    }

    function closeStockModal() {
        const modal = document.getElementById('stockModal');
        if (modal) modal.classList.remove('open');
        const emailInput = document.getElementById('stockEmail');
        if (emailInput) emailInput.value = '';
    }

    function saveStockAlert() {
        const email = document.getElementById('stockEmail').value;
        if (!email || !email.includes('@')) {
            showToast('Please enter a valid email address');
            return;
        }
        let waitlist = JSON.parse(localStorage.getItem('stock_waitlist')) || [];
        waitlist.push({
            productId: currentStockProduct.id,
            productName: currentStockProduct.name,
            email: email,
            date: new Date().toISOString(),
            notified: false
        });
        localStorage.setItem('stock_waitlist', JSON.stringify(waitlist));
        showToast(`We'll notify you when ${currentStockProduct.name} is back in stock!`);
        closeStockModal();
    }

    document.addEventListener('DOMContentLoaded', function () {
        loadShopData();

        document.getElementById('applyFilters')?.addEventListener('click', () => {
            renderProducts();
        });

        document.getElementById('resetFilters')?.addEventListener('click', () => {
            const brandFilter = document.getElementById('brandFilter');
            const fragranceFilter = document.getElementById('fragranceFilter');
            const stockFilter = document.getElementById('stockFilter');
            const ratingFilter = document.getElementById('ratingFilter');
            const sortFilter = document.getElementById('sortFilter');
            const priceSlider = document.getElementById('priceSlider');
            const searchInput = document.getElementById('searchInput');

            if (brandFilter) brandFilter.value = '';
            if (fragranceFilter) fragranceFilter.value = '';
            if (stockFilter) stockFilter.value = 'all';
            if (ratingFilter) ratingFilter.value = 'all';
            if (sortFilter) sortFilter.value = 'default';
            if (priceSlider) priceSlider.value = '5000';
            if (searchInput) searchInput.value = '';

            const priceValue = document.getElementById('priceValue');
            if (priceValue) priceValue.innerText = '৳5000';

            renderProducts();
        });

        document.getElementById('searchInput')?.addEventListener('keyup', () => {
            renderProducts();
        });

        document.getElementById('priceSlider')?.addEventListener('input', (e) => {
            const priceValue = document.getElementById('priceValue');
            if (priceValue) priceValue.innerText = '৳' + e.target.value;
            renderProducts();
        });
    });

    // Make functions globally available
    window.addToCart = addToCart;
    window.addToWishlist = addToWishlist;
    window.addToCompare = addToCompare;
    window.goToCompare = goToCompare;
    window.viewProduct = viewProduct;
    window.showStockAlert = showStockAlert;
    window.closeStockModal = closeStockModal;
    window.saveStockAlert = saveStockAlert;
</script></body>

</html>
