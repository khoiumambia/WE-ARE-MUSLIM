<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - WE ARE MUSLIM | Premium Attars</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .shop-container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 2rem;
        }

        .sidebar {
            background: white;
            padding: 1.5rem;
            border-radius: 20px;
            height: fit-content;
            position: sticky;
            top: 100px;
            box-shadow: var(--shadow-sm);
        }

        .filter-group {
            margin-bottom: 1.5rem;
        }

        .filter-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .filter-group select,
        .filter-group input {
            width: 100%;
            padding: 0.7rem;
            border: 1px solid var(--border);
            border-radius: 12px;
        }

        .price-slider {
            margin: 1rem 0;
        }

        .price-slider input {
            width: 100%;
        }

        .price-values {
            display: flex;
            justify-content: space-between;
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }

        .cart-sidebar {
            position: fixed;
            right: -450px;
            top: 0;
            width: 450px;
            height: 100vh;
            background: white;
            box-shadow: -2px 0 8px rgba(0, 0, 0, 0.1);
            transition: right 0.3s ease;
            z-index: 2000;
            padding: 2rem;
            overflow-y: auto;
        }

        .cart-sidebar.open {
            right: 0;
        }

        .cart-item {
            border-bottom: 1px solid var(--border);
            padding: 1rem 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1999;
            display: none;
        }

        .overlay.open {
            display: block;
        }

        .stock-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 2rem;
            border-radius: 20px;
            z-index: 2100;
            display: none;
            width: 90%;
            max-width: 400px;
        }

        .stock-modal.open {
            display: block;
        }

        @media (max-width: 768px) {
            .shop-container {
                grid-template-columns: 1fr;
            }

            .cart-sidebar {
                width: 100%;
                right: -100%;
            }
        }
    </style>
</head>

<body>

    <div id="navigation-placeholder"></div>

    <div class="shop-container">
        <!-- Sidebar Filters -->
        <aside class="sidebar">
            <h3 style="margin-bottom: 1.5rem;">Filter Attars</h3>

            <div class="filter-group">
                <label>🔍 Search</label>
                <input type="text" id="searchInput" placeholder="Search products...">
            </div>

            <div class="filter-group">
                <label>🏷️ Brand</label>
                <select id="brandFilter">
                    <option value="">All Brands</option>
                </select>
            </div>

            <div class="filter-group">
                <label>💰 Max Price (৳)</label>
                <div class="price-slider">
                    <input type="range" id="priceSlider" min="0" max="5000" value="5000">
                    <div class="price-values">
                        <span>৳0</span>
                        <span id="priceValue">৳5000</span>
                        <span>৳5000+</span>
                    </div>
                </div>
            </div>

            <div class="filter-group">
                <label>🌸 Fragrance</label>
                <select id="fragranceFilter">
                    <option value="">All Fragrances</option>
                </select>
            </div>

            <div class="filter-group">
                <label>📊 Stock Status</label>
                <select id="stockFilter">
                    <option value="all">All</option>
                    <option value="in">In Stock</option>
                    <option value="low">Low Stock (≤10)</option>
                    <option value="out">Out of Stock</option>
                </select>
            </div>

            <div class="filter-group">
                <label>⭐ Rating</label>
                <select id="ratingFilter">
                    <option value="all">All Ratings</option>
                    <option value="4">4★ & above</option>
                    <option value="3">3★ & above</option>
                </select>
            </div>

            <div class="filter-group">
                <label>🎁 Sort By</label>
                <select id="sortFilter">
                    <option value="default">Default</option>
                    <option value="price_asc">Price: Low to High</option>
                    <option value="price_desc">Price: High to Low</option>
                    <option value="rating">Highest Rated</option>
                </select>
            </div>

            <button class="btn btn-primary" id="applyFilters" style="width:100%">Apply Filters</button>
            <button class="btn" id="resetFilters" style="width:100%; margin-top:10px;">Reset All</button>
        </aside>

        <!-- Products Grid -->
        <main>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;">
                <div id="productCount"></div>
                <div>
                    <button class="btn" onclick="toggleView()"><i class="fas fa-th-large"></i></button>
                    <button class="btn" onclick="window.location.href='compare.html'"><i class="fas fa-chart-line"></i> Compare</button>
                </div>
            </div>
            <div class="product-grid" id="productGrid">
                <div class="loading">Loading products...</div>
            </div>
            <div id="loadMoreBtn" style="text-align: center; margin-top: 2rem; display: none;">
                <button class="btn btn-primary" onclick="loadMoreProducts()">Load More <i class="fas fa-arrow-down"></i></button>
            </div>
        </main>
    </div>

    <!-- Cart Sidebar -->
    <div class="overlay" id="cartOverlay" onclick="closeCart()"></div>
    <div class="cart-sidebar" id="cartSidebar">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
            <h2>Your Cart</h2>
            <button onclick="closeCart()" style="background: none; border: none; font-size: 1.5rem; cursor: pointer;">&times;</button>
        </div>
        <div id="cartItems"></div>
        <div style="margin-top: 2rem; padding-top: 1rem; border-top: 2px solid var(--border);">
            <div style="display: flex; justify-content: space-between; margin: 0.5rem 0;">
                <strong>Subtotal:</strong>
                <span>৳<span id="cartSubtotal">0</span></span>
            </div>
            <div style="display: flex; justify-content: space-between; margin: 0.5rem 0; color: green;">
                <strong>Discount:</strong>
                <span>-৳<span id="cartDiscount">0</span></span>
            </div>
            <div style="display: flex; justify-content: space-between; margin: 0.5rem 0; font-size: 1.2rem;">
                <strong>Total:</strong>
                <strong>৳<span id="cartTotal">0</span></strong>
            </div>
            <div style="margin: 1rem 0;">
                <input type="text" id="cartCoupon" placeholder="Coupon code" style="width: 100%; padding: 0.8rem; border: 1px solid var(--border); border-radius: 12px;">
                <button class="btn" onclick="applyCoupon()" style="width:100%; margin-top: 0.5rem;">Apply Coupon</button>
            </div>
            <button class="btn btn-primary" id="checkoutBtn" style="width:100%; margin-top: 1rem;">Proceed to Checkout</button>
        </div>
    </div>

    <!-- Back in Stock Modal -->
    <div class="stock-modal" id="stockModal">
        <h3>Notify Me When Back in Stock</h3>
        <p id="stockProductName"></p>
        <input type="email" id="stockEmail" placeholder="Your email" style="width:100%; padding:0.8rem; margin:1rem 0; border-radius:12px; border:1px solid var(--border);">
        <button class="btn btn-primary" onclick="saveStockAlert()" style="width:100%;">Notify Me</button>
        <button class="btn" onclick="closeStockModal()" style="width:100%; margin-top:0.5rem;">Cancel</button>
    </div>

    <script src="js/navigation.js"></script>
    <script src="js/utils.js"></script>
    <script>
        let products = [];
        let cart = [];
        let wishlist = [];
        let appliedCoupon = null;
        let currentStockProduct = null;
        let currentPage = 1;
        const productsPerPage = 12;

        const coupons = [
            { code: "WELCOME10", discount: 10, minAmount: 500 },
            { code: "RAMADAN20", discount: 20, minAmount: 1000 },
            { code: "FREESHIP", discount: 5, minAmount: 2000 },
            { code: "EIDSPECIAL", discount: 25, minAmount: 3000 }
        ];

        function loadShopData() {
            const stored = localStorage.getItem('attar_products');
            if (stored) {
                products = JSON.parse(stored);
            } else {
                products = [
                    { id: 1, name: "Oudh Royal", brand: "Arabian Oud", fragrance: "Woody Oud", price: 1200, stock: 15, image: "https://images.unsplash.com/photo-1594035910387-fea47794261f?w=300", ratings: 4.8, reviews: 124 },
                    { id: 2, name: "Musk Al Mahabba", brand: "Swiss Arabian", fragrance: "Musk", price: 850, stock: 0, image: "https://images.unsplash.com/photo-1585386959984-a4155224a1ad?w=300", ratings: 4.6, reviews: 89 },
                    { id: 3, name: "Rose De Makkah", brand: "Al Haramain", fragrance: "Rose", price: 1500, stock: 3, image: "https://images.unsplash.com/photo-1592945403244-b3fbafd7f539?w=300", ratings: 4.9, reviews: 56 },
                    { id: 4, name: "Amber Night", brand: "Rasasi", fragrance: "Amber", price: 2200, stock: 20, image: "https://images.unsplash.com/photo-1595428774223-ef52624120d2?w=300", ratings: 4.7, reviews: 203 },
                    { id: 5, name: "Sandalwood Classic", brand: "Ajmal", fragrance: "Sandalwood", price: 990, stock: 8, image: "https://images.unsplash.com/photo-1594035910387-fea47794261f?w=300", ratings: 4.5, reviews: 67 }
                ];
                localStorage.setItem('attar_products', JSON.stringify(products));
            }

            cart = JSON.parse(localStorage.getItem('attar_cart')) || [];
            wishlist = JSON.parse(localStorage.getItem('attar_wishlist')) || [];

            updateFilters();
            renderProducts();
        }

        function updateFilters() {
            const brands = [...new Set(products.map(p => p.brand))];
            const fragrances = [...new Set(products.map(p => p.fragrance))];

            const brandSelect = document.getElementById('brandFilter');
            if (brandSelect) {
                brandSelect.innerHTML = '<option value="">All Brands</option>' +
                    brands.map(b => `<option value="${b}">${b}</option>`).join('');
            }

            const fragranceSelect = document.getElementById('fragranceFilter');
            if (fragranceSelect) {
                fragranceSelect.innerHTML = '<option value="">All Fragrances</option>' +
                    fragrances.map(f => `<option value="${f}">${f}</option>`).join('');
            }
        }

        function renderProducts() {
            const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
            const brand = document.getElementById('brandFilter')?.value || '';
            const fragrance = document.getElementById('fragranceFilter')?.value || '';
            const stockStatus = document.getElementById('stockFilter')?.value || 'all';
            const ratingFilter = document.getElementById('ratingFilter')?.value || 'all';
            const sortBy = document.getElementById('sortFilter')?.value || 'default';
            const maxPrice = parseInt(document.getElementById('priceSlider')?.value || 5000);

            let filtered = products.filter(p => {
                if (searchTerm && !p.name.toLowerCase().includes(searchTerm) && !p.brand.toLowerCase().includes(searchTerm)) return false;
                if (brand && p.brand !== brand) return false;
                if (fragrance && p.fragrance !== fragrance) return false;
                if (p.price > maxPrice) return false;
                if (stockStatus === 'in' && p.stock === 0) return false;
                if (stockStatus === 'low' && (p.stock === 0 || p.stock > 10)) return false;
                if (stockStatus === 'out' && p.stock > 0) return false;
                if (ratingFilter !== 'all' && p.ratings < parseInt(ratingFilter)) return false;
                return true;
            });

            // Sorting
            if (sortBy === 'price_asc') filtered.sort((a, b) => a.price - b.price);
            else if (sortBy === 'price_desc') filtered.sort((a, b) => b.price - a.price);
            else if (sortBy === 'rating') filtered.sort((a, b) => b.ratings - a.ratings);

            const productCountSpan = document.getElementById('productCount');
            if (productCountSpan) {
                productCountSpan.innerHTML = `Showing ${filtered.length} of ${products.length} products`;
            }

            // Pagination
            const start = 0;
            const end = productsPerPage * currentPage;
            const paginated = filtered.slice(start, end);
            const hasMore = end < filtered.length;

            const loadMoreBtn = document.getElementById('loadMoreBtn');
            if (loadMoreBtn) {
                loadMoreBtn.style.display = hasMore ? 'block' : 'none';
            }

            const grid = document.getElementById('productGrid');
            if (!grid) return;

            if (paginated.length === 0) {
                grid.innerHTML = '<div style="text-align: center; padding: 3rem;">No products found 😢</div>';
                return;
            }

            grid.innerHTML = paginated.map(p => `
                <div class="product-card">
                    ${p.stock === 0 ? '<div class="product-badge sold-out">Sold Out</div>' : ''}
                    <div class="product-actions">
                        <button onclick="event.stopPropagation(); addToWishlist(${p.id})"><i class="far fa-heart"></i></button>
                        <button onclick="event.stopPropagation(); addToCompare(${p.id})"><i class="fas fa-chart-line"></i></button>
                    </div>
                    <img class="product-img" src="${p.image}" onclick="viewProduct(${p.id})" onerror="this.src='https://via.placeholder.com/300x220?text=Attar'">
                    <div class="product-info" onclick="viewProduct(${p.id})">
                        <div class="product-title">${escapeHtml(p.name)}</div>
                        <div style="font-size: 0.8rem; color: #666;">${escapeHtml(p.brand)} | ${escapeHtml(p.fragrance)}</div>
                        <div class="product-price">৳${p.price.toLocaleString()}</div>
                        <div class="stock-status ${p.stock > 10 ? 'in-stock' : (p.stock > 0 ? 'low-stock' : 'out-of-stock')}">
                            ${p.stock > 10 ? '✓ In Stock' : (p.stock > 0 ? `⚠ Only ${p.stock} left` : '✗ Out of Stock')}
                        </div>
                        <div style="font-size: 0.8rem;">⭐ ${p.ratings} (${p.reviews} reviews)</div>
                        ${p.stock > 0 ?
                    `<button class="btn btn-primary" style="width:100%; margin-top: 10px;" onclick="event.stopPropagation(); addToCart(${p.id})">
                                <i class="fas fa-shopping-cart"></i> Add to Cart
                            </button>` :
                    `<button class="btn" style="width:100%; margin-top: 10px; background: #6b7280; color: white;" onclick="event.stopPropagation(); showStockAlert(${p.id})">
                                <i class="fas fa-bell"></i> Notify Me
                            </button>`
                }
                    </div>
                </div>
            `).join('');
        }

        function loadMoreProducts() {
            currentPage++;
            renderProducts();
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;

            if (product.stock === 0) {
                showStockAlert(productId);
                return;
            }

            let item = cart.find(i => i.id === productId);
            if (item) {
                if (item.quantity < product.stock) {
                    item.quantity++;
                } else {
                    showToast('Not enough stock available!');
                    return;
                }
            } else {
                cart.push({ id: productId, quantity: 1 });
            }

            localStorage.setItem('attar_cart', JSON.stringify(cart));
            updateCartUI();
            updateNavCartCount();

            let points = parseInt(localStorage.getItem('loyalty_points')) || 0;
            points += Math.floor(product.price / 100);
            localStorage.setItem('loyalty_points', points);
            updateNavPointsCount();

            showToast(`${product.name} added to cart! +${Math.floor(product.price / 100)} points`);
        }

        function addToWishlist(productId) {
            const product = products.find(p => p.id === productId);
            if (!wishlist.includes(productId)) {
                wishlist.push(productId);
                localStorage.setItem('attar_wishlist', JSON.stringify(wishlist));
                updateNavWishlistCount();
                showToast(`${product.name} added to wishlist! ❤️`);
            } else {
                showToast('Already in wishlist');
            }
        }

        function addToCompare(productId) {
            let compareList = JSON.parse(localStorage.getItem('attar_compare')) || [];
            if (!compareList.includes(productId) && compareList.length < 4) {
                compareList.push(productId);
                localStorage.setItem('attar_compare', JSON.stringify(compareList));
                showToast('Added to compare!');
            } else if (compareList.length >= 4) {
                showToast('Can compare up to 4 products only');
            } else {
                showToast('Already in compare list');
            }
        }

        function viewProduct(productId) {
            localStorage.setItem('viewProductId', productId);
            window.location.href = 'products.html';
        }

        function showStockAlert(productId) {
            currentStockProduct = products.find(p => p.id === productId);
            const modal = document.getElementById('stockModal');
            const productNameSpan = document.getElementById('stockProductName');
            if (productNameSpan) productNameSpan.innerText = currentStockProduct.name;
            if (modal) modal.classList.add('open');
        }

        function closeStockModal() {
            const modal = document.getElementById('stockModal');
            if (modal) modal.classList.remove('open');
            const emailInput = document.getElementById('stockEmail');
            if (emailInput) emailInput.value = '';
        }

        function saveStockAlert() {
            const email = document.getElementById('stockEmail').value;
            if (!email || !email.includes('@')) {
                showToast('Please enter a valid email address');
                return;
            }

            let waitlist = JSON.parse(localStorage.getItem('stock_waitlist')) || [];
            waitlist.push({
                productId: currentStockProduct.id,
                productName: currentStockProduct.name,
                email: email,
                date: new Date().toISOString(),
                notified: false
            });
            localStorage.setItem('stock_waitlist', JSON.stringify(waitlist));

            showToast(`We'll notify you when ${currentStockProduct.name} is back in stock!`);
            closeStockModal();
        }

        function updateCartUI() {
            const cartItemsDiv = document.getElementById('cartItems');
            if (!cartItemsDiv) return;

            let subtotal = 0;
            cartItemsDiv.innerHTML = '';

            cart.forEach(item => {
                const product = products.find(p => p.id === item.id);
                if (product) {
                    const itemTotal = product.price * item.quantity;
                    subtotal += itemTotal;
                    cartItemsDiv.innerHTML += `
                        <div class="cart-item">
                            <div>
                                <strong>${escapeHtml(product.name)}</strong><br>
                                ৳${product.price} x ${item.quantity}
                            </div>
                            <div>
                                <strong>৳${itemTotal.toLocaleString()}</strong>
                                <button onclick="removeFromCart(${item.id})" style="background: none; border: none; color: red; margin-left: 10px; cursor: pointer;">&times;</button>
                            </div>
                        </div>
                    `;
                }
            });

            let discount = 0;
            if (appliedCoupon && subtotal >= appliedCoupon.minAmount) {
                discount = subtotal * appliedCoupon.discount / 100;
            }

            const total = subtotal - discount;

            const subtotalSpan = document.getElementById('cartSubtotal');
            const discountSpan = document.getElementById('cartDiscount');
            const totalSpan = document.getElementById('cartTotal');

            if (subtotalSpan) subtotalSpan.innerText = subtotal.toLocaleString();
            if (discountSpan) discountSpan.innerText = discount.toLocaleString();
            if (totalSpan) totalSpan.innerText = total.toLocaleString();
        }

        function applyCoupon() {
            const code = document.getElementById('cartCoupon').value.toUpperCase();
            const coupon = coupons.find(c => c.code === code);
            if (coupon) {
                appliedCoupon = coupon;
                updateCartUI();
                showToast(`Coupon ${code} applied! ${coupon.discount}% off`);
            } else {
                showToast('Invalid coupon code');
            }
        }

        function removeFromCart(productId) {
            cart = cart.filter(i => i.id !== productId);
            localStorage.setItem('attar_cart', JSON.stringify(cart));
            updateCartUI();
            updateNavCartCount();
            showToast('Removed from cart');
        }

        function openCart() {
            const sidebar = document.getElementById('cartSidebar');
            const overlay = document.getElementById('cartOverlay');
            if (sidebar) sidebar.classList.add('open');
            if (overlay) overlay.classList.add('open');
            updateCartUI();
        }

        function closeCart() {
            const sidebar = document.getElementById('cartSidebar');
            const overlay = document.getElementById('cartOverlay');
            if (sidebar) sidebar.classList.remove('open');
            if (overlay) overlay.classList.remove('open');
        }

// In shop.html, update the checkout function to redirect to payment.html
function checkout() {
    const subtotalSpan = document.getElementById('cartSubtotal');
    const subtotal = parseInt(subtotalSpan?.innerText.replace(/,/g, '')) || 0;
    
    if (subtotal === 0) {
        showToast('Your cart is empty!');
        return;
    }
    
    // Redirect to payment page instead of processing here
    window.location.href = 'payment.html';
}
        function toggleView() {
            const grid = document.getElementById('productGrid');
            if (grid) {
                if (grid.style.display === 'flex') {
                    grid.style.display = 'grid';
                    grid.style.gridTemplateColumns = 'repeat(auto-fill, minmax(260px, 1fr))';
                } else {
                    grid.style.display = 'flex';
                    grid.style.flexDirection = 'column';
                }
            }
        }

        // Event listeners
        document.addEventListener('DOMContentLoaded', function () {
            loadShopData();

            const openCartBtn = document.getElementById('openCartBtn');
            if (openCartBtn) openCartBtn.addEventListener('click', openCart);

            const checkoutBtn = document.getElementById('checkoutBtn');
            if (checkoutBtn) checkoutBtn.addEventListener('click', checkout);

            const applyFiltersBtn = document.getElementById('applyFilters');
            if (applyFiltersBtn) applyFiltersBtn.addEventListener('click', () => {
                currentPage = 1;
                renderProducts();
            });

            const resetFiltersBtn = document.getElementById('resetFilters');
            if (resetFiltersBtn) resetFiltersBtn.addEventListener('click', () => {
                const brandFilter = document.getElementById('brandFilter');
                const fragranceFilter = document.getElementById('fragranceFilter');
                const stockFilter = document.getElementById('stockFilter');
                const ratingFilter = document.getElementById('ratingFilter');
                const sortFilter = document.getElementById('sortFilter');
                const priceSlider = document.getElementById('priceSlider');
                const searchInput = document.getElementById('searchInput');

                if (brandFilter) brandFilter.value = '';
                if (fragranceFilter) fragranceFilter.value = '';
                if (stockFilter) stockFilter.value = 'all';
                if (ratingFilter) ratingFilter.value = 'all';
                if (sortFilter) sortFilter.value = 'default';
                if (priceSlider) priceSlider.value = '5000';
                if (searchInput) searchInput.value = '';

                const priceValue = document.getElementById('priceValue');
                if (priceValue) priceValue.innerText = '৳5000';

                currentPage = 1;
                renderProducts();
            });

            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.addEventListener('keyup', () => {
                    currentPage = 1;
                    renderProducts();
                });
            }

            const priceSlider = document.getElementById('priceSlider');
            if (priceSlider) {
                priceSlider.addEventListener('input', (e) => {
                    const priceValue = document.getElementById('priceValue');
                    if (priceValue) priceValue.innerText = '৳' + e.target.value;
                    renderProducts();
                });
            }
        });

        // Make functions global
        window.addToCart = addToCart;
        window.addToWishlist = addToWishlist;
        window.addToCompare = addToCompare;
        window.viewProduct = viewProduct;
        window.showStockAlert = showStockAlert;
        window.closeStockModal = closeStockModal;
        window.saveStockAlert = saveStockAlert;
        window.removeFromCart = removeFromCart;
        window.openCart = openCart;
        window.closeCart = closeCart;
        window.applyCoupon = applyCoupon;
        window.checkout = checkout;
        window.toggleView = toggleView;
        window.loadMoreProducts = loadMoreProducts;
    </script>
</body>

</html>
