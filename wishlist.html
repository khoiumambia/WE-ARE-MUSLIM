<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wishlist - WE ARE MUSLIM</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .wishlist-container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .share-wishlist {
            text-align: right;
            margin-bottom: 1rem;
        }

        .empty-wishlist {
            text-align: center;
            padding: 4rem;
            background: white;
            border-radius: 20px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        .product-card {
            background: var(--surface);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s ease;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
        }

        .product-actions {
            position: absolute;
            top: 1rem;
            right: 1rem;
            display: flex;
            gap: 0.5rem;
            z-index: 2;
        }

        .product-actions button {
            background: white;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .product-actions button:hover {
            background: var(--danger);
            color: white;
        }

        .product-img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .product-info {
            padding: 1rem;
        }

        .product-title {
            font-weight: 600;
            font-size: 1rem;
        }

        .product-price {
            color: var(--primary);
            font-size: 1.2rem;
            font-weight: 700;
            margin: 0.5rem 0;
        }

        .stock-status {
            font-size: 0.8rem;
            margin: 0.5rem 0;
        }

        .in-stock {
            color: var(--success);
        }

        .out-of-stock {
            color: var(--danger);
        }

        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .loading-wishlist {
            text-align: center;
            padding: 3rem;
        }
    </style>
</head>
<body>

<div id="navigation-placeholder"></div>

<div class="wishlist-container">
    <div class="share-wishlist">
        <button class="btn btn-primary" onclick="shareWishlist()" style="width: auto;">
            <i class="fas fa-share-alt"></i> Share Wishlist
        </button>
    </div>
    <h1 style="font-family: 'Cormorant Garamond'; font-size: 2.5rem;">My Wishlist</h1>
    <div id="wishlistGrid" class="product-grid"><div class="loading-wishlist">Loading your wishlist...</div></div>
</div>

<script src="js/navigation.js"></script>
<script src="js/utils.js"></script>
<script>
    let wishlistIds = [];
    let products = [];

    function checkWishlistAccess() {
        const user = getCurrentUser();
        if (!user) {
            showToast('⚠️ Please login to view your wishlist', 'error');
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 1500);
            return false;
        }
        return true;
    }

    async function loadWishlistData() {
        if (!checkWishlistAccess()) {
            return;
        }
        
        // Load wishlist IDs from localStorage
        wishlistIds = JSON.parse(localStorage.getItem('attar_wishlist')) || [];
        console.log('Wishlist IDs:', wishlistIds);
        
        if (wishlistIds.length === 0) {
            displayEmptyWishlist();
            return;
        }
        
        // Load products from database API
        try {
            const response = await fetch('api/get-products.php');
            const data = await response.json();
            if (data.success) {
                products = data.products;
                console.log('Loaded products:', products.length);
                displayWishlist();
            } else {
                console.error('API error:', data.error);
                products = [];
                displayEmptyWishlist();
            }
        } catch (error) {
            console.error('Error loading products:', error);
            products = [];
            displayEmptyWishlist();
        }
    }

    function displayEmptyWishlist() {
        const grid = document.getElementById('wishlistGrid');
        grid.innerHTML = `
            <div class="empty-wishlist">
                <i class="far fa-heart" style="font-size: 4rem; color: var(--primary);"></i>
                <h2 style="margin: 1rem 0;">Your wishlist is empty</h2>
                <p>Save your favorite items here for later!</p>
                <button class="btn btn-primary" onclick="window.location.href='shop.html'" style="width: auto; margin-top: 1rem; padding: 0.8rem 2rem;">Start Shopping →</button>
            </div>
        `;
    }

    function getImageUrl(imagePath) {
        if (!imagePath) return 'https://placehold.co/300x250/e8ddd3/8B5E3C?text=No+Image';
        if (imagePath.startsWith('http://') || imagePath.startsWith('https://')) return imagePath;
        if (imagePath.startsWith('/uploads/')) return imagePath;
        if (imagePath.startsWith('uploads/')) return imagePath;
        if (imagePath.startsWith('data:')) return imagePath;
        return 'uploads/' + imagePath;
    }

    function displayWishlist() {
        // Filter products that are in wishlist
        const wishlistProducts = products.filter(p => wishlistIds.includes(p.id));
        console.log('Wishlist products found:', wishlistProducts.length);
        
        const grid = document.getElementById('wishlistGrid');

        if (wishlistProducts.length === 0) {
            displayEmptyWishlist();
            return;
        }

        grid.innerHTML = wishlistProducts.map(p => {
            const imageUrl = getImageUrl(p.image);
            const stockStatus = p.stock > 0 ? 'in-stock' : 'out-of-stock';
            const stockText = p.stock > 0 ? '✓ In Stock' : '✗ Out of Stock';
            
            return `
                <div class="product-card">
                    <div class="product-actions">
                        <button onclick="event.stopPropagation(); removeFromWishlist(${p.id})"><i class="fas fa-trash"></i></button>
                    </div>
                    <img class="product-img" src="${imageUrl}" onclick="viewProduct(${p.id})" onerror="this.src='https://placehold.co/300x250/e8ddd3/8B5E3C?text=No+Image'">
                    <div class="product-info" onclick="viewProduct(${p.id})">
                        <div class="product-title">${escapeHtml(p.name)}</div>
                        <p style="color: #666;">${escapeHtml(p.brand)} | ${escapeHtml(p.fragrance)}</p>
                        <div class="product-price">৳${parseFloat(p.price).toLocaleString()}</div>
                        <div class="stock-status ${stockStatus}">
                            ${stockText}
                        </div>
                        ${p.stock > 0 ?
                            `<button class="btn btn-primary" style="width:100%; margin-top: 10px;" onclick="event.stopPropagation(); moveToCart(${p.id})">
                                <i class="fas fa-shopping-cart"></i> Move to Cart
                            </button>` :
                            `<button class="btn" style="width:100%; margin-top: 10px; background: #6b7280; color: white;" onclick="event.stopPropagation(); showStockAlert(${p.id})">
                                <i class="fas fa-bell"></i> Notify Me
                            </button>`
                        }
                    </div>
                </div>
            `;
        }).join('');
    }

    async function moveToCart(productId) {
        // Find product from products array
        const product = products.find(p => p.id === productId);
        if (!product) {
            showToast('Product not found');
            return;
        }
        
        if (product.stock === 0) {
            showToast('Sorry, this product is out of stock!');
            return;
        }

        let cart = JSON.parse(localStorage.getItem('attar_cart')) || [];
        let item = cart.find(i => i.id === productId);
        if (item) {
            if (item.quantity < product.stock) {
                item.quantity++;
            } else {
                showToast('Not enough stock available!');
                return;
            }
        } else {
            cart.push({ id: productId, quantity: 1 });
        }
        localStorage.setItem('attar_cart', JSON.stringify(cart));
        updateNavCartCount();

        // Remove from wishlist after moving to cart
        await removeFromWishlist(productId);
        
        // Add loyalty points
        let points = parseInt(localStorage.getItem('loyalty_points')) || 0;
        points += Math.floor(product.price / 100);
        localStorage.setItem('loyalty_points', points);
        updateNavPointsCount();
        
        showToast(`${product.name} moved to cart! +${Math.floor(product.price / 100)} points`);
    }

    async function removeFromWishlist(productId) {
        const product = products.find(p => p.id === productId);
        wishlistIds = wishlistIds.filter(id => id !== productId);
        localStorage.setItem('attar_wishlist', JSON.stringify(wishlistIds));
        updateNavWishlistCount();
        
        // Refresh the display
        if (wishlistIds.length === 0) {
            displayEmptyWishlist();
        } else {
            displayWishlist();
        }
        
        showToast(`${product?.name || 'Product'} removed from wishlist`);
    }

    function showStockAlert(productId) {
        const product = products.find(p => p.id === productId);
        if (!product) return;
        
        const email = prompt(`Notify me when ${product.name} is back in stock.\n\nEnter your email:`);
        if (email && email.includes('@')) {
            let waitlist = JSON.parse(localStorage.getItem('stock_waitlist')) || [];
            waitlist.push({ 
                productId: product.id, 
                productName: product.name, 
                email: email, 
                date: new Date().toISOString(),
                notified: false
            });
            localStorage.setItem('stock_waitlist', JSON.stringify(waitlist));
            showToast(`We'll notify you when ${product.name} is back!`);
        }
    }

    function shareWishlist() {
        const wishlistProducts = products.filter(p => wishlistIds.includes(p.id));
        if (wishlistProducts.length === 0) {
            showToast('Your wishlist is empty!');
            return;
        }
        
        const productNames = wishlistProducts.map(p => p.name).join(', ');
        const shareText = `Check out my wishlist at WE ARE MUSLIM! I'm interested in: ${productNames}`;

        if (navigator.share) {
            navigator.share({ 
                title: 'My Wishlist - WE ARE MUSLIM', 
                text: shareText, 
                url: window.location.href 
            });
        } else {
            prompt('Share this wishlist link:', window.location.href);
        }
    }

    function viewProduct(id) {
        localStorage.setItem('viewProductId', id);
        window.location.href = 'products.html';
    }

    // Make functions global
    window.moveToCart = moveToCart;
    window.removeFromWishlist = removeFromWishlist;
    window.shareWishlist = shareWishlist;
    window.showStockAlert = showStockAlert;
    window.viewProduct = viewProduct;

    // Load data when page loads
    document.addEventListener('DOMContentLoaded', function() {
        loadWishlistData();
    });
</script>
</body>
</html>
