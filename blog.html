<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - WE ARE MUSLIM | Perfume Guides & Islamic Fragrance</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .blog-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .blog-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .blog-header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .search-blog {
            max-width: 500px;
            margin: 1rem auto;
            display: flex;
            gap: 0.5rem;
        }

        .search-blog input {
            flex: 1;
            padding: 0.8rem;
            border: 1px solid var(--border);
            border-radius: 50px;
        }

        .categories {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin: 2rem 0;
        }

        .category-btn {
            padding: 0.5rem 1rem;
            border: 1px solid var(--border);
            border-radius: 50px;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .category-btn.active,
        .category-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
        }

        .blog-card {
            background: var(--surface);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
        }

        .blog-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-md);
        }

        .blog-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .blog-content {
            padding: 1.5rem;
        }

        .blog-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 0.5rem;
        }

        .blog-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
        }

        .blog-excerpt {
            color: #666;
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .read-more {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin: 3rem 0;
        }

        .page-btn {
            padding: 0.5rem 1rem;
            border: 1px solid var(--border);
            background: white;
            cursor: pointer;
            border-radius: 8px;
        }

        .page-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
    </style>
</head>
<body>

<div id="navigation-placeholder"></div>

<div class="blog-container">
    <div class="blog-header">
        <h1>📝 Fragrance Journal</h1>
        <p>Discover the art of attar making, fragrance guides, and Islamic perfumery traditions</p>

        <div class="search-blog">
            <input type="text" id="searchBlog" placeholder="Search articles...">
            <button class="btn btn-primary" onclick="searchPosts()">Search</button>
        </div>

        <div class="categories" id="categories"></div>
    </div>

    <div class="blog-grid" id="blogGrid"></div>

    <div class="pagination" id="pagination"></div>
</div>

<footer class="footer">
    <div class="footer-content">
        <div>
            <h3>#WE ARE MUSLIM</h3>
            <p>Premium attars crafted with tradition and passion.</p>
        </div>
        <div>
            <h4>Quick Links</h4>
            <a href="shop.html">Shop</a>
            <a href="blog.html">Blog</a>
            <a href="affiliate.html">Affiliate Program</a>
        </div>
        <div>
            <h4>Contact</h4>
            <p>📧 info@wearemuslim.com</p>
            <p>📞 +880 1234 567890</p>
        </div>
    </div>
</footer>

<script src="js/navigation.js"></script>
<script src="js/utils.js"></script>
<script>
    let allPosts = [];
    let currentCategory = 'all';
    let currentPage = 1;
    const postsPerPage = 6;

    function initBlog() {
        const stored = localStorage.getItem('blog_posts');
        if (stored) {
            allPosts = JSON.parse(stored);
        } else {
            allPosts = [
                { id: 1, title: "The Ultimate Guide to Choosing Your First Attar", excerpt: "New to attars? Learn how to select the perfect fragrance based on your personality and occasion...", content: "Full content here...", image: "https://images.unsplash.com/photo-1594035910387-fea47794261f?w=400", category: "guide", author: "Muhammad Rahman", date: "2024-12-15", readTime: 5, views: 1234 },
                { id: 2, title: "The Rich History of Oudh in Islamic Culture", excerpt: "Explore the sacred significance of Oudh in Islamic traditions and its use throughout history...", image: "https://images.unsplash.com/photo-1585386959984-a4155224a1ad?w=400", category: "history", author: "Aisha Khan", date: "2024-12-10", readTime: 7, views: 2345 },
                { id: 3, title: "How to Layer Fragrances Like a Pro", excerpt: "Master the art of combining different attars to create your unique signature scent...", image: "https://images.unsplash.com/photo-1592945403244-b3fbafd7f539?w=400", category: "guide", author: "Omar Faruq", date: "2024-12-05", readTime: 6, views: 987 },
                { id: 4, title: "The Difference Between Attar and Perfume", excerpt: "Understanding the unique characteristics of alcohol-free attars vs conventional perfumes...", image: "https://images.unsplash.com/photo-1595428774223-ef52624120d2?w=400", category: "education", author: "Muhammad Rahman", date: "2024-11-28", readTime: 4, views: 3456 },
                { id: 5, title: "Top 5 Attars for Ramadan and Eid", excerpt: "Discover the most popular fragrances to wear during the blessed month and celebrations...", image: "https://images.unsplash.com/photo-1594035910387-fea47794261f?w=400", category: "seasonal", author: "Aisha Khan", date: "2024-11-20", readTime: 5, views: 5678 },
                { id: 6, title: "How to Store Your Attars Properly", excerpt: "Tips to preserve the longevity and quality of your precious attar collection...", image: "https://images.unsplash.com/photo-1585386959984-a4155224a1ad?w=400", category: "care", author: "Omar Faruq", date: "2024-11-15", readTime: 3, views: 876 }
            ];
            localStorage.setItem('blog_posts', JSON.stringify(allPosts));
        }

        renderCategories();
        renderPosts();
    }

    function renderCategories() {
        const categories = [
            { id: 'all', name: 'All Posts', icon: '📚' },
            { id: 'guide', name: 'Guides', icon: '📖' },
            { id: 'history', name: 'History', icon: '🏛️' },
            { id: 'education', name: 'Education', icon: '🎓' },
            { id: 'seasonal', name: 'Seasonal', icon: '🌙' },
            { id: 'care', name: 'Care Tips', icon: '💝' }
        ];

        const container = document.getElementById('categories');
        container.innerHTML = categories.map(cat => `
            <button class="category-btn ${currentCategory === cat.id ? 'active' : ''}" onclick="filterCategory('${cat.id}')">
                ${cat.icon} ${cat.name}
            </button>
        `).join('');
    }

    function filterCategory(category) {
        currentCategory = category;
        currentPage = 1;
        renderCategories();
        renderPosts();
    }

    function searchPosts() {
        const searchTerm = document.getElementById('searchBlog').value.toLowerCase();
        const filtered = allPosts.filter(p => p.title.toLowerCase().includes(searchTerm) || p.excerpt.toLowerCase().includes(searchTerm));

        if (searchTerm) {
            renderFilteredPosts(filtered);
        } else {
            renderPosts();
        }
    }

    function renderPosts() {
        let filtered = allPosts;
        if (currentCategory !== 'all') {
            filtered = allPosts.filter(p => p.category === currentCategory);
        }
        renderFilteredPosts(filtered);
    }

    function renderFilteredPosts(filtered) {
        const totalPages = Math.ceil(filtered.length / postsPerPage);
        const start = (currentPage - 1) * postsPerPage;
        const paginated = filtered.slice(start, start + postsPerPage);

        const container = document.getElementById('blogGrid');

        if (paginated.length === 0) {
            container.innerHTML = '<div style="text-align: center; padding: 3rem;">No posts found 😢</div>';
            return;
        }

        container.innerHTML = paginated.map(post => `
            <div class="blog-card" onclick="viewPost(${post.id})">
                <img class="blog-image" src="${post.image}" onerror="this.src='https://via.placeholder.com/400x200?text=Blog'">
                <div class="blog-content">
                    <div class="blog-meta">
                        <span><i class="far fa-calendar"></i> ${new Date(post.date).toLocaleDateString()}</span>
                        <span><i class="far fa-clock"></i> ${post.readTime} min read</span>
                        <span><i class="far fa-eye"></i> ${post.views} views</span>
                    </div>
                    <h3 class="blog-title">${escapeHtml(post.title)}</h3>
                    <p class="blog-excerpt">${post.excerpt.substring(0, 120)}...</p>
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span class="read-more">Read More →</span>
                        <span><i class="fas fa-share-alt" onclick="event.stopPropagation(); sharePost(${post.id})"></i></span>
                    </div>
                </div>
            </div>
        `).join('');

        const paginationContainer = document.getElementById('pagination');
        if (totalPages > 1) {
            let paginationHtml = '';
            for (let i = 1; i <= totalPages; i++) {
                paginationHtml += `<button class="page-btn ${currentPage === i ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            paginationContainer.innerHTML = paginationHtml;
        } else {
            paginationContainer.innerHTML = '';
        }
    }

    function goToPage(page) {
        currentPage = page;
        renderPosts();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function viewPost(postId) {
        localStorage.setItem('viewPostId', postId);
        window.open('blog-post.html', '_blank');
    }

    function sharePost(postId) {
        const post = allPosts.find(p => p.id === postId);
        if (navigator.share) {
            navigator.share({ title: post.title, text: post.excerpt, url: window.location.href + '?post=' + postId });
        } else {
            prompt('Share this link:', window.location.href + '?post=' + postId);
        }
    }

    window.filterCategory = filterCategory;
    window.searchPosts = searchPosts;
    window.goToPage = goToPage;
    window.viewPost = viewPost;
    window.sharePost = sharePost;

    initBlog();
</script>
</body>
</html>
