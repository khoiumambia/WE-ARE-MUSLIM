<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Affiliate Program - WE ARE MUSLIM</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .affiliate-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .hero-section {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 3rem;
            border-radius: 30px;
            text-align: center;
            margin-bottom: 2rem;
        }

        .commission-card {
            background: var(--surface);
            padding: 2rem;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 2rem;
        }

        .commission-amount {
            font-size: 3rem;
            font-weight: bold;
            color: var(--primary);
        }

        .referral-link {
            background: var(--surface);
            padding: 2rem;
            border-radius: 20px;
            margin-bottom: 2rem;
        }

        .link-box {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .link-box input {
            flex: 1;
            padding: 1rem;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }

        .stat-card {
            background: var(--surface);
            padding: 1.5rem;
            border-radius: 20px;
            text-align: center;
        }

        .earnings-table {
            background: var(--surface);
            border-radius: 20px;
            overflow: hidden;
        }

        .earnings-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .earnings-table th,
        .earnings-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        .earnings-table th {
            background: var(--background);
        }
    </style>
</head>
<body>

<div id="navigation-placeholder"></div>

<div class="affiliate-container">
    <div class="hero-section">
        <i class="fas fa-hand-holding-usd" style="font-size: 3rem;"></i>
        <h1>Join Our Affiliate Program</h1>
        <p>Earn up to 15% commission on every sale you refer!</p>
        <button class="btn" onclick="joinAffiliate()" style="background: white; color: var(--primary); margin-top: 1rem;">Become an Affiliate →</button>
    </div>

    <div class="commission-card">
        <h2>💰 How It Works</h2>
        <div class="stats-grid">
            <div>
                <i class="fas fa-link" style="font-size: 2rem; color: var(--primary);"></i>
                <h3>1. Share Link</h3>
                <p>Share your unique referral link</p>
            </div>
            <div>
                <i class="fas fa-shopping-cart" style="font-size: 2rem; color: var(--primary);"></i>
                <h3>2. Customer Shops</h3>
                <p>Friends make purchases</p>
            </div>
            <div>
                <i class="fas fa-money-bill-wave" style="font-size: 2rem; color: var(--primary);"></i>
                <h3>3. Earn Commission</h3>
                <p>Get 10-15% per sale</p>
            </div>
        </div>
        <div class="commission-amount">Up to 15% Commission</div>
        <p>Plus bonus rewards for top affiliates!</p>
    </div>

    <div id="affiliateContent"></div>
</div>

<script src="js/navigation.js"></script>
<script src="js/utils.js"></script>
<script>
    let currentUser = null;

    function checkAffiliateAuth() {
        currentUser = getCurrentUser();
        if (currentUser) {
            showAffiliateDashboard();
        } else {
            showJoinPrompt();
        }
    }

    function showJoinPrompt() {
        document.getElementById('affiliateContent').innerHTML = `
            <div class="referral-link" style="text-align: center;">
                <i class="fas fa-user-plus" style="font-size: 3rem; color: var(--primary);"></i>
                <h2>Ready to Start Earning?</h2>
                <p>Login or create an account to join our affiliate program</p>
                <button class="btn btn-primary" onclick="window.location.href='login.html'">Login / Sign Up</button>
            </div>
        `;
    }

    function showAffiliateDashboard() {
        let affiliateData = JSON.parse(localStorage.getItem('affiliate_data')) || {};
        let userAffiliate = affiliateData[currentUser?.email];

        if (!userAffiliate) {
            document.getElementById('affiliateContent').innerHTML = `
                <div class="referral-link" style="text-align: center;">
                    <i class="fas fa-rocket" style="font-size: 3rem; color: var(--primary);"></i>
                    <h2>Become an Affiliate Today!</h2>
                    <p>Start earning commission by sharing our premium attars</p>
                    <button class="btn btn-primary" onclick="joinAffiliate()">Join Now →</button>
                </div>
            `;
            return;
        }

        const referralCode = userAffiliate.code;
        const referralLink = `${window.location.origin}/index.html?ref=${referralCode}`;
        const earnings = userAffiliate.earnings || 0;
        const clicks = userAffiliate.clicks || 0;
        const conversions = userAffiliate.conversions || 0;

        document.getElementById('affiliateContent').innerHTML = `
            <div class="referral-link">
                <h2>🔗 Your Referral Link</h2>
                <div class="link-box">
                    <input type="text" id="referralLink" value="${referralLink}" readonly>
                    <button class="btn btn-primary" onclick="copyReferralLink()">Copy Link</button>
                </div>
                <p style="margin-top: 1rem;">Share this link on social media, WhatsApp, or email!</p>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <i class="fas fa-dollar-sign" style="font-size: 2rem; color: var(--success);"></i>
                    <div class="commission-amount" style="font-size: 2rem;">৳${earnings.toLocaleString()}</div>
                    <p>Total Earnings</p>
                </div>
                <div class="stat-card">
                    <i class="fas fa-mouse-pointer" style="font-size: 2rem; color: var(--primary);"></i>
                    <div class="commission-amount" style="font-size: 2rem;">${clicks}</div>
                    <p>Total Clicks</p>
                </div>
                <div class="stat-card">
                    <i class="fas fa-users" style="font-size: 2rem; color: var(--primary);"></i>
                    <div class="commission-amount" style="font-size: 2rem;">${conversions}</div>
                    <p>Successful Referrals</p>
                </div>
                <div class="stat-card">
                    <i class="fas fa-chart-line" style="font-size: 2rem; color: var(--primary);"></i>
                    <div class="commission-amount" style="font-size: 2rem;">${conversions > 0 ? Math.round((conversions / clicks) * 100) : 0}%</div>
                    <p>Conversion Rate</p>
                </div>
            </div>

            <div class="earnings-table">
                <h3 style="padding: 1rem;">📊 Recent Earnings</h3>
                <div id="earningsList"></div>
            </div>

            <div class="commission-card" style="margin-top: 2rem;">
                <h3>🚀 Affiliate Tiers & Bonuses</h3>
                <div class="stats-grid">
                    <div><strong>Bronze</strong><br>0-5 referrals<br>10% commission</div>
                    <div><strong>Silver</strong><br>6-20 referrals<br>12% commission</div>
                    <div><strong>Gold</strong><br>21-50 referrals<br>15% commission</div>
                    <div><strong>Platinum</strong><br>50+ referrals<br>15% + bonus</div>
                </div>
            </div>
        `;

        displayEarningsHistory(userAffiliate);
    }

    function displayEarningsHistory(affiliate) {
        const earningsList = document.getElementById('earningsList');
        const history = affiliate.history || [];

        if (history.length === 0) {
            earningsList.innerHTML = '<div style="padding: 1rem; text-align: center;">No earnings yet. Start sharing your link!</div>';
            return;
        }

        earningsList.innerHTML = `
            <table>
                <thead>
                    <tr><th>Date</th><th>Customer</th><th>Order Amount</th><th>Commission</th></tr>
                </thead>
                <tbody>
                    ${history.map(h => `
                        <tr>
                            <td>${new Date(h.date).toLocaleDateString()}</td>
                            <td>${h.customerEmail || 'Anonymous'}</td>
                            <td>৳${h.amount.toLocaleString()}</td>
                            <td style="color: green;">+৳${h.commission.toLocaleString()}</td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;
    }

    function joinAffiliate() {
        if (!currentUser) {
            window.location.href = 'login.html';
            return;
        }

        let affiliateData = JSON.parse(localStorage.getItem('affiliate_data')) || {};
        const code = currentUser.email.split('@')[0] + Math.floor(Math.random() * 10000);

        affiliateData[currentUser.email] = {
            code: code,
            earnings: 0,
            clicks: 0,
            conversions: 0,
            history: [],
            joined: new Date().toISOString()
        };

        localStorage.setItem('affiliate_data', JSON.stringify(affiliateData));
        showToast('🎉 Welcome to the affiliate program! Start sharing your link!');
        showAffiliateDashboard();
    }

    function copyReferralLink() {
        const linkInput = document.getElementById('referralLink');
        linkInput.select();
        document.execCommand('copy');
        showToast('✅ Referral link copied to clipboard!');
    }

    window.joinAffiliate = joinAffiliate;
    window.copyReferralLink = copyReferralLink;

    checkAffiliateAuth();
</script>
</body>
</html>
