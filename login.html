<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Sign Up - WE ARE MUSLIM</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container {
            max-width: 500px;
            margin: 4rem auto;
            padding: 0 2rem;
        }
        .auth-card {
            background: white;
            border-radius: 30px;
            padding: 2.5rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        .auth-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid var(--border);
        }
        .auth-tab {
            padding: 0.8rem 1.5rem;
            background: none;
            border: none;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            color: #666;
            transition: all 0.3s ease;
        }
        .auth-tab.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
            margin-bottom: -2px;
        }
        .auth-form {
            display: none;
        }
        .auth-form.active {
            display: block;
        }
        .btn-block {
            width: 100%;
            padding: 1rem;
            font-size: 1rem;
            margin-top: 1rem;
        }
        .demo-accounts {
            margin-top: 2rem;
            padding: 1rem;
            background: var(--background);
            border-radius: 16px;
        }
        .demo-accounts p {
            margin: 0.5rem 0;
            font-size: 0.9rem;
        }
        .forgot-link {
            text-align: right;
            margin-top: -0.5rem;
            margin-bottom: 1rem;
        }
        .forgot-link a {
            color: var(--primary);
            font-size: 0.85rem;
            text-decoration: none;
            cursor: pointer;
        }
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border);
        }
        .divider span {
            padding: 0 1rem;
            color: #666;
            font-size: 0.85rem;
        }
        .google-btn {
            width: 100%;
            padding: 0.9rem;
            background: white;
            border: 1px solid var(--border);
            border-radius: 50px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            transition: all 0.3s ease;
        }
        .google-btn:hover {
            background: #f8f9fa;
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }
        .google-btn i {
            font-size: 1.2rem;
            color: #DB4437;
        }
        .guest-link {
            text-align: center;
            margin-top: 1.5rem;
        }
        .guest-link a {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.85rem;
        }
        .guest-link a:hover {
            text-decoration: underline;
        }
        .forgot-password-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .forgot-password-content {
            background: white;
            border-radius: 24px;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        .forgot-password-content input {
            width: 100%;
            padding: 0.8rem;
            margin: 1rem 0;
            border: 1px solid var(--border);
            border-radius: 12px;
        }
        .message-success {
            color: var(--success);
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }
        .message-error {
            color: var(--danger);
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }
        .message-info {
            color: var(--info);
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-family: inherit;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(139,94,60,0.1);
        }
    </style>
</head>

<body>

    <div id="navigation-placeholder"></div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchTab('login')">Login</button>
                <button class="auth-tab" onclick="switchTab('signup')">Create Account</button>
            </div>

            <!-- Login Form -->
            <div id="loginForm" class="auth-form active">
                <form onsubmit="event.preventDefault(); login();">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="loginEmail" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" placeholder="Enter your password" required>
                    </div>
                    <div class="forgot-link">
                        <a onclick="showForgotPasswordModal()">Forgot Password?</a>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Login →</button>
                </form>

                <div class="divider">
                    <span>OR</span>
                </div>
                
                <button class="google-btn" id="googleSignInBtn">
                    <i class="fab fa-google"></i>
                    Continue with Google
                </button>

                <div class="demo-accounts">
                    <p><strong>Demo Accounts:</strong></p>
                    <p>👑 Admin: admin@attar.com / admin123</p>
                    <p>👤 Customer: user@test.com / user123</p>
                </div>
            </div>

            <!-- Signup Form -->
            <div id="signupForm" class="auth-form">
                <form onsubmit="event.preventDefault(); signup();">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="signupName" placeholder="Your full name" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="signupEmail" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="signupPassword" placeholder="At least 6 characters" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number (optional)</label>
                        <input type="tel" id="signupPhone" placeholder="+880XXXXXXXXX">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Create Account →</button>
                </form>

                <div class="divider">
                    <span>OR</span>
                </div>
                <button class="google-btn" id="googleSignUpBtn">
                    <i class="fab fa-google"></i>
                    Sign up with Google
                </button>
            </div>

            <div class="guest-link">
                <a href="shop.html">Continue as Guest →</a>
            </div>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div id="forgotPasswordModal" class="forgot-password-modal">
        <div class="forgot-password-content">
            <h3><i class="fas fa-key"></i> Reset Password</h3>
            <p>Enter your email address and we'll send you a link to reset your password.</p>
            <input type="email" id="resetEmail" placeholder="Your email address">
            <div id="resetMessage"></div>
            <button class="btn btn-primary btn-block" onclick="sendPasswordResetEmail()">Send Reset Link</button>
            <button class="btn btn-block" onclick="closeForgotPasswordModal()" style="margin-top: 0.5rem; background: #6c757d;">Cancel</button>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <script src="js/navigation.js"></script>
    <script src="js/utils.js"></script>
    <script>
        // ==================== FIREBASE CONFIGURATION ====================
        const firebaseConfig = {
            apiKey: "AIzaSyCP8Uh6Yxu-dIpywGVEXtnQYSUVIoCViyg",
            authDomain: "attar-website-e4434.firebaseapp.com",
            projectId: "attar-website-e4434",
            storageBucket: "attar-website-e4434.firebasestorage.app",
            messagingSenderId: "1002231077102",
            appId: "1:1002231077102:web:b85ab766484bc4f65ebbff",
            measurementId: "G-HRJQW7M430"
        };
        
        // Initialize Firebase
        let auth = null;
        let isFirebaseInitialized = false;
        
        try {
            firebase.initializeApp(firebaseConfig);
            auth = firebase.auth();
            isFirebaseInitialized = true;
            console.log("Firebase initialized successfully");
        } catch (error) {
            console.error("Firebase initialization error:", error);
            isFirebaseInitialized = false;
        }
        
        // ==================== GOOGLE SIGN-IN (POPUP METHOD) ====================
        async function continueWithGoogle() {
            if (!isFirebaseInitialized) {
                showToast('Firebase is initializing. Please try again in a moment.');
                return;
            }
            
            // Show loading state
            const btns = document.querySelectorAll('.google-btn');
            btns.forEach(btn => {
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Opening Google...';
                btn.disabled = true;
            });
            
            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                provider.addScope('email');
                provider.addScope('profile');
                
                // Use popup method (works better with Netlify)
                const result = await auth.signInWithPopup(provider);
                
                // Success! Process the user
                const user = result.user;
                const email = user.email;
                const name = user.displayName;
                
                console.log('Google user:', { email, name, uid: user.uid });
                
                if (!email) {
                    showToast('Could not get email from Google. Please try again.');
                    return;
                }
                
                // Get existing users from localStorage
                let users = getUsers();
                let existingUser = users.find(u => u.email === email);
                
                if (existingUser) {
                    // Existing user - login
                    const { password, ...userWithoutPassword } = existingUser;
                    localStorage.setItem('currentUser', JSON.stringify(userWithoutPassword));
                    console.log('Existing user logged in:', email);
                    showToast(`Welcome back, ${existingUser.name || existingUser.email}!`);
                    setTimeout(() => {
                        if (existingUser.role === 'admin') {
                            window.location.href = 'admin-dashboard.html';
                        } else {
                            window.location.href = 'index.html';
                        }
                    }, 1000);
                } else {
                    // New user - create account
                    const newUser = {
                        id: Date.now(),
                        email: email,
                        password: 'google_oauth_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8),
                        role: 'user',
                        name: name || email.split('@')[0],
                        phone: '',
                        createdAt: new Date().toISOString(),
                        authProvider: 'google'
                    };
                    users.push(newUser);
                    saveUsers(users);
                    
                    const { password, ...userWithoutPassword } = newUser;
                    localStorage.setItem('currentUser', JSON.stringify(userWithoutPassword));
                    console.log('New user created:', newUser.email);
                    showToast(`Welcome ${name || email.split('@')[0]}! Your account has been created.`);
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                }
            } catch (error) {
                console.error('Google Sign-In Error:', error);
                
                if (error.code === 'auth/popup-blocked') {
                    showToast('Popup was blocked. Please allow popups for this site.');
                } else if (error.code === 'auth/popup-closed-by-user') {
                    // User closed the popup - do nothing
                    console.log('User closed the popup');
                } else {
                    showToast('Google Sign-In failed: ' + (error.message || 'Please try again'));
                }
            } finally {
                // Reset buttons
                const btns = document.querySelectorAll('.google-btn');
                btns.forEach(btn => {
                    btn.innerHTML = '<i class="fab fa-google"></i> Continue with Google';
                    btn.disabled = false;
                });
            }
        }
        
        // ==================== FORGOT PASSWORD ====================
        function showForgotPasswordModal() {
            document.getElementById('forgotPasswordModal').style.display = 'flex';
            document.getElementById('resetEmail').value = '';
            document.getElementById('resetMessage').innerHTML = '';
        }
        
        function closeForgotPasswordModal() {
            document.getElementById('forgotPasswordModal').style.display = 'none';
        }
        
        async function sendPasswordResetEmail() {
            const email = document.getElementById('resetEmail').value.trim();
            const messageDiv = document.getElementById('resetMessage');
            
            if (!email) {
                messageDiv.innerHTML = '<span class="message-error">Please enter your email address</span>';
                return;
            }
            
            if (!email.includes('@')) {
                messageDiv.innerHTML = '<span class="message-error">Please enter a valid email address</span>';
                return;
            }
            
            if (!isFirebaseInitialized) {
                messageDiv.innerHTML = '<span class="message-error">Firebase is not ready. Please try again.</span>';
                return;
            }
            
            messageDiv.innerHTML = '<span class="message-info"><i class="fas fa-spinner fa-spin"></i> Sending reset link...</span>';
            
            try {
                await auth.sendPasswordResetEmail(email);
                messageDiv.innerHTML = '<span class="message-success">✅ Password reset link sent! Check your email inbox.</span>';
                setTimeout(() => {
                    closeForgotPasswordModal();
                    showToast('Password reset email sent! Check your inbox.');
                }, 3000);
            } catch (error) {
                console.error("Password reset error:", error);
                let errorMessage = "";
                switch (error.code) {
                    case 'auth/user-not-found':
                        errorMessage = "No account found with this email address.";
                        break;
                    case 'auth/invalid-email':
                        errorMessage = "Please enter a valid email address.";
                        break;
                    case 'auth/too-many-requests':
                        errorMessage = "Too many requests. Please try again later.";
                        break;
                    default:
                        errorMessage = error.message;
                }
                messageDiv.innerHTML = `<span class="message-error">❌ ${errorMessage}</span>`;
            }
        }
        
        // ==================== LOCAL STORAGE USER MANAGEMENT ====================
        function getUsers() {
            const stored = localStorage.getItem('attar_users');
            if (stored) return JSON.parse(stored);
            const defaultUsers = [
                { id: 1, email: "admin@attar.com", password: "admin123", role: "admin", name: "Admin User", phone: "" },
                { id: 2, email: "user@test.com", password: "user123", role: "user", name: "Test Customer", phone: "+880123456789" }
            ];
            localStorage.setItem('attar_users', JSON.stringify(defaultUsers));
            return defaultUsers;
        }
        
        function saveUsers(users) {
            localStorage.setItem('attar_users', JSON.stringify(users));
        }
        
        async function login() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showToast('Please fill in all fields');
                return;
            }
            
            const users = getUsers();
            const localUser = users.find(u => u.email === email && u.password === password);
            
            if (localUser) {
                const { password, ...userWithoutPassword } = localUser;
                localStorage.setItem('currentUser', JSON.stringify(userWithoutPassword));
                showToast(`Welcome back, ${localUser.name || localUser.email}!`);
                
                if (isFirebaseInitialized) {
                    try {
                        await auth.signInWithEmailAndPassword(email, password);
                    } catch (e) {
                        if (e.code === 'auth/user-not-found') {
                            await auth.createUserWithEmailAndPassword(email, password);
                        }
                    }
                }
                
                setTimeout(() => {
                    if (localUser.role === 'admin') {
                        window.location.href = 'admin-dashboard.html';
                    } else {
                        window.location.href = 'index.html';
                    }
                }, 1000);
            } else {
                showToast('Invalid email or password');
            }
        }
        
        async function signup() {
            const name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;
            const phone = document.getElementById('signupPhone').value.trim();
            
            if (!name || !email || !password) {
                showToast('Please fill all required fields');
                return;
            }
            
            if (password.length < 6) {
                showToast('Password must be at least 6 characters');
                return;
            }
            
            if (!email.includes('@')) {
                showToast('Please enter a valid email address');
                return;
            }
            
            const users = getUsers();
            if (users.find(u => u.email === email)) {
                showToast('Email already registered. Please login instead.');
                return;
            }
            
            if (isFirebaseInitialized) {
                try {
                    await auth.createUserWithEmailAndPassword(email, password);
                    console.log('Firebase user created');
                } catch (error) {
                    console.error('Firebase signup error:', error);
                }
            }
            
            const newUser = {
                id: Date.now(),
                email: email,
                password: password,
                role: 'user',
                name: name,
                phone: phone || '',
                createdAt: new Date().toISOString(),
                authProvider: isFirebaseInitialized ? 'firebase' : 'local'
            };
            
            users.push(newUser);
            saveUsers(users);
            
            const { password: _, ...userWithoutPassword } = newUser;
            localStorage.setItem('currentUser', JSON.stringify(userWithoutPassword));
            showToast(`Welcome ${name}! Your account has been created.`);
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1000);
        }
        
        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');
            const tabs = document.querySelectorAll('.auth-tab');
            
            if (tab === 'login') {
                loginForm.classList.add('active');
                signupForm.classList.remove('active');
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
            } else {
                loginForm.classList.remove('active');
                signupForm.classList.add('active');
                tabs[0].classList.remove('active');
                tabs[1].classList.add('active');
            }
        }
        
        // Attach event listeners
        document.addEventListener('DOMContentLoaded', function() {
            const googleLoginBtn = document.getElementById('googleSignInBtn');
            const googleSignupBtn = document.getElementById('googleSignUpBtn');
            
            if (googleLoginBtn) {
                googleLoginBtn.addEventListener('click', continueWithGoogle);
            }
            if (googleSignupBtn) {
                googleSignupBtn.addEventListener('click', continueWithGoogle);
            }
        });
        
        // Check if already logged in
        const currentUser = getCurrentUser();
        if (currentUser && !window.location.pathname.includes('login.html')) {
            window.location.href = 'index.html';
        }
        
        // Make functions global
        window.switchTab = switchTab;
        window.login = login;
        window.signup = signup;
        window.continueWithGoogle = continueWithGoogle;
        window.showForgotPasswordModal = showForgotPasswordModal;
        window.closeForgotPasswordModal = closeForgotPasswordModal;
        window.sendPasswordResetEmail = sendPasswordResetEmail;
    </script>
</body>

</html>
